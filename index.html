учёт изменений для юрлица 2 000 ₽ (актуально на июль 2026). Больше метров в ЕГРН это плюс к залоговой стоимости и цене продажи."], ["Какой штраф за несогласованную антресоль?", "За самовольную перепланировку нежилого помещения в МКД юрлицу грозит штраф 40 000-50 000 ₽ по ч. 2 ст. 7.21 КоАП РФ и предписание узаконить или демонтировать конструкцию. Если работы квалифицируют как реконструкцию без разрешения, штраф юрлицу от 500 000 до 1 000 000 ₽ или приостановка деятельности до 90 суток по ст. 9.5 КоАП РФ (актуально на июль 2026)."], ["Можно ли сделать санузел или мойку на антресоли?", "Можно: с 2021 года прежний запрет на мокрые зоны на антресоли снят. Понадобится проект с разводкой воды и канализации, в ряде случаев заключение Роспотребнадзора. Закладываем это в проект сразу, чтобы не переделывать."], ["Какие документы нужны, чтобы начать?", "Три вещи: план БТИ с высотой потолков, выписка ЕГРН и эскиз или фото антресоли, которую планируете или уже построили. Этого хватает для бесплатного разбора: за 1 день скажем, проходит ли конструкция по нормам и какой путь согласования вас ждёт."], ["Сколько времени занимает согласование антресоли целиком?", "Обычно 3-6 месяцев: заключение и проект около месяца, рассмотрение в МЖИ до 20 рабочих дней, дальше монтаж, приёмка, техплан и внесение в ЕГРН (электронная подача от 3 рабочих дней). Отдельные этапы ускоряем: срочный техплан делаем за 1-2 дня с доплатой."]],seo:{"title": "Согласование антресоли в нежилом помещении в Москве | КЕО", "desc": "Согласуем и узаконим антресоль: правило 40%, высоты 2,1 м, техзаключение, проект, МЖИ, техплан и новая площадь в ЕГРН. Бесплатный разбор объекта за 1 день."}},

 "soglasovanie-otdelnogo-vhoda":{group:"kadastr",title:"Согласование отдельного входа в нежилое помещение в Москве",lede:"Оформляем отдельный вход для магазина, аптеки, кафе или офиса в Москве: проект входной группы, собрание собственников, согласование в Мосжилинспекции и запись в ЕГРН. Полный цикл обычно занимает 3-6 месяцев, проект от 25 000 ₽. Работаем по доверенности, ваше присутствие не нужно. Начинаем с бесплатного разбора объекта за 1 день.",badge:["400+", "объектов доведено до записи в ЕГРН"],img:"soglasovanie-otdelnogo-vhoda",updated:"июль 2026",scenarios:[["Купили помещение на первом этаже под магазин или аптеку, а вход только через подъезд. Арендатор не заходит, торговать нельзя.", "Спроектируем входную группу, проведём собрание собственников, согласуем в Мосжилинспекции и внесём вход в ЕГРН."], ["Вход уже прорубили, часто ещё при прежнем собственнике. Документов нет, а покупатель или банк просит их привести в порядок.", "Узакониваем по факту: техзаключение о безопасности проёма, проект в текущем состоянии, согласование и новая запись в ЕГРН."], ["Сетевой арендатор подписывает договор только с отдельным входом и витриной. Сроки в договоре уже горят.", "Берём весь маршрут на себя и ведём этапы параллельно: проект и собрание запускаем одновременно, чтобы выиграть недели."], ["Мосжилинспекция отказала: слабый проект, вопросы к протоколу собрания или к несущей стене.", "Разбираем причину отказа, усиливаем проект и пакет документов, заходим повторно. Если шансов нет, честно скажем до новых трат."], ["Здание отдельно стоящее, нежилое. Нужен второй вход с улицы, но непонятно, кто это вообще согласует.", "Здесь маршрут другой: без Мосжилинспекции, через техзаключение, техплан и учёт изменений в ЕГРН. Фасад проверяем по требованиям города."]],pains:["Вход без согласования: штраф юрлицу от 40 000 до 50 000 ₽ по ч. 2 ст. 7.21 КоАП РФ плюс предписание заложить проём за свой счёт (актуально на июль 2026)", "Собрание провели с ошибками: решение оспорят, и весь маршрут откатится на 2-3 месяца, а иногда уйдёт в суд", "Крыльцо на фундаменте превращает перепланировку в реконструкцию: вместо 20 рабочих дней в МЖИ впереди экспертиза проекта и разрешение на строительство", "Вход не внесён в ЕГРН: сетевой арендатор и банк не подписывают договор, помещение простаивает и не приносит ни рубля", "Каждый отказ МЖИ из-за недоработанного пакета отнимает до 20 рабочих дней ожидания и месяц календаря"],steps:[["01", "Разбор объекта", "Бесплатно, 1 день. Смотрим выписку из ЕГРН и планы БТИ, говорим, перепланировка это или реконструкция, сколько голосов собственников понадобится и реален ли вход вообще."], ["02", "Проект и техзаключение", "5-10 дней. Проект входной группы с разделом усиления проёма и техническое заключение о состоянии несущих конструкций."], ["03", "Собрание собственников", "От 3 недель до 2 месяцев. Готовим повестку, бюллетени и протокол по требованиям ЖК РФ. Кворум считаем до собрания, а не после."], ["04", "Согласование в МЖИ", "До 20 рабочих дней, в домах-памятниках до 30. Подаём пакет электронно через mos.ru, отвечаем на замечания инспекции и добиваемся решения о согласовании."], ["05", "Работы и акт приёмки", "Следим, чтобы подрядчик не отступал от проекта, и получаем акт о завершённой перепланировке."], ["06", "Техплан и запись в ЕГРН", "Учёт изменений 5-7 рабочих дней. Готовим новый технический план, вносим изменения в ЕГРН, отдаём закрывающие документы. Если по нашей вине регистрация не пройдёт, исправим за свой счёт: гарантия прописана в договоре."]],stats:[["400+", "объектов доведено до записи в ЕГРН с 2010 года"], ["7 из 10", "заявок без профподготовки уходят в приостановку"], ["25+", "лет совокупного опыта команды, есть выходцы из Росреестра и БТИ"], ["2 часа", "максимум до нашего звонка после заявки"]],tariffs:[["Проект входной группы", "от 25 000 ₽", "5-10 дней", "Проект перепланировки с разделом усиления проёма, готов к подаче в МЖИ", false], ["Техническое заключение", "от 20 000 ₽", "5-7 рабочих дней", "ТЗК о состоянии несущих конструкций и допустимости проёма", false], ["Отдельный вход под ключ", "по запросу", "3-6 месяцев", "Собрание собственников, проект, МЖИ, акт приёмки, техплан и запись в ЕГРН", true]],micro:"Пришлите выписку из ЕГРН и план БТИ, за 1 день бесплатно скажем, перепланировка это или реконструкция и сколько голосов собственников понадобится.",faq:[["Нужно ли согласие жильцов дома на отдельный вход?", "Да, без собрания собственников Мосжилинспекция документы не примет. Если проём устраивают в наружной несущей стене, а крыльцо встаёт на придомовую землю, суды считают это уменьшением общего имущества и требуют согласия всех собственников (ч. 3 ст. 36 и ч. 2 ст. 40 ЖК РФ). В более мягких случаях хватает 2/3 голосов. Сколько нужно именно вам, скажем на бесплатном разборе."], ["Сколько времени занимает согласование отдельного входа в Москве?", "Мосжилинспекция рассматривает пакет до 20 рабочих дней, в домах-памятниках до 30 (508-ПП в редакции от 18.04.2025). Весь цикл с собранием, работами и записью в ЕГРН обычно укладывается в 3-6 месяцев. Дольше всего идёт собрание собственников, поэтому запускаем его параллельно с проектом."], ["Какой штраф за отдельный вход без согласования?", "Юрлицу и ИП от 40 000 до 50 000 ₽, должностному лицу от 4 000 до 5 000 ₽ по ч. 2 ст. 7.21 КоАП РФ (актуально на июль 2026). Московская ст. 9.12 со штрафами до 350 000 ₽ исключена из городского кодекса ещё в 2023 году. К штрафу идёт предписание вернуть стену в исходное состояние за свой счёт, а за неисполнение штрафуют повторно."], ["Можно ли узаконить уже сделанный вход?", "Как правило, да, если проём безопасен и вписывается в нормы. Делаем техническое заключение о допустимости выполненных работ, проект в текущем состоянии, проводим собрание и согласуем по факту. Если конструктив нарушен, честно скажем сразу, до трат на проект."], ["Чем вход-перепланировка отличается от реконструкции?", "Крыльцо без фундамента в пределах норм это перепланировка, её согласует МЖИ. Фундамент под входной группой, пристройка или рост площади здания это уже реконструкция: нужен проект с экспертизой и разрешение на строительство. С апреля 2025 входная группа у первого и цокольного этажа ограничена 10 кв.м."], ["Нужен ли отдельный вход при переводе квартиры в нежилой фонд?", "Да, ст. 22 ЖК РФ прямо требует отдельный вход и отсутствие доступа из помещения к жилой части дома. Перевод и устройство входа это две связанные процедуры, ведём их вместе, чтобы не проходить согласования дважды."], ["Кто согласует изменение фасада?", "В многоквартирном доме фасадные решения входят в проект перепланировки, который рассматривает МЖИ. В отдельно стоящих нежилых зданиях облик согласуется через ДГП: Москомархитектура упразднена, её функции переданы Департаменту градостроительной политики в декабре 2025."], ["Какие документы нужны для согласования входа?", "Выписка из ЕГРН, планы БТИ, проект перепланировки, техническое заключение, протокол общего собрания и технический план. С апреля 2025 подача только электронная, через mos.ru с усиленной квалифицированной подписью, а техплан подаётся сразу вместе с проектом."], ["Нужен ли пандус у нового входа?", "Да, доступность для маломобильных людей проверяют по СП 59.13330.2020: при перепаде высот нужен пандус или подъёмник, перила и нескользящее покрытие. Закладываем это в проект сразу, чтобы не переделывать крыльцо после замечаний."]],seo:{"title": "Согласование отдельного входа в нежилое помещение | Москва", "desc": "Отдельный вход под ключ: проект, собрание собственников, Мосжилинспекция, запись в ЕГРН. Срок 3-6 месяцев, проект от 25 000 ₽. Бесплатный разбор за 1 день."}},

 "soglasovanie-pereplanirovki":{group:"kadastr",title:"Согласование перепланировки нежилого помещения в Москве",lede:"Согласуем перепланировку нежилого помещения под ключ: проект, техническое заключение, Мосжилинспекция, акт приёмки и новая выписка ЕГРН. Работаем с магазинами, офисами, клиниками и кафе в жилых домах и отдельных зданиях Москвы. Проект от 25 000 ₽, полную стоимость считаем после бесплатного аудита за 1-2 дня. Реальный срок от 2 до 8 месяцев в зависимости от объекта.",badge:["400+", "объектов оформили в ЕГРН с 2010 года"],img:"soglasovanie-pereplanirovki",updated:"июль 2026",scenarios:[["Берёте помещение на первом этаже жилого дома под магазин или клинику, нужно перенести перегородки и сделать новый проём", "Проверим, что согласуют, а что нет, подготовим проект и техзаключение, проведём согласование в Мосжилинспекции и доведём дело до записи в ЕГРН"], ["Перепланировку сделали давно, ещё при прошлом собственнике, документов не осталось", "Узакониваем по факту: техническое заключение о допустимости и безопасности работ, подача в МЖИ, акт приёмки и свежая выписка ЕГРН"], ["Готовите продажу или залог, а на плане БТИ красные линии", "Сверим план с фактом, узаконим изменения и приведём документы в порядок, чтобы у банка и покупателя не осталось вопросов к объекту"], ["Пришла проверка, вам выдали предписание МЖИ и назначили штраф", "Готовим ответ на предписание и документы для узаконивания, сопровождаем до снятия вопроса, в спорной ситуации защищаем интересы в суде"], ["Помещение в отдельно стоящем нежилом здании, непонятно, куда вообще подавать", "Сюда Мосжилинспекция не нужна: оформляем изменения техническим планом через кадастрового инженера и вносим в ЕГРН"]],pains:["Штраф за самовольную перепланировку нежилого помещения в жилом доме: компаниям по ч. 2 ст. 7.21 КоАП РФ 40 000-50 000 ₽ (актуально на июль 2026)", "Предписание вернуть помещение в исходное состояние: демонтаж и повторный ремонт за свой счёт, при неисполнении иск Мосжилинспекции в суд", "С 1 апреля 2024 года перепланировка юридически завершена только после записи в ЕГРН (608-ФЗ): без новой выписки сделка, ипотека и залог встают", "Самостоятельная подача часто заканчивается замечаниями и отказом: каждый новый круг в МЖИ это ещё 20 рабочих дней ожидания", "Работы с несущими конструкциями без техзаключения автора проекта дома не согласуют вовсе, а оформление задним числом дольше и дороже"],steps:[["01", "Аудит помещения", "Смотрим план БТИ, выписку ЕГРН и ваш эскиз, честно говорим, что согласуют, а что нет. Бесплатно, 1-2 дня"], ["02", "Проект и заключения", "Готовим проект перепланировки за 5-10 дней. Если затронуты несущие конструкции, заказываем техзаключение у автора проекта дома, это ещё около месяца"], ["03", "Согласование в МЖИ", "Подаём документы в электронном виде через mos.ru, ведём переписку и отрабатываем замечания. Рассмотрение по регламенту 20 рабочих дней"], ["04", "Работы и приёмка", "После ремонта организуем приёмочную комиссию и получаем акт о завершённой перепланировке, его оформление занимает до 30 дней"], ["05", "Техплан и ЕГРН", "Кадастровый инженер готовит технический план за 3-5 дней, вносим изменения в ЕГРН и передаём вам свежую выписку с новой планировкой"]],stats:[["400+", "объектов зарегистрировали в Росреестре с 2010 года"], ["2-8 мес", "полный цикл: 2-3 месяца в нежилом здании, 4-8 в жилом доме"], ["20 раб. дней", "рассмотрение заявления в Мосжилинспекции по регламенту"], ["1-2 дня", "бесплатный аудит по плану БТИ и эскизу изменений"]],tariffs:[["Проект перепланировки", "от 25 000 ₽", "5-10 дней", "Проектная документация для согласования в Мосжилинспекции, сопровождаем до получения решения", false], ["Техническое заключение", "от 20 000 ₽", "5-7 рабочих дней", "ТЗК о допустимости и безопасности выполненных работ, основа для узаконивания по факту", false], ["Согласование под ключ", "по запросу", "2-8 месяцев", "Аудит, проект, заключения, МЖИ, приёмка, техплан и запись в ЕГРН. Стоимость считаем после бесплатного аудита", true]],micro:"Пришлите план БТИ с экспликацией, выписку ЕГРН и фото или эскиз изменений: за 1-2 дня бесплатно скажем, согласуется ли перепланировка, в какой срок и сколько будет стоить работа.",faq:[["Нужно ли согласовывать перепланировку нежилого помещения в Москве", "Если помещение в многоквартирном доме, да: порядок задан постановлением 508-ПП, согласует Мосжилинспекция. Перенос перегородок, новые проёмы, объединение комнат без решения МЖИ это самовольная перепланировка. В отдельно стоящем нежилом здании МЖИ не участвует: изменения оформляются техпланом и вносятся в ЕГРН."], ["Сколько стоит согласовать перепланировку нежилого помещения", "Проект перепланировки от 25 000 ₽, техническое заключение от 20 000 ₽, технический план от 15 000 ₽. Полное сопровождение считаем после бесплатного аудита: цена зависит от площади, несущих конструкций и от того, сделаны работы или только планируются."], ["Какой штраф за незаконную перепланировку нежилого помещения", "Компаниям и ИП 40 000-50 000 ₽, должностным лицам 4 000-5 000 ₽, гражданам 2 000-2 500 ₽ по ч. 2 ст. 7.21 КоАП РФ (актуально на июль 2026). Московская ст. 9.12 со штрафами до 350 000 ₽ исключена из городского кодекса ещё в 2023 году, наказание идёт по федеральной норме. Штраф не закрывает вопрос: следом идёт предписание узаконить работы или вернуть помещение в исходное состояние, при неисполнении МЖИ обращается в суд."], ["Как узаконить уже сделанную перепланировку", "По факту: техническое заключение о допустимости и безопасности выполненных работ, подача в МЖИ, акт приёмочной комиссии, техплан и запись в ЕГРН. Если работы затронули несущие конструкции, заключение готовит автор проекта дома (МНИИТЭП, Моспроект) или ГБУ «Экспертный центр». В спорных случаях вопрос решается через суд, сопровождаем и этот путь."], ["Сколько времени занимает согласование перепланировки", "По регламенту МЖИ рассматривает заявление 20 рабочих дней. Полный цикл с проектом, работами, приёмкой и записью в ЕГРН по нашей практике занимает 2-3 месяца в нежилом здании и 4-8 месяцев в помещении внутри жилого дома. Несущие конструкции добавляют около месяца на техзаключение."], ["Какие документы нужны для согласования перепланировки", "Для старта достаточно поэтажного плана БТИ с экспликацией, выписки ЕГРН и эскиза или фото изменений. Остальное собираем сами: проект, техзаключение, при необходимости заключение Роспотребнадзора. Подача идёт в электронном виде через mos.ru, работаем по доверенности, ваше присутствие не требуется."], ["Что изменилось в правилах перепланировки в 2025 году", "С 23 апреля 2025 года действует редакция 508-ПП, внесённая постановлением 841-ПП: подача полностью электронная, часть простых работ согласуется по эскизу без проекта. И главное, с 1 апреля 2024 года по 608-ФЗ перепланировка считается завершённой только после внесения изменений в ЕГРН. Акт приёмочной комиссии без новой выписки процедуру больше не завершает."], ["Можно ли продать помещение с несогласованной перепланировкой", "Сделку формально не запретят, но банк не возьмёт объект в залог, покупатель потребует скидку или уйдёт, а новый собственник унаследует предписание МЖИ вместе с помещением. Дешевле узаконить до сделки: аудит бесплатный, за 1-2 дня скажем, во что это обойдётся."], ["Согласует ли МЖИ перепланировку с затрагиванием несущих стен", "Да, но только с техническим заключением от автора проекта дома, обойти это требование 508-ПП нельзя. Если проектной организации уже нет, заключение готовит ГБУ «Экспертный центр». Мы заказываем и сопровождаем этот этап сами, на него стоит заложить около месяца."], ["Какая госпошлина за внесение изменений в ЕГРН", "Кадастровый учёт изменений после перепланировки для организаций обходится в 2 000 ₽ госпошлины (ставка действует с 1 января 2025 года, актуально на июль 2026). Подготовка технического плана оплачивается отдельно, у нас от 15 000 ₽ и 3-5 дней работы."]],seo:{"title": "Согласование перепланировки нежилого помещения в Москве", "desc": "Согласование перепланировки нежилого помещения в Москве под ключ: проект, ТЗК, МЖИ, запись в ЕГРН. Узаконим выполненную перепланировку. Аудит бесплатно."}},

 "tehnicheskiy-plan":{group:"kadastr",title:"Технический план здания, помещения или сооружения в Москве",lede:"Готовим технические планы на здания, помещения и сооружения: обмеры на объекте, сверка с проектом и ЕГРН, готовый XML с подписью кадастрового инженера для Росреестра. Стоимость от 15 000 ₽, срок 3-5 дней, срочный вариант 1-2 дня с доплатой. Работаем по Москве и области, выезд инженера до 50 км от МКАД уже включён.",badge:["400+", "объектов поставлено на учёт и зарегистрировано с 2010 года"],img:"tehnicheskiy-plan",updated:"июль 2026",scenarios:[["Построили или реконструировали здание, теперь его нужно поставить на кадастровый учёт", "Выезжаем на объект, делаем обмеры с привязкой к координатам, сверяем факт с проектом и разрешениями и готовим техплан здания в XML. По доверенности подаём в Росреестр и ведём до записи в ЕГРН."], ["Сделали перепланировку помещения, а в ЕГРН до сих пор старая планировка", "Фиксируем новую конфигурацию, готовим техплан изменений и вносим их в реестр. Без этого шага любая сделка с помещением упрётся в расхождение документов и факта."], ["Сдаёте часть помещения или этажа в аренду от года, Росреестр требует техплан части", "Готовим техплан с границами арендуемой части по п. 37 приказа П/0082: без него договор аренды на срок от года не зарегистрируют. Часть ставится на временный учёт вместе с регистрацией договора."], ["Росреестр приостановил учёт из-за ошибок в техплане, который делал другой инженер", "Разбираем уведомление о приостановке, находим настоящую причину, переделываем план и подаём заново. Как правило, снимаем приостановку без суда, в запасе 3 месяца на устранение."], ["Делите здание на отдельные помещения или объединяете несколько в одно", "Готовим техпланы на каждый образуемый объект, чтобы раздел или объединение прошли учёт одним пакетом, без повторных подач и лишних пошлин."]],pains:["Приостановка Росреестра это до 3 месяцев задержки. Без профессиональной подготовки в неё попадают, по нашей практике, примерно 7 заявителей из 10", "35% всех приостановок по нашей статистике происходят из-за ошибок в самом техплане: неточные координаты, площадь, разночтения с проектом", "При отказе после неснятой приостановки госпошлина не возвращается: для юрлица это до 66 000 ₽, платить и подавать придётся заново", "Договор аренды части здания на срок от года без техплана части не зарегистрируют: сделка зависает, арендатор ждёт месяцами", "Объект без кадастрового учёта для оборота не существует: его нельзя продать, заложить или сдать в долгосрочную аренду"],steps:[["01", "Разбор задачи", "Присылаете выписку из ЕГРН и вводные по объекту. Бесплатно смотрим документы, говорим, какой техплан нужен и что понадобится. Перезвоним в течение 2 часов."], ["02", "Выезд и обмеры", "Кадастровый инженер выезжает на объект, делает обмеры и привязку к координатам, фиксирует фактическое состояние. 1-2 дня, Москва и МО, до 50 км от МКАД включено в цену."], ["03", "Подготовка техплана", "Сверяем обмеры с проектной документацией, разрешениями и данными ЕГРН, готовим техплан в XML с усиленной электронной подписью инженера. 3-5 дней, срочно 1-2 дня с доплатой."], ["04", "Проверка до подачи", "До Росреестра проверяем план по типовым основаниям приостановок: сверка характеристик с ЕГРН, координаты, состав приложений. Так причина 35% приостановок снимается ещё до подачи."], ["05", "Подача и сопровождение", "По доверенности подаём документы и отвечаем на запросы регистратора до записи в ЕГРН. Учёт идёт 5 рабочих дней, через МФЦ 7, вместе с регистрацией права 10-12. Отдаём закрывающие документы для бухгалтерии."]],stats:[["400+", "объектов поставили на учёт и зарегистрировали с 2010 года"], ["3-5", "дней готовим техплан, срочный вариант 1-2 дня"], ["7 из 10", "заявок без подготовки уходят в приостановку, по нашей практике"], ["5-7", "рабочих дней занимает кадастровый учёт по готовому плану"]],tariffs:[["Техплан здания или помещения", "от 15 000 ₽", "3-5 дней", "Выезд и обмеры, сверка с проектом и ЕГРН, техплан в XML с подписью кадастрового инженера, самопроверка до подачи", true], ["Срочный техплан", "по запросу", "1-2 дня", "Тот же состав вне очереди: выезд в день обращения, готовый XML за 1-2 дня, доплата за срочность фиксируется в договоре", false], ["Техплан с подачей в Росреестр", "по запросу", "до записи в ЕГРН", "Техплан, подача по доверенности, ответы на запросы регистратора, снятие замечаний, сопровождение до учёта и регистрации", false]],micro:"Пришлите выписку из ЕГРН и пару фото объекта, за 10 минут скажем, какой техплан нужен, что для него понадобится и сколько он будет стоить.",faq:[["Сколько стоит технический план в Москве?", "У нас от 15 000 ₽, итог зависит от типа объекта, площади и полноты документов. Срок 3-5 дней, срочно 1-2 дня с доплатой. Отдельно идёт госпошлина Росреестра: постановка на кадастровый учёт 2 000 ₽ для физлиц и 22 000 ₽ для юрлиц, актуально на июль 2026."], ["Чем технический план отличается от технического паспорта БТИ?", "Кадастровый учёт по 218-ФЗ идёт только на основании техплана, который готовит кадастровый инженер. Техпаспорт БТИ для Росреестра не годится, у него остались узкие задачи вроде согласования перепланировки квартиры через МЖИ. Если для учёта вам предлагают техпаспорт, вы заплатите за документ, который Росреестр не примет."], ["Какие документы нужны для технического плана?", "База это выписка из ЕГРН, проектная документация либо разрешение на строительство и ввод, для помещения ещё поэтажный план. Если проекта нет и закон это допускает, техплан готовится на основании декларации собственника. Недостающее запросим и соберём по доверенности сами."], ["Сколько Росреестр ставит объект на кадастровый учёт?", "По ст. 16 закона 218-ФЗ учёт занимает 5 рабочих дней при подаче напрямую и 7 через МФЦ. Одновременный учёт с регистрацией права идёт 10 рабочих дней, через МФЦ 12. Сроки актуальны на июль 2026 и считаются с даты приёма полного пакета."], ["Нужен ли технический план для аренды части помещения?", "Да, если договор заключается на год и дольше: без техплана на часть Росреестр его не зарегистрирует. Границы арендуемой части инженер отражает на плане этажа по п. 37 приказа Росреестра № П/0082, сведения о части вносятся в ЕГРН на срок аренды. Договор до года не регистрируется, там техплан не нужен."], ["Росреестр приостановил учёт по техплану, что делать?", "Приостановка это не отказ: по ст. 26 закона 218-ФЗ есть 3 месяца на устранение причин, а оснований там около шести десятков. Разбираем уведомление, переделываем техплан и подаём заново, как правило снимаем без суда. Если регистратор неправ, идём в апелляционную комиссию Росреестра, она рассматривает жалобу 30 дней."], ["Нужен ли техплан после перепланировки нежилого помещения?", "Нужен. Пока изменения не внесены в ЕГРН по техплану, реестр хранит старую планировку, и любая проверка или сделка споткнётся о расхождение. Кадастровый инженер фиксирует новую конфигурацию, и после учёта выписка из ЕГРН отражает помещение таким, какое оно есть."], ["Можно ли сделать технический план без выезда инженера?", "Обмеры на объекте нужны почти всегда: если фактическое состояние разошлось с проектом, а инженер рисовал по бумагам, расхождение всплывёт на проверке и вернётся приостановкой. Поэтому выезд по Москве и МО до 50 км от МКАД мы сразу включаем в цену, а не продаём отдельно."], ["Кто имеет право готовить технический план?", "Только кадастровый инженер, состоящий в саморегулируемой организации. Он подписывает план усиленной квалифицированной электронной подписью и сдаёт в формате XML, бумажная распечатка лишь читаемая копия. Проверить инженера можно в открытом реестре Росреестра: у наших инженеров статус действующий."]],seo:{"title": "Технический план здания и помещения в Москве от 15 000 ₽", "desc": "Технические планы на здания, помещения и сооружения для Росреестра. Кадастровые инженеры СРО, XML с подписью, от 15 000 ₽ за 3-5 дней. Москва и МО."}},

 "tehnicheskoe-zaklyuchenie":{group:"kadastr",title:"Техническое заключение о состоянии конструкций (ТЗК) в Москве",lede:"Обследуем здание и готовим техническое заключение о состоянии конструкций и возможности перепланировки или реконструкции. Это документ для согласования работ в МЖИ и для узаконивания уже выполненного ремонта. Срок 5-7 рабочих дней, цена от 20 000 ₽. Москва и область, выезд инженера до 50 км от МКАД включён.",badge:["5-7", "рабочих дней на готовое заключение"],img:"tehnicheskoe-zaklyuchenie",updated:"июль 2026",scenarios:[["Задумали перепланировку и не знаете, можно ли трогать стену между кухней и комнатой", "Обследуем конструкции, определим, что несущее, а что нет, и оформим ТЗК о возможности работ для согласования в МЖИ"], ["Ремонт уже сделан без согласования, теперь нужно узаконить", "Подготовим заключение о допустимости и безопасности ранее выполненных работ по 508-ПП. Если затронуты несущие конструкции, организуем получение ТЗК у автора проекта дома или ГБУ «Экспертный центр» и сопроводим до результата"], ["Продаёте или покупаете помещение, банк или покупатель просит подтвердить безопасность изменений", "Проведём обследование и выдадим заключение о состоянии конструкций, с которым сделка не встанет"], ["Хотите антресоль, новый проём или дооборудование в нежилом здании", "Оценим несущую способность стен и перекрытий, скажем, выдержит ли конструкция и что нужно усилить"], ["МЖИ вернула документы или выдала предписание", "Разберём причину возврата, подготовим недостающее заключение или исправим имеющееся и сопроводим повторную подачу"]],pains:["Штраф за самовольную перепланировку по ст. 7.21 КоАП РФ: 2 000-2 500 ₽ гражданину и 40 000-50 000 ₽ компании (актуально на июль 2026)", "Предписание вернуть помещение в исходное состояние за свой счёт: демонтаж обходится дороже самого ремонта", "При неисполнении предписания суд вправе выставить помещение на публичные торги по ст. 29 ЖК РФ", "Сорванная сделка: банк не одобряет ипотеку на объект с несогласованными изменениями, покупатель уходит или сбивает цену", "Заключение от организации без допуска СРО инспекция не примет: минус 20 рабочих дней рассмотрения и подача заново"],steps:[["01", "Заявка и разбор документов", "Перезвоним в течение 2 часов, скажем, какое заключение нужно в вашем случае, и запросим выписку из ЕГРН и план БТИ. День обращения"], ["02", "Выезд инженера", "Осмотр и обмеры конструкций, фотофиксация дефектов. Выезд до 50 км от МКАД включён в цену. 1-2 дня"], ["03", "Обследование и расчёты", "Оцениваем состояние и несущую способность конструкций по ГОСТ 31937-2024, проверяем задуманные или выполненные работы на соответствие нормам. 2-3 дня"], ["04", "Готовое заключение", "Текстовая и графическая части, выводы и рекомендации. Заверяем электронной подписью: с 2025 года документы в МЖИ подаются только в электронном виде через mos.ru. 1-2 дня"], ["05", "Передача и поддержка", "Отдаём комплект и закрывающие документы. При согласовании отвечаем на вопросы инспекции и снимаем замечания. Итого 5-7 рабочих дней"]],stats:[["400+", "объектов оформлено с 2010 года"], ["25+", "лет совокупного опыта команды"], ["5-7", "рабочих дней на заключение"], ["50 км", "от МКАД: выезд инженера включён"]],tariffs:[["ТЗК о возможности перепланировки", "от 20 000 ₽", "5-7 рабочих дней", "Выезд инженера, обследование конструкций, расчёты, выводы о возможности работ, текстовая и графическая части, электронная подпись для подачи через mos.ru", true], ["ТЗК о ранее выполненных работах", "от 20 000 ₽", "5-7 рабочих дней", "Обследование выполненной перепланировки, проверка на соответствие строительным и санитарным нормам, заключение о допустимости и безопасности. При затронутых несущих конструкциях организуем ТЗК автора проекта дома", false], ["ТЗК + проект перепланировки", "по запросу", "срок по объекту", "Комплект под ключ для согласования в МЖИ одной командой: обследование, техническое заключение и проект перепланировки, сопровождение подачи", false]],micro:"Пришлите поэтажный план БТИ и пару фото помещения, за день бесплатно скажем, какое заключение нужно в вашем случае и получится ли согласовать задуманное.",faq:[["Когда для перепланировки нужно техническое заключение, а когда хватит проекта?", "Проект нужен почти всегда, а ТЗК добавляется, когда работы касаются несущих стен, перекрытий, проёмов, или когда перепланировка уже сделана. Для узаконивания ранее выполненных работ по 508-ПП Москвы заключение о допустимости и безопасности обязательно. Пришлите план БТИ, за день скажем точно, что нужно именно вам."], ["Кто имеет право выдавать ТЗК?", "Организация с действующим членством в профильной СРО. Если работы затронули несущие конструкции дома, заключение выдаёт автор проекта дома, а когда его уже не существует, ГБУ «Экспертный центр». Мы состоим в СРО «ЦЕНТРРЕГИОНПРОЕКТ» (НОПРИЗ) с правом готовить проектную документацию: своё ТЗК делаем сами, а получение заключения у автора проекта организуем и сопровождаем."], ["Сколько стоит техническое заключение и что входит в цену?", "От 20 000 ₽, срок 5-7 рабочих дней. В цену входят выезд инженера (до 50 км от МКАД), обследование конструкций, расчёты, текстовая и графическая части, выводы и рекомендации. Точную цену называем до договора, она зависит от площади и сложности объекта."], ["Что грозит за перепланировку без согласования?", "Штраф по ст. 7.21 КоАП РФ: 2 000-2 500 ₽ гражданам и 40 000-50 000 ₽ компаниям, повышенные московские штрафы до 350 000 ₽ отменены ещё в 2023 году (актуально на июль 2026). Дальше предписание вернуть помещение в исходное состояние за свой счёт, а при его неисполнении суд вправе выставить помещение на публичные торги по ст. 29 ЖК РФ. ТЗК как раз тот документ, с которого начинается узаконивание."], ["Чем ТЗК отличается от технического плана?", "Технический план готовит кадастровый инженер для Росреестра: он фиксирует геометрию и координаты помещения. ТЗК отвечает на другой вопрос: в каком состоянии конструкции и безопасны ли работы. Для узаконивания перепланировки часто нужны оба документа, делаем их одной командой, техплан от 15 000 ₽."], ["По какому стандарту проводится обследование в 2026 году?", "По ГОСТ 31937-2024, он пришёл на смену ГОСТ 31937-2011. Стандарт задаёт правила обследования и мониторинга технического состояния зданий: категории состояния конструкций, состав работ и требования к выводам. Заключение по устаревшему стандарту инспекция вправе не принять."], ["Какие документы нужны и обязательно ли моё присутствие?", "Выписка из ЕГРН, поэтажный план БТИ с экспликацией и доступ в помещение на пару часов для осмотра. Присутствовать не обязательно: работаем по доверенности, инженер согласует визит с любым вашим представителем. Закрывающие документы для бухгалтерии выдаём."], ["Сколько МЖИ рассматривает документы с ТЗК?", "По 508-ПП в действующей редакции до 20 рабочих дней с момента регистрации запроса на mos.ru, простые работы по эскизу быстрее. Реальный цикл с подготовкой документов и визитом инспектора занимает 2-3 месяца, поэтому заключение лучше заказывать до начала ремонта, а не после вопросов инспекции."], ["Примет ли суд ваше заключение, если узаконить можно только через суд?", "ТЗК организации с допуском СРО это основной технический документ в таких делах, суды исследуют его наравне с судебной экспертизой. Гарантировать решение суда не может никто, поэтому мы честно оцениваем перспективы до договора и не берёмся за бесперспективные дела."]],seo:{"title": "Техническое заключение ТЗК в Москве от 20 000 ₽ | KEO GROUP", "desc": "ТЗК о состоянии конструкций и допустимости перепланировки за 5-7 рабочих дней, от 20 000 ₽. Обследование по ГОСТ 31937-2024, документ для МЖИ. Москва и МО."}},

 "tehplan-arenda":{group:"kadastr",title:"Технический план для регистрации аренды в Москве",lede:"Сдаёте в аренду часть здания или помещения на срок от 12 месяцев? Росреестр зарегистрирует такой договор только вместе с кадастровым учётом этой части, а для учёта нужен технический план (ч. 5 ст. 44 закона 218-ФЗ). Готовим техплан за 3-5 дней, от 15 000 ₽, подаём документы электронно и сопровождаем регистрацию до выписки ЕГРН. Москва и область, выезд инженера до 50 км от МКАД включён.",badge:["400+", "объектов зарегистрировали в Росреестре с 2010 года"],img:"tehplan-arenda",updated:"июль 2026",scenarios:[["Сдаёте арендатору часть этажа, зал или блок помещений, а не объект целиком", "Готовим техплан на часть: инженер фиксирует контур арендуемой площади, и Росреестр ставит её на учёт одновременно с регистрацией договора"], ["Арендатор, торговая сеть или банк, требует зарегистрированный договор, срок аренды от года", "Проверяем договор и документы на объект, делаем техплан, считаем точную пошлину и ведём регистрацию до выписки ЕГРН"], ["Росреестр приостановил регистрацию аренды из-за замечаний к техплану", "Разбираем уведомление о приостановке, исправляем техплан и добиваемся регистрации; как правило, снимаем приостановку без суда"], ["Под арендатора сделали перепланировку, и контур площади больше не совпадает с ЕГРН", "Готовим новый техплан по фактической планировке, чтобы регистрация прошла без вопросов регистратора"], ["В одном здании несколько арендаторов, каждому нужна своя площадь в ЕГРН", "Делаем техпланы на каждую часть и регистрируем договоры пакетом, чтобы контуры частей не пересекались и не тормозили друг друга"]],pains:["Договор аренды здания на срок от года без регистрации не считается заключённым (п. 2 ст. 651 ГК): в споре с арендатором на него не опереться, взыскание платежей усложняется", "Слабый техплан уводит сделку в приостановку: до 3 месяцев на исправление, и всё это время аренда не зарегистрирована, а арендатор вправе передумать", "Без техплана аренда части регистрируется лишь как обременение всего объекта: выделенной площади в ЕГРН нет, и крупные арендаторы такой вариант обычно не принимают", "Ошибка в пошлине тормозит регистрацию: для организаций это 44 000 ₽, а при кадастровой стоимости выше 22 млн ₽ уже 0,2% от неё, до 1 млн ₽ (актуально на июль 2026)", "Бумажная подача от юрлица с 1 марта 2025 года возвращается без рассмотрения (закон 487-ФЗ): минус две-три недели и подача заново, уже электронно с УКЭП"],steps:[["01", "Разбор документов", "Присылаете выписку ЕГРН, договор или его проект и поэтажный план. За 24-72 часа бесплатно скажем, нужен ли техплан вообще, чего не хватает в пакете и какой будет пошлина по вашему объекту"], ["02", "Обмеры на объекте", "Кадастровый инженер выезжает на объект (до 50 км от МКАД выезд включён), обмеряет арендуемую часть и согласует её контур с формулировками договора. 1-2 дня"], ["03", "Технический план", "Готовим техплан в электронном виде и заверяем его подписью кадастрового инженера из госреестра. 3-5 дней, срочно 1-2 дня с доплатой"], ["04", "Подача в Росреестр", "Формируем пакет и подаём электронно с УКЭП, как того требует закон для организаций с 1 марта 2025 года. Пошлину считаем заранее по кадастровой стоимости, чтобы не получить возврат"], ["05", "Учёт части и регистрация", "Росреестр ставит часть на учёт и регистрирует аренду одним действием, обычно это 7-10 рабочих дней. Вы получаете выписку ЕГРН с учтённой частью и зарегистрированным договором. Возникнет приостановка, снимем: как правило, без суда"]],stats:[["400+", "объектов зарегистрировали с 2010 года"], ["3-5 дней", "готовим техплан, срочно за 1-2 дня"], ["7 из 10", "подач без профподготовки уходят в приостановку"], ["7-10 дней", "занимает учёт части и регистрация аренды в Росреестре"]],tariffs:[["Техплан части помещения или здания", "от 15 000 ₽", "3-5 дней", "Выезд инженера, обмеры, согласование контура части с договором, технический план с подписью кадастрового инженера, готовый файл для подачи в Росреестр", false], ["Срочный техплан", "по запросу", "1-2 дня", "Тот же состав работ в приоритетном порядке, с доплатой за срочность. Нужен, когда дата подписания договора уже назначена", false], ["Техплан и регистрация аренды под ключ", "по запросу", "2-3 недели", "Техплан, проверка договора перед подачей, расчёт пошлины, электронная подача с УКЭП, сопровождение до выписки ЕГРН и работа с приостановкой, если она возникнет. Если по нашей вине регистрация не пройдёт, вернём деньги или исправим за свой счёт, гарантия в договоре", true]],micro:"Пришлите выписку ЕГРН и договор аренды (или его проект): за 1 день бесплатно скажем, нужен ли вам техплан, какой будет пошлина по вашему объекту и когда аренда встанет на регистрацию.",faq:[["Нужен ли техплан, если сдаю помещение целиком?", "Как правило, нет. Если объект уже стоит на кадастровом учёте и его планировка совпадает со сведениями ЕГРН, договор аренды целого помещения регистрируют без техплана. Техплан появляется, когда в аренду идёт часть объекта или когда после перепланировки фактический контур разошёлся с ЕГРН."], ["Можно ли зарегистрировать аренду части без техплана?", "Закон это допускает: без техплана часть на учёт не поставят, и договор зарегистрируют как обременение всего объекта (ч. 5 ст. 44 закона 218-ФЗ). Конкретная площадь в ЕГРН при этом не выделяется. Сетевые арендаторы и банки такой вариант обычно не принимают, поэтому на практике техплан почти всегда делают."], ["Сколько стоит техплан для регистрации аренды?", "У нас от 15 000 ₽, стандартный срок 3-5 дней, срочная подготовка за 1-2 дня с доплатой. Цена зависит от площади и конфигурации части: одна зона на этаже это одна задача, десяток помещений в разных концах здания другая."], ["Какая госпошлина за регистрацию договора аренды в 2026 году?", "Для организаций 44 000 ₽, для физлиц 4 000 ₽ (актуально на июль 2026, ст. 333.33 НК РФ). Если кадастровая стоимость объекта выше 22 млн ₽, организация платит 0,2% от неё, но не более 1 млн ₽. За регистрацию допсоглашения к аренде: 2 000 ₽ для организаций и 700 ₽ для физлиц."], ["Какие документы нужны кадастровому инженеру?", "Договор аренды или его проект, свежая выписка ЕГРН на объект, поэтажный план с экспликацией и эскиз контура арендуемой части. Если чего-то нет, скажем, где взять, или запросим сами по доверенности. Личное присутствие не нужно."], ["Договор на 11 месяцев нужно регистрировать?", "Нет. Регистрации подлежит аренда здания или помещения на срок от года (п. 2 ст. 651 ГК РФ), поэтому договор на 11 месяцев работает без Росреестра и без техплана. Но если после продления общий срок превышает год, договор придётся зарегистрировать, и техплан на часть понадобится."], ["Можно ли сдать в аренду часть торгового зала без стен?", "Да. Часть не обязана быть отдельным изолированным помещением: сдать можно зону в зале, блок стеллажей, участок этажа. Главное, чтобы инженер описал контур однозначно и он совпадал с предметом договора. Именно на нечётких контурах чаще всего и спотыкается регистрация."], ["Что происходит с частью после окончания аренды?", "Учёт части привязан к договору: части присваивается учётный номер, а после прекращения аренды сведения о ней из ЕГРН исключаются. Новому арендатору на ту же площадь готовится свой техплан, если контур отличается от прежнего."], ["Росреестр приостановил регистрацию аренды, что делать?", "Приостановка это не отказ: закон даёт 3 месяца на устранение причин. Разбираем уведомление, исправляем техплан или доносим документы, при спорной позиции регистратора идём в апелляционную комиссию Росреестра, там рассмотрение занимает 30 дней. Как правило, снимаем приостановки без суда."]],seo:{"title": "Техплан для регистрации аренды в Москве от 15 000 ₽", "desc": "Технический план части здания или помещения для регистрации аренды в Росреестре. Готовим за 3-5 дней, подаём электронно, ведём до выписки ЕГРН. Москва и МО."}}

/* ===== ФОРМА ===== */
function wireForm(){
  const f=document.getElementById('leadform'); if(!f) return;
  const name=document.getElementById('f-name'),phone=document.getElementById('f-phone'),agree=document.getElementById('f-agree'),
        submit=document.getElementById('f-submit'),note=document.getElementById('f-note'),ok=document.getElementById('f-ok');
  const eN=document.getElementById('e-name'),eP=document.getElementById('e-phone');
  note.textContent=FORM_ENDPOINT?'':'Демо-режим: проверка полей работает, заявка пока не уходит. Впишите адрес Formspree в Настройках панели.';
  const okPhone=()=>phone.value.replace(/\D/g,'').length>=10, okName=()=>name.value.trim().length>=2;
  function mark(el,e,good){el.classList.toggle('bad',!good);e.classList.toggle('show',!good);}
  function refresh(){submit.disabled=!(okName()&&okPhone()&&agree.checked);submit.style.opacity=submit.disabled?.55:1;}
  [name,phone].forEach(el=>el.addEventListener('input',refresh));
  name.addEventListener('blur',()=>mark(name,eN,okName()));phone.addEventListener('blur',()=>mark(phone,eP,okPhone()));
  agree.addEventListener('change',refresh); refresh();
  f.addEventListener('submit',async e=>{e.preventDefault();mark(name,eN,okName());mark(phone,eP,okPhone());
    if(!(okName()&&okPhone()&&agree.checked)){refresh();return;}
    if(f._gotcha&&f._gotcha.value)return;
    submit.disabled=true;submit.textContent='Отправляем…';
    if(!FORM_ENDPOINT){setTimeout(()=>{ok.classList.add('show');f.reset();submit.textContent='Отправить заявку';note.textContent='Это демо. В рабочей версии заявка ушла бы на почту компании.';},700);return;}
    try{const r=await fetch(FORM_ENDPOINT,{method:'POST',headers:{Accept:'application/json'},body:new FormData(f)});
      if(r.ok){location.hash='#/spasibo';}else{note.textContent='Что-то пошло не так. Позвоните нам или напишите в Telegram.';submit.disabled=false;submit.textContent='Отправить заявку';}
    }catch(_){note.textContent='Нет связи. Проверьте интернет или позвоните нам.';submit.disabled=false;submit.textContent='Отправить заявку';}});
}

function initMap(){
  if(!window.L)return;const el=document.getElementById('keomap');if(!el||el._init)return;el._init=true;
  const lat=55.70258,lon=37.69617;
  const map=L.map(el,{scrollWheelZoom:false,attributionControl:true}).setView([lat,lon],16);
  map.attributionControl.setPrefix(false);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'© OpenStreetMap, © CARTO'}).addTo(map);
  const icon=L.divIcon({className:'keopin',html:'<div class="keopin-dot"></div>',iconSize:[22,22],iconAnchor:[11,11]});
  L.marker([lat,lon],{icon:icon}).addTo(map).bindPopup('<b>KEO GROUP</b><br>2-й Южнопортовый проезд, 20А стр.4<br>+7 499 647-75-66').openPopup();
  setTimeout(function(){map.invalidateSize();},200);
}
const DEFAULT_TITLE=document.title;

function setPageMeta(h){
  let title=DEFAULT_TITLE,desc=DEFAULT_DESC;
  const um=h.match(/^\/u\/([a-z0-9-]+)$/);
  if(um){
    const rd=RICH[um[1]],sv=svcBySlug[um[1]];
    if(rd&&rd.seo&&rd.seo.title){title=rd.seo.title;if(rd.seo.desc)desc=rd.seo.desc;}
    else if(rd){title=rd.title+' | KEO GROUP, Москва';desc=rd.lede;}
    else if(sv){title=sv.name+' в Москве | KEO GROUP';desc=sv.note;}
  }
  document.title=title;
  const md=document.querySelector('meta[name="description"]');
  if(md)md.setAttribute('content',desc);
}
