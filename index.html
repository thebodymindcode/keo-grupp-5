"zashchita-ot-snosa-sud": [{"type":"p","text":"Иск ДГИ о сносе это не приговор, но и не та ситуация, где можно тянуть. Город требует снести здание за счёт собственника, и единственное, что реально решает исход, это судебная строительно-техническая экспертиза. Мы заходим в дело именно с этой стороны: не спорить словами, а сделать так, чтобы эксперт подтвердил, что объект безопасен и соответствует нормам."},{"type":"p","text":"Сложность в том, что с 2024 года экспертизу проводят только государственные эксперты, и они не дают второго шанса: что зафиксировано на осмотре, то и ляжет в решение. Поэтому вся работа идёт ДО эксперта, пока дело стоит в очереди. Это и есть наш профиль и причина, по которой у нас более 40 выигранных дел."},{"type":"bullets","items":["Оценка иска ДГИ, документов и реальных перспектив дела","Подготовка здания к экспертизе: обследование, устранение нарушений по пожарной и конструктивной части","Сопровождение судебной экспертизы РФЦСЭ при Минюсте","Ведение дела в арбитражных и районных судах до отказа ДГИ в иске","При необходимости исключение объекта из Приложения № 2 к 819-ПП в судебном порядке"]},{"type":"note","style":"warn","text":"Чем раньше подключиться, тем больше шансов. После отрицательного заключения эксперта изменить что-либо почти невозможно, а подготовка к экспертизе занимает время, которого в конце процесса уже нет."}], "rekonstrukciya-zdaniy": [{"type": "p", "text": "Реконструкция это не косметика и не капремонт. Меняются параметры здания: площадь, этажность, высота, посадка на участке, иногда назначение. Юридически это почти всегда новое строительство по объёму бумаг, поэтому без разрешения тут не обойтись, а самовольная переделка рискует превратиться в самострой со всеми последствиями вплоть до сноса и отказа в регистрации."}, {"type": "p", "text": "Главная боль владельца действующего объекта: остановить бизнес нельзя, а стройка идёт прямо в работающем здании. Поэтому проект приходится разбивать на очереди и захватки, считать нагрузки на существующие конструкции (обследование тут обязательно, без него проектировщик работает вслепую) и аккуратно вести фасадную часть через АГР, если облик меняется. Параллельно держим связь с эксплуатацией, чтобы инженерные сети не вставали."}, {"type": "bullets", "items": ["Обследование несущих конструкций и оценка фактического состояния перед проектом", "Проектная документация со стадией, проходящей экспертизу, и расчётом по очередям", "АГР в ДГП, если затрагиваются фасады, входные группы, высота", "Разрешение на строительство и сопровождение строительного надзора (как правило, Мосгосстройнадзор)", "Ввод в эксплуатацию и внесение новых характеристик в ЕГРН по техплану"]}, {"type": "note", "style": "info", "text": "Самый частый провал: люди начинают «двигать стены» до получения разрешения, а потом не могут ввести объект и зарегистрировать изменённую площадь. Порядок строго обратный: сначала разрешение, потом работы."}, {"type": "p", "text": "На выходе клиент получает законченный цикл: согласованный проект, действующее разрешение, пройденный надзор, акт ввода и обновлённую запись в реестре, где площадь и параметры совпадают с тем, что построено по факту. Дальше объектом можно спокойно распоряжаться, закладывать, продавать, сдавать."}], "novoe-stroitelstvo": [{"type": "p", "text": "Новое коммерческое строительство в Москве это длинная цепочка согласований, где каждое звено зависит от предыдущего. Начинается всё не с котлована, а с участка и его градостроительного потенциала. ГПЗУ показывает, что вообще можно построить на этой земле: вид использования, предельную высоту, плотность, отступы. Если идея клиента не бьётся с ГПЗУ, дальше двигаться бессмысленно, сначала меняем исходные условия."}, {"type": "p", "text": "Функция техзаказчика в том и состоит, чтобы вести инвестора через весь маршрут и не дать ему провалиться между ведомствами. Где-то нужно решение Градостроительно-земельной комиссии, где-то проработка облика через АГР, где-то экспертиза проекта и техусловия на сети. Сильная сторона грамотного сопровождения это умение выстроить очередь согласований заранее, а не латать дыры по ходу."}, {"type": "bullets", "items": ["Анализ участка, получение и проверка ГПЗУ под задуманный объект", "Вопросы ГЗК, если меняются параметры или вид разрешённого использования", "АГР и архитектурная концепция, экспертиза проектной документации", "Техусловия и согласование подключения к инженерным сетям", "Разрешение на строительство, надзор, ввод и постановка объекта на кадастр с регистрацией прав"]}, {"type": "key", "stat": "ГПЗУ", "text": "это первый документ, который реально определяет судьбу проекта. Проверять потенциал участка нужно до покупки земли, а не после."}, {"type": "p", "text": "Результат для инвестора: построенный и введённый объект с чистой юридической историей, поставленный на кадастровый учёт, с зарегистрированными правами. То есть актив, который банк готов кредитовать, а покупатель купить без дисконта за риски."}], "agr-arhitekturnye-resheniya": [{"type": "p", "text": "АГР это архитектурно-градостроительное решение, согласование внешнего облика здания в ДГП. Под него попадает почти всё, что видно с улицы: фасады, отделочные материалы и цвет, входные группы, витрины, кровля, иногда даже схема размещения вывесок. Город хочет понимать, как объект впишется в окружающую застройку, и держит эту планку довольно жёстко."}, {"type": "p", "text": "Подводный камень в том, что АГР это не формальная печать, а содержательная оценка. Архитектурный совет смотрит на пропорции, на сочетание с соседними зданиями, на качество материалов. Слабая концепция уходит на доработку, и проект встаёт. Поэтому грамотный подход начинается не с подачи, а с проработки самого облика: визуализации, развёртки фасадов, паспорт колеров, узлы по входным группам. Чем убедительнее картинка и обоснование, тем меньше кругов доработки."}, {"type": "bullets", "items": ["Архитектурная концепция и фотореалистичные визуализации объекта в среде", "Развёртки фасадов, ведомость отделочных материалов и цветовое решение", "Проработка входных групп, витрин, навесов и наружного оформления", "Комплект документов для подачи на АГР и сопровождение рассмотрения", "Корректировки по замечаниям совета до получения согласования"]}, {"type": "note", "style": "info", "text": "Решение по облику всегда за архитектурным советом, гарантировать его нельзя. Но качественная концепция и понятное обоснование заметно повышают шансы пройти с минимумом правок."}, {"type": "p", "text": "Клиент получает согласованный облик, на который можно опираться при проектировании и стройке, и спокойствие: фасад не придётся переделывать постфактум, а к вводу не возникнет претензий по внешнему виду."}], "nekapitalnye-obekty": [{"type": "p", "text": "Некапитальный объект это то, что стоит на земле без прочной связи с ней: павильон, киоск, сезонная веранда кафе, навес. Перенести можно без несоразмерного ущерба, фундамента в привычном смысле нет. Регулируется тема в Москве отдельно, в том числе постановлением 636-ПП о размещении нестационарных объектов. И вот тут многие попадают: кажется, что «это же просто палатка», а на деле без согласованного размещения объект считается незаконным и попадает под демонтаж."}, {"type": "p", "text": "Сложность в зыбкой грани между некапитальным и капитальным. Если объект «прирос» к земле, обзавёлся фундаментом или капитальными стенами, его легко переквалифицируют в самострой, а это уже совсем другая ответственность. Поэтому защита от сноса строится на двух опорах: правильное оформление размещения и доказательство именно некапитального характера постройки."}, {"type": "bullets", "items": ["Оценка статуса объекта: некапитальный или есть признаки капитального", "Согласование размещения и включение в схему по правилам 636-ПП", "Легализация уже стоящих павильонов и веранд, приведение в соответствие", "Защита от демонтажа: работа с уведомлениями о сносе, обоснование законности", "Сопровождение в спорах и подготовка позиции по статусу объекта"]}, {"type": "key", "stat": "636-ПП", "text": "ключевой московский акт по нестационарным объектам. Размещение вне схемы и без согласования это прямой путь к демонтажу за счёт владельца."}, {"type": "p", "text": "Итог работы: объект стоит законно, есть основания для размещения, и его нельзя снести по тихому уведомлению. Бизнес на этой точке перестаёт быть временным и держится на бумагах, а не на удаче."}], "avtorskiy-stroitelnyy-nadzor": [{"type": "p", "text": "Тут важно не путать два надзора, они про разное. Авторский ведёт сам проектировщик и следит, чтобы стройка шла ровно по проекту, без самодеятельности подрядчика. Строительный контролирует качество и соответствие нормам со стороны заказчика. А государственный строительный надзор (по большинству объектов это Мосгосстройнадзор) проверяет стройку от лица города и без его положительного заключения объект не ввести."}, {"type": "p", "text": "Реальная боль начинается, когда надзор спохватываются в конце. Скрытые работы (арматура перед заливкой, гидроизоляция, узлы примыканий) нельзя проверить задним числом, их потом не вскроешь без вреда. Если их не освидетельствовали вовремя и не закрыли актами, на вводе всплывают вопросы, и приходится либо вскрывать конструкции, либо долго доказывать качество. Поэтому надзор это не финальная процедура, а ежедневная работа с первого дня."}, {"type": "bullets", "items": ["Авторский надзор проектировщика: контроль соответствия работ проекту и журнал", "Освидетельствование скрытых работ и ответственных конструкций по ходу стройки", "Ведение исполнительной документации, которая понадобится на вводе", "Взаимодействие с государственным надзором и подготовка к итоговой проверке", "Фиксация и устранение замечаний до того, как они станут проблемой на вводе"]}, {"type": "note", "style": "info", "text": "Чистая исполнительная документация это половина успеха на вводе. Объект может быть построен идеально, но без актов на скрытые работы доказать это органу почти нечем."}, {"type": "p", "text": "Клиент получает стройку, которая не разойдётся с проектом и с нормами, собранный пакет исполнительной документации и понятную дорогу к акту ввода без авральных переделок в последний месяц."}], "inzhenernye-seti": [{"type": "p", "text": "Без воды, канализации и водоотведения не запустить почти ни один объект, а подключение к сетям это отдельный квест со своими правилами и своими сроками. В Москве по водоснабжению и канализации это Мосводоканал, по поверхностному водоотводу (ливнёвке) Мосводосток, плюс смежные сети и пересечения с чужими коммуникациями. Каждый ресурсник работает по своей процедуре, и согласовать одно, забыв про другое, не получится."}, {"type": "p", "text": "Главный подводный камень это техусловия и мощности. Бывает, что нужной мощности в точке подключения просто нет, или существующие сети проходят прямо через пятно застройки и их надо выносить или защищать. Всё это выясняется через запрос техусловий и согласование схемы, и чем раньше, тем лучше: переигрывать посадку здания из-за чужой трубы на стадии готового проекта дорого и больно."}, {"type": "bullets", "items": ["Запрос и анализ технических условий на подключение к сетям", "Согласование с Мосводоканалом по водоснабжению и канализации", "Согласование с Мосводостоком по поверхностному водоотводу", "Проработка пересечений с существующими сетями, вынос и защита коммуникаций", "Сопровождение до подключения и оформление актов разграничения"]}, {"type": "key", "stat": "ТУ", "text": "технические условия запрашивают на раннем этапе. Они показывают, хватает ли мощности и что придётся выносить, до того как готов проект."}, {"type": "p", "text": "На выходе у объекта есть законное подключение ко всем нужным сетям, согласованные схемы и акты, по которым ресурсники признают объект своим абонентом. То, без чего ввод и нормальная эксплуатация попросту не состоятся."}], "legalizaciya-819pp": [{"type": "p", "text": "Постановление Правительства Москвы №819-ПП запускает тяжёлый сценарий для собственника. Город сам признаёт здание или его часть самовольной постройкой и заносит объект в специальный перечень. Дальше идут запрет на регистрационные действия, требование снести за свой счёт, иногда расчёт платы за пользование участком. Легализация по 819-ПП это путь в обратную сторону: сначала добиться исключения объекта из перечня через Градостроительно-земельную комиссию (ГЗК), затем закрепить право собственности так, чтобы его больше не оспаривали."}, {"type": "p", "text": "Сложность в том, что 819-ПП и статья 222 ГК работают по разной логике. Город смотрит на градостроительные нарушения и соответствие участка. Суд по статье 222 ГК проверяет другое: есть ли права на землю, нет ли угрозы жизни и здоровью, не задеты ли чужие интересы. Объект может выглядеть «чистым» для регистратора и при этом застрять в перечне из-за давнего изменения площади или незарегистрированной реконструкции. Одной бумагой такое не закрыть."}, {"type": "bullets", "items": ["Поднимаем историю объекта: разрешения, акты ввода, давние изменения площади и назначения", "Сверяем фактические границы и параметры с данными ЕГРН и Геофонда, ищем расхождения", "Готовим техническую и правовую позицию для исключения из перечня 819-ПП", "Сопровождаем рабочую группу и заседание ГЗК, снимаем замечания профильных департаментов", "При спорной ситуации выходим в суд с иском о признании права по статье 222 ГК"]}, {"type": "note", "style": "info", "text": "Решение об исключении из перечня принимает ГЗК, а право собственности при споре закрепляет суд. Мы отвечаем за качество позиции и доказательной базы, и говорим об этом честно с первого разговора."}], "krt-zashchita": [{"type": "p", "text": "Комплексное развитие территорий это инструмент главы 10 Градостроительного кодекса. По нему город или инвестор переустраивают целый квартал: сносят старое, строят новое, меняют назначение земель. Для собственника, чьё здание попало в границы КРТ, ставка простая. Объект могут изъять, а компенсацию насчитать по своим методикам, и она нередко далека от реальной ценности бизнеса и недвижимости. Защита при КРТ это работа на двух фронтах сразу: попробовать вывести объект из проекта и параллельно бороться за честную цену."}, {"type": "p", "text": "Тонкость в сроках и процедуре. Решение о КРТ проходит публичные обсуждения и утверждается, а у собственника есть узкие окна, чтобы заявить возражения, оспорить включение или не согласиться с оценкой. Пропустил момент, и спор переходит в куда более жёсткую плоскость изъятия. Подключаться надо на стадии проекта, а не когда уже пришло уведомление."}, {"type": "bullets", "items": ["Анализируем решение о КРТ и проверяем, законно ли объект попал в границы", "Готовим возражения и заявления на этапе обсуждения и утверждения проекта", "Заказываем независимую оценку рыночной стоимости, упущенной выгоды и затрат на перенос бизнеса", "Оспариваем заниженную компенсацию и условия изъятия в суде", "Ведём переговоры с инвестором и городом о выкупе на справедливых условиях"]}, {"type": "key", "stat": "Два сценария", "text": "Либо объект остаётся вне КРТ, либо собственник получает компенсацию по реальной стоимости. Какой из них достижим, зависит от стадии проекта и фактов по конкретному кварталу, и это мы оцениваем честно до начала работы."}], "vri-zemelnogo-uchastka": [{"type": "p", "text": "Вид разрешённого использования это юридический ответ на вопрос, что вообще можно делать на участке: торговый центр, склад, жильё, офис или производство. Если фактический проект расходится с записанным ВРИ, стройка и эксплуатация превращаются в нарушение, а здание рискует получить статус самостроя. Смена ВРИ возвращает участок и планы в одно правовое поле. Делается это двумя путями, и выбор между ними определяет весь срок и логику работы."}, {"type": "p", "text": "Первый путь по статье 37 Градостроительного кодекса, когда нужный вид уже есть среди условно разрешённых или вспомогательных по правилам землепользования и застройки. Тогда вопрос решается через публичные слушания и комиссию. Второй путь тяжелее: если ПЗЗ в этой территориальной зоне нужного вида просто не содержат, сначала придётся менять сами правила, а это отдельная долгая история. Частая ошибка собственника поменять ВРИ без оглядки на градостроительный регламент и получить участок, на котором по факту строить всё равно нельзя."}, {"type": "bullets", "items": ["Читаем ПЗЗ и регламент территориальной зоны, определяем, доступен ли нужный вид без изменения правил", "Выбираем маршрут: через перечень условно разрешённых видов или через корректировку ПЗЗ", "Готовим обоснование, сверяем планируемые параметры с предельными по зоне", "Сопровождаем публичные слушания и заседание комиссии, снимаем замечания", "Доводим до внесения изменений в ЕГРН и закрепляем новый ВРИ за участком"]}], "pmt-pzz": [{"type": "p", "text": "ПЗЗ и ПМТ это два документа, на которых держится почти любой девелоперский проект в Москве. Правила землепользования и застройки задают, что и с какими предельными параметрами разрешено в каждой территориальной зоне: высотность, плотность, назначение. Проект межевания территории описывает, как нарезаны границы участков, где красные линии и зоны действия публичных сервитутов. Когда планы собственника не вписываются в действующие документы, их нужно либо корректировать, либо разрабатывать заново под конкретную территорию."}, {"type": "p", "text": "Сложность не в чертеже, а в согласованиях. Изменение ПЗЗ затрагивает интересы города, соседей и профильных департаментов, проходит публичные слушания и комиссию по землепользованию. ПМТ цепляет инженерные сети, транспорт, обременения и охранные зоны, и одна не учтённая красная линия способна остановить всю стройку. ДГП смотрит документ придирчиво, поэтому слабое обоснование разворачивают на первом же круге."}, {"type": "bullets", "items": ["Оцениваем, что блокирует проект: параметры по ПЗЗ, границы или обременения в ПМТ", "Готовим градостроительное обоснование изменений под цель собственника", "Разрабатываем или корректируем проект межевания с учётом сетей, сервитутов и красных линий", "Согласуем с ДГП и профильными органами", "Проводим через публичные слушания и закрепляем изменения официально"]}, {"type": "note", "style": "info", "text": "ПЗЗ и ПМТ часто идут в связке: менять один документ без оглядки на второй почти всегда тупик. Поэтому мы сразу смотрим на оба и строим единый маршрут, а не латаем по одной бумаге."}], "gzk": [{"type": "p", "text": "Градостроительно-земельная комиссия это орган, через который в Москве проходят чувствительные земельные и градостроительные вопросы: исключение из перечня самостроя, изменение условий аренды и назначения участка, спорные параметры застройки. Для собственника ГЗК часто становится точкой, где судьба объекта решается за одно заседание. И решает её не красноречие на месте, а то, как заранее собрано досье и насколько чисто закрыты вопросы профильных департаментов."}, {"type": "p", "text": "Главная ошибка прийти на комиссию с дырами в документах и надеяться объяснить их голосом. ГЗК работает на основе заключений департаментов и материалов рабочей группы. Если у Геофонда, ДГП или имущественного блока остались замечания, вопрос либо отклоняют, либо откладывают на доработку. Каждый такой круг это потерянные месяцы. Реальная работа идёт до заседания: снять противоречия, подготовить позицию, предугадать вопросы."}, {"type": "bullets", "items": ["Формируем досье: правоустанавливающие документы, технические данные, обоснование по сути вопроса", "Заранее снимаем замечания профильных департаментов на стадии рабочей группы", "Прорабатываем вероятные возражения и готовим ответы на них", "Сопровождаем заседание и оперативно реагируем на уточнения комиссии", "При отказе анализируем мотивы и готовим повторный выход или судебный путь"]}, {"type": "key", "stat": "Решает ГЗК", "text": "Финальное слово всегда за комиссией, и гарантировать её решение нельзя. Наша зона ответственности в том, чтобы у комиссии не осталось формальных причин сказать «нет»."}], "redevelopment-promploschadok": [{"type": "p", "text": "Редевелопмент промплощадки это превращение бывшего завода, склада или производственной территории в нечто новое: жильё, офисы, общественные пространства, многофункциональный комплекс. На бумаге звучит просто, на деле это самый многослойный из земельных проектов. Менять придётся всё сразу: проект планировки территории, правила застройки, вид разрешённого использования, а иногда ещё разбираться с экологией промышленного прошлого и старыми сетями, которые шли под другую нагрузку."}, {"type": "p", "text": "Подводных камней здесь больше, чем где-либо. Старый ВРИ под производство, территориальная зона по ПЗЗ, которая не пускает жильё, обременения и сервитуты в ПМТ, незарегистрированные постройки советских лет, риск попадания в границы КРТ. Каждый из этих узлов умеет в одиночку остановить проект. Поэтому редевелопмент это не одна услуга, а выстроенная последовательность, где порядок шагов важен не меньше их содержания: поменять ВРИ раньше времени значит потом всё переделывать."}, {"type": "bullets", "items": ["Делаем аудит территории: ВРИ, зона по ПЗЗ, межевание, обременения, статус построек", "Строим дорожную карту смены функционала с правильной очерёдностью действий", "Разрабатываем или корректируем ППТ и ПЗЗ под новое назначение", "Меняем ВРИ участка под жильё, общественную или смешанную функцию", "Закрываем вопросы самостроя и легализуем существующие объекты до старта стройки", "Сопровождаем согласования в ДГП и прохождение ГЗК"]}, {"type": "note", "style": "info", "text": "Срок и стоимость редевелопмента сильно зависят от исходного состояния площадки. Поэтому начинаем всегда с аудита, чтобы оценивать проект по фактам, а не по общим словам."}], "pasport-bezopasnosti-zos": [{"type": "p", "text": "Когда здание выводят из тени, легализуют или защищают на Градостроительно-земельной комиссии, на стол ложатся не только правовые бумаги, но и документы, которые отвечают на главный вопрос города и суда: безопасен ли объект для людей. Заключение о соответствии (ЗОС) подтверждает, что построенное отвечает требованиям технических регламентов и проектной документации. Паспорт безопасности описывает, как объект защищён от угроз и нештатных ситуаций. Без этого пакета разговор о признании права часто даже не начинается."}, {"type": "p", "text": "Слабое место в том, что эти документы не выдают «задним числом» на любую самовольную постройку. ЗОС опирается на обследование конструкций, расчёты и соответствие нормам, и если реконструкцию делали кустарно, всплывут реальные дефекты. Тогда сначала нужно привести объект в порядок, а уже потом оформлять. Попытка собрать ЗОС на здание с настоящими нарушениями несущих конструкций или пожарной безопасности это не путь к легализации, а прямой риск, и честный специалист скажет об этом сразу."}, {"type": "bullets", "items": ["Проводим техническое обследование конструкций и оцениваем фактическое состояние объекта", "Готовим заключение о соответствии нормам и проектным требованиям", "Разрабатываем паспорт безопасности под назначение и категорию объекта", "Увязываем документы с пакетом для 819-ПП и материалами для ГЗК", "Подсказываем, что нужно устранить, если объект пока не дотягивает до норм"]}, {"type": "key", "stat": "Фундамент легализации", "text": "ЗОС и паспорт безопасности это не формальность, а доказательная база, на которую опираются и комиссия, и суд. Чем она чище, тем меньше поводов для отказа."}], "rosreestr-priostanovki": [{"type": "p", "text": "Приостановка это пауза, которую регистратор берёт, когда в заявлении или документах нашёл изъян. Отказ приходит, если за срок приостановки причину не сняли. По 218-ФЗ оснований десятки: от несостыковки площади в техплане и ЕГРН до спора о границах, неполного пакета, ошибок кадастрового инженера, обременений, которые всплыли по ходу проверки. Беда в том, что в уведомлении регистратор пишет норму статьи 26, а не пошаговый рецепт. Человек видит «не представлены документы» и не понимает, какие именно и почему."}, {"type": "p", "text": "Грамотная работа начинается с разбора самого уведомления и выписки ЕГРН: что реально не сошлось и устранимо ли это в принципе. Иногда хватает донести один документ или переподписать техплан. Иногда корень глубже, в самом объекте, и тогда косметика не поможет, нужно править первопричину. Важно уложиться в срок приостановки, потому что после отказа путь длиннее и дороже."}, {"type": "bullets", "items": ["Читаем уведомление и поднимаем историю объекта в ЕГРН, отделяем формальные придирки от реальных проблем", "Готовим недостающее или исправленное: техплан, схему, согласования, ответы на замечания", "Подаём дополнительные документы в рамках текущей приостановки, без новой госпошлины, где это возможно", "Если регистратор не прав, идём в апелляционную комиссию при Росреестре или в суд", "Доводим до записи в ЕГРН и контролируем итоговую выписку"]}, {"type": "note", "style": "info", "text": "Приостановку чаще снять достройкой пакета внутри отведённого срока, чем спорить уже после отказа. Поэтому скорость реакции на уведомление решает почти всё."},{"type": "h2", "text": "Сколько всего причин приостановки и какие чаще всего"}, {"type": "key", "stat": "около 60 оснований", "text": "столько причин приостановки перечисляет статья 26 Федерального закона 218-ФЗ. На практике почти все дела упираются в десяток типовых ошибок, и почти все они устранимы."}, {"type": "p", "text": "Приостановка это не отказ, а пауза, обычно на три месяца, чтобы устранить замечание. Если за этот срок причину не убрать, Росреестр выносит отказ, а госпошлина не возвращается. Поэтому важно быстро понять формулировку и закрыть её правильно."}, {"type": "bullets", "items": ["Данные в договоре и в ЕГРН не совпадают (разные площади, номера комнат), часто из-за неузаконенной перепланировки", "Нет согласия супруга на сделку или справки, что в браке не состоит", "Субаренда без согласия собственника, которое не прописали в основном договоре", "Приложили не те документы (техпаспорт БТИ вместо технического плана)", "Объект под арестом или в залоге, обременение всплыло при проверке", "Госпошлина не оплачена или внесена неверными реквизитами", "Нет одобрения крупной сделки или решения участников"]}, {"type": "note", "style": "info", "text": "Если формулировка приостановки непонятна, пришлите нам её копию и документы по объекту. Мы разберём причину, поправим техническую часть и подадим заново. Чаще всего вопрос закрывается в досудебном порядке, без суда и лишних трат."}], "registraciya-prava": [{"type": "p", "text": "Регистрация права это момент, когда собственность становится официальной: запись в ЕГРН, а не бумажный договор, делает вас владельцем. Звучит как формальность, но именно тут чаще всего и спотыкаются. Объект должен стоять на кадастровом учёте, документы-основания должны биться между собой по площади, адресу, назначению, а цепочка переходов прав не иметь дыр."}, {"type": "p", "text": "Сложность зависит от основания. Купля-продажа здания, регистрация только что построенного объекта, переход доли, право по решению суда: у каждого свой набор подводных камней. По судебному решению, например, регистратор всё равно проверяет, исполнимо ли оно технически и описан ли объект так, чтобы его можно было однозначно опознать в кадастре. Расплывчатая формулировка в резолютивной части превращается в приостановку."}, {"type": "bullets", "items": ["Сверяем документы-основания с данными ЕГРН и кадастра, ловим расхождения заранее", "Проверяем, поставлен ли объект на учёт, и при необходимости готовим техплан", "Собираем полный пакет под конкретное основание: сделка, ввод в эксплуатацию, наследство, суд", "Подаём на регистрацию и ведём диалог с регистратором до записи о праве", "Выдаём итоговую выписку ЕГРН, подтверждающую собственность"]}, {"type": "key", "stat": "218-ФЗ", "text": "Базовый закон о госрегистрации. Право возникает не из договора, а из записи в ЕГРН, и до неё юридически вы ещё не собственник."}], "izmeneniya-egrn": [{"type": "p", "text": "Перепланировку сделали, помещение переназначили, здание реконструировали, а в ЕГРН всё по-старому. Это разрыв между тем, что есть в реальности, и тем, что записано в реестре. Пока он висит, объект сложно продать, заложить, ввести в оборот: банк и покупатель смотрят именно на выписку, а не на ваш ремонт."}, {"type": "p", "text": "Тонкость в том, что «внести изменения» это не одна кнопка. Под капотом разные процедуры: где-то нужен новый технический план с актуальными характеристиками, где-то предварительное согласование изменений с органами, а после перепланировки часто и приёмочный акт. Если поменялась площадь, конфигурация, назначение или этажность, регистратор захочет документ, который это законно подтверждает. Самовольная переделка без согласования в ЕГРН не пройдёт, её сначала надо узаконить."}, {"type": "bullets", "items": ["Определяем, что именно изменилось и какая процедура это закрывает", "Привлекаем кадастрового инженера для нового техплана с верными характеристиками", "Собираем основания: согласования, акты, проектную документацию", "Подаём заявление об учёте изменений и регистрации, если затронуто право", "Получаем обновлённую выписку, где характеристики совпадают с реальностью"]}, {"type": "note", "style": "info", "text": "Частая ошибка: сначала продают или закладывают объект, и только при сделке выясняется, что данные в ЕГРН устарели. Приводить реестр в порядок дешевле заранее, на спокойную голову."}], "kadastrovyy-uchet": [{"type": "p", "text": "Кадастровый учёт это внесение объекта в ЕГРН как уникальной вещи с собственными характеристиками: площадь, координаты, назначение, кадастровый номер. Без учёта объекта для государства как бы нет, и право на него зарегистрировать не выйдет. Учёт бывает трёх типов: постановка нового объекта, учёт изменений у существующего и снятие с учёта того, что перестало существовать."}, {"type": "p", "text": "Главный документ почти всегда техплан или акт обследования от кадастрового инженера, и качество этих бумаг определяет исход. Ошибся инженер в координатах или площади, и регистратор остановит. Часто учёт и регистрацию права проводят одной заявкой, это экономит круг, но повышает цену ошибки: спотыкается одно, висит всё. Отдельная боль это ранее учтённые объекты, по которым в реестре дыры в характеристиках."}, {"type": "bullets", "items": ["Ставим новый объект на учёт по техплану с присвоением кадастрового номера", "Учитываем изменения характеристик: площадь, назначение, конфигурация", "Снимаем с учёта прекратившие существование объекты по акту обследования", "Уточняем сведения по ранее учтённым объектам, где данные неполны", "Связываем учёт с регистрацией права в одну процедуру, где это уместно"]}, {"type": "key", "stat": "ЕГРН", "text": "Единый реестр объединяет кадастр и права. Учёт это про сам объект и его характеристики, регистрация про то, чей он."}], "tehnicheskiy-plan": [{"type": "p", "text": "Технический план это документ, по которому объект попадает в кадастр или меняет в нём свои характеристики. Готовит его кадастровый инженер, и именно техплан отвечает на вопросы «где этот объект расположен», «какой он площади» и «что он вообще такое». Делают планы на здание, на помещение внутри здания и на сооружение, и наполнение у каждого своё."}, {"type": "p", "text": "Здесь критична связка инженера и реальности. План опирается на проектную документацию, разрешения, обмеры, координаты. Если фактическое состояние объекта разошлось с проектом, а инженер этого не учёл, расхождение всплывёт на проверке в Росреестре и вернётся приостановкой. Инженер должен состоять в саморегулируемой организации, а сам техплан подписывается его усиленной электронной подписью и сдаётся в формате XML. Бумажная распечатка это уже не первичный документ, а лишь его читаемое отражение."}, {"type": "bullets", "items": ["Выезд и обмеры, привязка к координатам, сверка с проектом и разрешениями", "Техплан на здание целиком, на помещение или на сооружение под свою задачу", "Электронный XML-документ с подписью кадастрового инженера для подачи в Росреестр", "Проверка характеристик на стыковку с ЕГРН до подачи, чтобы не словить остановку", "Готовый план как основание для учёта и регистрации права"]}, {"type": "note", "style": "info", "text": "Качество техплана решает судьбу всей процедуры. Дешёвый план с неточными координатами или площадью оборачивается приостановками, переделкой и потерянным временем."}], "tehnicheskoe-zaklyuchenie": [{"type": "p", "text": "Техническое заключение, или ТЗК, это документ о состоянии несущих конструкций и о том, можно ли безопасно выполнить задуманные работы. Его делает специализированная организация, которая обследует здание и пишет вывод: затрагивает ли перепланировка несущие стены, выдержат ли перекрытия нагрузку, не пострадает ли безопасность здания и соседей."}, {"type": "p", "text": "Без грамотного ТЗК согласование перепланировки в Москве буксует. Жилищная инспекция хочет понимать, что вмешательство в конструкции просчитано, а не сделано на глаз. Особенно когда речь о проёмах в несущих стенах, переносе мокрых зон, нагрузке на перекрытия. ТЗК бывает на планируемые работы и на уже выполненные, чтобы узаконить сделанное. Во втором случае заключение должно честно отразить фактическое состояние, иначе при проверке всплывёт несоответствие."}, {"type": "bullets", "items": ["Обследование конструкций: несущие стены, перекрытия, узлы, фактическое состояние", "Вывод о допустимости работ и условиях, при которых они безопасны", "ТЗК на планируемую перепланировку и на уже выполненные работы для узаконивания", "Расчёты и рекомендации по усилению, если несущие элементы затронуты", "Документ как основание для проекта и согласования в МЖИ"]}, {"type": "key", "stat": "МЖИ", "text": "Мосжилинспекция согласует перепланировки в Москве. Для работ, затрагивающих конструкции, ТЗК обычно обязательная часть пакета."}], "proekt-pereplanirovki": [{"type": "p", "text": "Проект перепланировки это инженерный документ, который превращает ваше «хочу перенести стену» в законную и согласованную схему. В нём показано, что было, что станет, какие конструкции затрагиваются, как решены вопросы вентиляции, водоснабжения, пожарной безопасности. Без проекта серьёзную перепланировку в Москве не согласуют, а самовольную потом заставят либо узаконивать, либо возвращать как было."}, {"type": "p", "text": "Подводный камень в том, что не всякая хотелка проходит. Нельзя расширять мокрую зону на жилые помещения соседей снизу, трогать общедомовые коммуникации, ослаблять несущие элементы без расчётов и усиления. Грамотный подход это сначала прикинуть, что в принципе согласуемо, заказать ТЗК на конструкции и только потом рисовать проект под реально проходимое решение. Проект делает организация с допуском, а согласование идёт через Мосжилинспекцию, нередко в связке с другими ведомствами."}, {"type": "bullets", "items": ["Оценка идеи на согласуемость до начала проектирования, чтобы не платить за нереализуемое", "Проект с разделами по конструкциям, инженерным системам и безопасности", "Связка с ТЗК, если затронуты несущие элементы", "Подача и сопровождение согласования в МЖИ до решения", "Помощь с приёмкой выполненных работ и внесением изменений в ЕГРН"]}, {"type": "note", "style": "info", "text": "Дешевле начать с проекта и согласования, чем сделать ремонт по своему вкусу и потом обнаружить, что узаконить его невозможно и придётся демонтировать."}], "akt-obsledovaniya": [{"type": "p", "text": "Акт обследования это документ, которым кадастровый инженер подтверждает: объекта больше нет. Снесли здание, разобрали сооружение, объединили помещения так, что прежнее перестало существовать. Пока акт не подан и объект не снят с учёта, он живёт в ЕГРН как существующий, и за него начисляют налог, по нему висит право, его требуют при сделках с участком."}, {"type": "p", "text": "Логика обратная техплану. Техплан рождает объект, акт обследования его хоронит. Инженер выезжает, фиксирует, что объекта в натуре нет, и оформляет заключение об этом факте. Тонкость в основаниях: должно быть видно, на каком праве и по какому решению объект прекратил существование, иначе регистратор усомнится. Если на снесённом объекте было зарегистрировано право, снятие с учёта идёт в связке с прекращением этого права, иначе в реестре останется собственность на воздух."}, {"type": "bullets", "items": ["Выезд инженера и фиксация факта, что объекта в натуре нет", "Акт обследования с заключением о прекращении существования", "Подача на снятие с кадастрового учёта в Росреестр", "Одновременное прекращение зарегистрированного права на исчезнувший объект", "Чистая выписка по участку без призрачных строений"]}, {"type": "key", "stat": "Снятие с учёта", "text": "Несуществующий объект сам из ЕГРН не пропадёт. Пока его не сняли актом обследования, он числится и тянет за собой налог и обязательства."}], "registraciya-dogovorov": [{"type": "p", "text": "Часть договоров по недвижимости работает только после записи в ЕГРН. Долгосрочная аренда, ипотека, уступка, дополнительные соглашения к ним: до регистрации они не дают того эффекта, на который рассчитывают стороны. Аренда сроком от года без регистрации не противопоставляется третьим лицам, а ипотека без записи об обременении не защищает залогодержателя."}, {"type": "p", "text": "Сложность в деталях самого договора и в состоянии объекта. Регистратор смотрит, описан ли предмет однозначно, совпадают ли стороны и их полномочия, нет ли конфликтующих обременений, согласуется ли срок и условия с законом. Допсоглашение, меняющее срок или предмет, нередко тоже подлежит регистрации, и про это забывают. Отдельная тонкость это аренда части помещения: чтобы зарегистрировать её, часто нужен техплан с координатами именно этой части."}, {"type": "bullets", "items": ["Проверка договора на регистрабельность и чистоту предмета и обременений", "Регистрация долгосрочной аренды, в том числе аренды части объекта по техплану", "Регистрация ипотеки и записи об обременении в пользу залогодержателя", "Регистрация допсоглашений, меняющих срок, цену или предмет", "Снятие записей об обременении после исполнения обязательств"]}, {"type": "note", "style": "info", "text": "Допсоглашение к зарегистрированному договору само по себе часто требует регистрации. Без неё стороны считают условия изменёнными, а для реестра они прежние."}], "razdel-obedinenie": [{"type": "p", "text": "Раздел, объединение и выдел доли это операции, которые меняют сам состав объектов в реестре. Из одного помещения делают два, два смежных сливают в одно, из общей собственности выделяют долю в натуре как самостоятельный объект. Прежние объекты при этом перестают существовать, а на их месте появляются новые, со своими кадастровыми номерами и характеристиками."}, {"type": "p", "text": "Тонкостей много. Образуемые объекты должны быть пригодны как самостоятельные: иметь обособленность, доступ, отвечать требованиям к назначению. Раздел в общей собственности требует согласия сособственников или решения суда. Площади после раздела или объединения должны сходиться с исходными, иначе регистратор увидит несостыковку. Под всё это кадастровый инженер готовит техпланы на новые объекты, а старые снимаются с учёта. Право на новые объекты регистрируется заново, и порядок действий тут важен не меньше документов."}, {"type": "bullets", "items": ["Оценка, можно ли в принципе разделить, объединить или выделить долю по характеристикам объекта", "Техпланы кадастрового инженера на образуемые объекты", "Согласие сособственников или опора на решение суда при выделе", "Снятие исходных объектов с учёта и постановка новых", "Регистрация права на вновь образованные объекты с новыми номерами"]}, {"type": "key", "stat": "218-ФЗ", "text": "Закон требует, чтобы образуемые объекты были самостоятельными и пригодными к использованию. Просто провести линию на плане недостаточно."}], "mezhevanie-granicy": [{"type": "p", "text": "Межевание это определение и закрепление границ участка в координатах. Пока границы не уточнены, участок в ЕГРН живёт без точных очертаний, и это источник споров с соседями, проблем при продаже, отказов при стройке. Уточнение границ переводит участок из размытого состояния в чёткие координаты, привязанные к государственной системе."}, {"type": "p", "text": "Работа делится на несколько задач. Координирование и уточнение границ, вынос точек в натуру, когда координаты из реестра выносят на местность колышками, и перераспределение, когда границы соседних участков меняют по соглашению. Камень преткновения это согласование границ с соседями и пересечения с чужими участками или реестровые ошибки в старых координатах. Кадастровый инженер готовит межевой план, проводит согласование, а при наложении границ нередко приходится разбираться, чья координата ошибочна, и исправлять реестровую ошибку."}, {"type": "bullets", "items": ["Геодезические работы и определение границ в координатах", "Уточнение границ ранее учтённого участка и устранение реестровых ошибок", "Вынос точек в натуру: перенос координат из реестра на местность", "Перераспределение границ соседних участков по соглашению", "Согласование границ с соседями и оформление межевого плана"]}, {"type": "note", "style": "info", "text": "Большая часть споров о земле растёт из неуточнённых или ошибочных границ. Привести их в порядок до конфликта проще, чем потом доказывать своё в суде."}], "dgi-vykup-159fz": [{"type": "p", "text": "Если ваш бизнес давно сидит в городском помещении по аренде у ДГИ, закон даёт реальный шанс выкупить эти метры в собственность на льготных условиях. Это и есть преимущественное право выкупа по 159-ФЗ: субъект малого или среднего предпринимательства покупает арендованную недвижимость без торгов, по рыночной цене, а не по цене аукциона, где её перебили бы более крупные игроки. Звучит просто, но дорога от заявления до договора купли-продажи редко бывает гладкой."}, {"type": "p", "text": "Главная развилка почти всегда одна: цена. Город заказывает оценку через ГБУ или привлечённого оценщика, и эта сумма нередко выходит заметно выше реальной рыночной. Дальше включается ваше право на спор. Оценку можно и нужно оспаривать через независимую оценку и заключение СРО, а при упорстве сторон через суд. Параллельно проверяется само право на выкуп: соответствие статусу МСП, срок непрерывной аренды, отсутствие долгов по платежам, тип объекта. Любая мелочь вроде просрочки по аренде способна стать поводом для отказа."}, {"type": "bullets", "items": ["Проверяем основания: статус в реестре МСП, срок аренды, чистоту платежей и сам объект", "Готовим и подаём заявление о реализации преимущественного права в ДГИ", "Анализируем городскую оценку и заказываем независимую, чтобы сбить завышение", "Оспариваем стоимость через СРО, согласительные процедуры и при необходимости суд", "Сопровождаем подписание договора, рассрочку и регистрацию права в Росреестре"]}, {"type": "key", "stat": "159-ФЗ", "text": "Базовый закон о преимущественном праве выкупа арендованного имущества для малого и среднего бизнеса."}, {"type": "note", "style": "info", "text": "Чем раньше подключиться, тем больше пространства для манёвра: проще закрыть формальные придирки и грамотно оспорить оценку до того, как город зафиксирует свою цену."}], "dgi-spory": [{"type": "p", "text": "Споры с ДГИ это отдельный жанр. Город как арендодатель и собственник действует через типовые механизмы: доначисляет арендную плату задним числом, насчитывает неустойку за просрочку, штрафует за нецелевое использование, а в крайнем случае идёт на расторжение договора и освобождение помещения. Для арендатора это часто гром среди ясного неба: пришла претензия на крупную сумму, а вы даже не понимали, что нарушили."}, {"type": "p", "text": "Сложность в том, что у города сильная позиция по умолчанию и шаблонные расчёты, которые далеко не всегда верны. На практике доначисления опираются на спорную кадастровую стоимость, неправильно применённый коэффициент или пересмотр ставки, который можно оспорить. Неустойка нередко завышена и подлежит снижению по статье 333 ГК, если она несоразмерна нарушению. А угроза расторжения часто служит рычагом давления, хотя для него нужны действительно существенные основания. Молча соглашаться с цифрой из претензии почти всегда невыгодно."}, {"type": "bullets", "items": ["Разбираем претензию по составу: за что именно начислено и по какой формуле", "Проверяем расчёт аренды, коэффициенты и базовую стоимость на ошибки", "Снижаем неустойку и пени, когда они несоразмерны нарушению", "Готовим мотивированный ответ, ведём переговоры и согласительные процедуры", "Защищаем интересы в суде, если договориться по-хорошему не выходит"]}, {"type": "note", "style": "info", "text": "На претензию ДГИ почти всегда есть встречные аргументы. Главное не пропустить сроки на возражение и не подписать признание долга на эмоциях."}], "dgi-lgotnaya-arenda": [{"type": "p", "text": "Город сдаёт часть помещений по льготной ставке: социальному бизнесу, отдельным видам деятельности, резидентам определённых программ. Разница с рыночной арендой бывает существенной, поэтому за такую ставку стоит держаться. Но льгота это не подарок навсегда, а право с условиями, которые надо правильно оформить, вовремя продлить и не потерять по формальной причине."}, {"type": "p", "text": "Тонкость в том, что основания льготы нужно подтверждать, и делать это аккуратно. Сменился вид деятельности, выпали из нужной категории, пропустили срок подачи документов на продление, накопили просрочку по платежам: любой из этих поводов город может использовать, чтобы перевести вас на полную рыночную ставку. Иногда отказ в льготе или её пересмотр сами по себе спорны, и тогда решение ДГИ можно оспаривать. Грамотный подход это не разовая бумага, а сопровождение всего цикла отношений с городом, чтобы льгота не слетела на ровном месте."}, {"type": "bullets", "items": ["Проверяем право на льготу и собираем документы, подтверждающие основания", "Оформляем договор аренды или допсоглашение с льготной ставкой", "Ведём продление и своевременно подаём документы, чтобы не выпасть из категории", "Оспариваем необоснованный отказ в льготе или перевод на рыночную ставку", "Контролируем условия, чтобы сохранить льготу при изменениях в бизнесе"]}, {"type": "note", "style": "info", "text": "Льготную ставку чаще теряют не из-за проверок, а из-за пропущенных сроков и неподтверждённых оснований. Календарь продлений и порядок в документах решают почти всё."}], "osparivanie-kadastrovoy-stoimosti": [{"type": "p", "text": "Кадастровая стоимость это та цифра, от которой считается налог на имущество и землю, аренда у города и выкупная цена. Государство определяет её массовой оценкой, по моделям и средним показателям, без выезда на конкретный объект. Поэтому она часто отрывается от реальной рыночной цены, и почти всегда в большую сторону. Платите вы при этом по завышенной базе, год за годом."}, {"type": "p", "text": "Снизить её можно, и закон прямо это позволяет: через установление кадастровой стоимости в размере рыночной. Опора здесь независимая оценка, которая показывает реальную цену объекта на нужную дату, со всеми его минусами вроде износа, неудачного расположения или обременений, которых массовая модель просто не видела. Дальше путь идёт через бюджетное учреждение, которое вело оценку, а при отказе через суд. Тонкостей много: важна дата оценки, корректный аналог, правильно выбранный период, с которого пересчитают платежи. На практике расхождение между кадастровой и рыночной ценой оказывается ощутимым, и его снижение напрямую режет ваши налоги и арендные платежи."}, {"type": "bullets", "items": ["Анализируем текущую кадастровую стоимость и считаем потенциал снижения", "Заказываем независимую рыночную оценку объекта на корректную дату", "Готовим заявление в ГБУ об установлении стоимости в размере рыночной", "Сопровождаем спор в суде, если бюджетное учреждение отказывает", "Помогаем пересчитать налог и аренду с учётом сниженной стоимости"]}, {"type": "key", "stat": "Налог и аренда", "text": "Кадастровая стоимость напрямую влияет на размер имущественного и земельного налога и на платежи городу."}, {"type": "note", "style": "info", "text": "Новая стоимость применяется с 1 января года, в котором подано заявление, поэтому каждый год промедления это потерянная переплата."}], "upravlenie-nedvizhimostyu": [{"type": "p", "text": "Управление коммерческой недвижимостью это работа, которая держит объект в форме и заставляет его приносить деньги. Не просто «следить за зданием». Техническая эксплуатация, отношения с арендаторами, контроль расходов, планирование ремонтов, отчётность собственнику. Всё это сходится в одних руках. Объект может стоять красивый, но если инженерия сыпется, а арендаторы уходят, его доходность тает на глазах."}, {"type": "p", "text": "Главная ловушка тут в коротком взгляде. Собственник видит арендный поток и радуется, а изношенные сети, просроченные регламенты обслуживания и накопленный недоремонт зреют под ковром. Потом вылезают разом и съедают прибыль за год. Вторая сложность это арендаторы: пустующие площади, задержки платежей, спорные условия договоров. Каждый процент простоя бьёт по доходности сильнее, чем кажется на бумаге."}, {"type": "bullets", "items": ["Техническая эксплуатация: инженерные системы, регламенты обслуживания, аварийные риски, планово-предупредительные ремонты", "Арендные процессы: договоры, индексация ставок, контроль платежей, снижение простоя площадей", "Финансы объекта: бюджет расходов, прозрачная отчётность собственнику, поиск точек экономии", "Документы и соответствие: разрешительная и эксплуатационная документация в порядке"]}, {"type": "key", "stat": "Доходность", "text": "Складывается не только из ставки аренды, а из разницы между потоком и реальными расходами на содержание. Управление работает на обе части этой разницы."}, {"type": "p", "text": "Грамотный подход начинается с честной оценки состояния объекта и его экономики. Дальше выстраивается эксплуатация по регламентам, наводится порядок в договорах, расходы берутся под контроль. В результате собственник получает понятную картину: сколько объект приносит, сколько съедает, где слабые места и что с ними делать. Не обещаем рост дохода по щелчку, но убираем хаос, из-за которого деньги утекают незаметно."}], "negosudarstvennaya-ekspertiza": [{"type": "p", "text": "Негосударственная экспертиза это независимая проверка проектной документации и результатов инженерных изысканий на соответствие техническим регламентам, нормам и требованиям безопасности. По закону у застройщика есть выбор: идти в государственную экспертизу или в аккредитованную негосударственную. Итог в обоих случаях один по силе, это заключение экспертизы, без которого не получить разрешение на строительство по объектам, где экспертиза обязательна."}, {"type": "p", "text": "Сложность в том, что проект и изыскания проверяют как единое целое. Архитектура, конструктив, инженерные сети, пожарная безопасность, геология участка. Слабое звено в любом разделе тормозит весь пакет. Частая беда это документация, собранная разными подрядчиками вразнобой: разделы не бьются между собой, изыскания устарели или сделаны не по тому участку, состав комплекта неполный. Эксперт возвращает такое на доработку, и сроки уходят. Поэтому грамотнее заходить в экспертизу с уже причёсанным комплектом, а не сырым."}, {"type": "bullets", "items": ["Проверка проектной документации по всем разделам на соответствие нормам и регламентам", "Оценка результатов инженерных изысканий: геология, геодезия, экология участка", "Анализ комплектности и внутренней согласованности разделов до подачи", "Сопровождение через замечания эксперта и доработку до положительного заключения"]}, {"type": "note", "style": "info", "text": "Негосударственная экспертиза подходит не для всех объектов. Где по закону требуется именно государственная, замена не сработает, это стоит проверить до старта."}, {"type": "p", "text": "Разумный путь такой: сначала аудит комплекта своими силами или с экспертом, потом подача, потом отработка замечаний. Заключение это не печать ради печати, а документ, который дальше нужен для разрешения и защищает собственника от претензий по безопасности. Гарантировать положительный исход заранее нельзя, он зависит от качества самого проекта. Но грамотная подготовка резко снижает число кругов доработки."}], "konsultaciya-ekspress-dose": [{"type": "p", "text": "Платная консультация и экспресс-досье это быстрый разбор вашей ситуации с участком или объектом, когда нужно понять расклад за несколько дней, а не за месяцы. Вы приходите с вопросом, мы смотрим, что говорят документы и публичные данные, и собираем досье: где вы сейчас, какие есть ограничения, какие шаги реально сделать и в каком порядке. Это навигация перед тем, как вкладывать силы и деньги."}, {"type": "p", "text": "Подводный камень в том, что градостроительные правила переплетены между собой, и одно цепляет другое. ГПЗУ задаёт, что и как можно строить на участке. АГР это согласование архитектурно-градостроительного решения по облику. Постановление 819-ПП регулирует снос и строительство в Москве. КРТ это комплексное развитие территорий, которое может полностью переписать судьбу участка. Человек со стороны легко упускает связку и теряет время на тупиковый путь. Экспресс-досье как раз показывает эти связки сразу."}, {"type": "bullets", "items": ["Разбор градостроительного плана участка (ГПЗУ): что разрешено, какие ограничения", "Оценка по АГР: нужно ли согласование облика и насколько это реально", "Ситуация по 819-ПП: снос, строительство, порядок действий в Москве", "Риски и возможности по КРТ: попадает ли участок, что это меняет", "Дорожная карта: приоритетные шаги и порядок на ближайшее время"]}, {"type": "key", "stat": "Несколько дней", "text": "Срок, за который собирается экспресс-досье и план действий. Не финальный проект, а ясная отправная точка, чтобы не блуждать вслепую."}, {"type": "p", "text": "Результат это короткий понятный документ и устный разбор: что у вас за ситуация, где риски, какие варианты и с чего начать. Мы не обещаем, что любой замысел пройдёт, иногда честный вывод это «так нельзя, а вот так можно». Зато вы перестаёте действовать наугад и экономите главное, время и нервы, на ранней развилке."}]};
const ARTICLES=[{"slug": "priostanovka-rosreestr", "title": "Приостановка регистрации в Росреестре: почему случается и как снять", "lede": "Сделка по коммерческому объекту закрыта, деньги уплачены, документы поданы, а вместо выписки приходит уведомление о приостановке. Разбираем, чем приостановка отличается от отказа, какие причины бьют по коммерческой недвижимости чаще всего, сколько у вас есть времени и как снять приостановку до того, как регистратор откажет.", "readmin": 11, "tldr": ["Приостановка это не отказ. Это пауза до трёх месяцев, чтобы устранить замечания. Отказ наступает по статье 27, только если в этот срок причины не сняты.", "Основания закрыты перечнем в статье 26 218-ФЗ: нет прав или полномочий, обратилось ненадлежащее лицо, противоречия с ЕГРН, форма и содержание документов не по требованиям, нет сведений о границах участка.", "Стандартный максимум приостановки по решению регистратора три месяца. По межведомственным запросам не больше месяца, по заявлению самих сторон тоже до месяца.", "Снять приостановку можно дополнительными документами без новой госпошлины, пока срок не истёк. Параллельный путь, обжалование в апелляционную комиссию: 15 рабочих дней на подачу, 15 рабочих дней на рассмотрение.", "Лучшая защита от приостановки это проверка ЕГРН и полномочий ДО подачи. Большинство замечаний по коммерции это границы участка, форма документов и подпись неуполномоченного лица."], "blocks": [{"type": "h2", "text": "Что такое приостановка и почему это ещё не проигрыш"}, {"type": "p", "text": "Приостановка осуществления кадастрового учёта и регистрации прав это решение государственного регистратора **отложить** регистрацию, потому что он увидел в документах препятствие. Ключевое слово здесь: отложить. Регистратор не закрывает дверь, он даёт время исправить то, что мешает внести запись в ЕГРН."}, {"type": "p", "text": "Путают приостановку с отказом постоянно, и зря. Это две разные стадии одной процедуры. **Сначала всегда идёт приостановка**. Отказ по статье 27 218-ФЗ наступает только в одном случае: если в течение срока приостановки причины, перечисленные в статье 26, так и не устранены. То есть отказ это не отдельное самостоятельное событие, а итог незакрытой приостановки. Пока срок идёт и вы работаете с замечаниями, до отказа дело не доходит."}, {"type": "key", "stat": "Ст. 27", "text": "В регистрации отказывают, если в течение срока приостановления не устранены причины, указанные в статье 26 218-ФЗ. Нет неустранённых причин, нет и отказа."}, {"type": "h2", "text": "Правовая база: статьи 26 и 27 Закона о регистрации недвижимости"}, {"type": "p", "text": "Всё держится на Федеральном законе от 13.07.2015 № 218-ФЗ «О государственной регистрации недвижимости». Статья 26 устанавливает основания и сроки приостановления. Статья 27 описывает отказ. Логика связки простая: сначала статья 26 (пауза и замечания), и только потом, если ничего не исправлено, статья 27 (отказ)."}, {"type": "p", "text": "Важная деталь для бизнеса: **перечень оснований в статье 26 закрытый**. Регистратор не может приостановить регистрацию по произвольной причине, он обязан сослаться на конкретный пункт. В уведомлении о приостановке всегда стоит номер пункта статьи 26 и описание препятствия. С этого номера и начинается ваша работа: он подсказывает, что именно регистратор считает неправильным."}, {"type": "quote", "text": "Осуществление государственного кадастрового учёта и (или) государственной регистрации прав приостанавливается на срок до устранения причин, послуживших основанием для приостановления, но не более чем на три месяца, если иное не установлено настоящей статьёй.", "cite": "Часть 2 статьи 26 Федерального закона № 218-ФЗ"}, {"type": "h2", "text": "Типичные причины приостановки по коммерческой недвижимости"}, {"type": "p", "text": "В офисах, складах, торговых помещениях и земельных участках под застройку набор грабель свой. Вот те основания из статьи 26, на которые в коммерции натыкаются чаще всего."}, {"type": "bullets", "items": ["Заявитель не имеет права на объект или не уполномочен им распоряжаться (п. 1), классика при продаже от лица компании, у которой право не зарегистрировано или обременено.", "С заявлением обратилось ненадлежащее лицо (п. 2): представитель без действующей доверенности, директор с истёкшими полномочиями, подписант не из ЕГРЮЛ.", "Противоречия между заявленными и уже зарегистрированными правами (п. 3) или между сведениями документов и ЕГРН: разные площади, адреса, кадастровые номера.", "Форма или содержание документа не соответствуют требованиям закона (п. 7): договор без существенных условий, без обязательных приложений, неверно описанный предмет.", "Документы подписаны неправомочным лицом (п. 8): подпись поставил тот, у кого на это нет полномочий по уставу или доверенности.", "В ЕГРН нет сведений о границах земельного участка или о границах участка под зданием или сооружением. Это основание заработало с 1 марта 2025 года и бьёт по сделкам с землёй и стройкой особенно больно."]}, {"type": "note", "style": "warn", "text": "Отсутствие установленных границ участка в ЕГРН стало одной из самых частых причин остановки сделок с коммерческой землёй. Если участок не отмежёван, регистрацию могут приостановить. **Проверяйте границы заранее**, межевание это не быстрая процедура и в три месяца приостановки вы можете не уложиться."}, {"type": "h2", "text": "Сколько длится приостановка и что делать в это время"}, {"type": "p", "text": "Срок зависит от того, по какому основанию вас остановили. Это не всегда три месяца, и для планирования сделки разница принципиальна."}, {"type": "key", "stat": "3 месяца", "text": "Максимум приостановки по решению регистратора (ч. 2 ст. 26). Если причина в недостающих документах по межведомственным запросам, не больше месяца (ч. 3). По заявлению самих сторон о приостановке, тоже до месяца."}, {"type": "p", "text": "Срок отсчитывается не для того, чтобы вы ждали. Это окно для действий. Чем раньше внутри него вы закроете замечание, тем быстрее регистратор возобновит регистрацию: ждать конца трёх месяцев не нужно, запись внесут сразу после устранения причины. Поэтому первое, что делаете, получив уведомление, читаете пункт статьи 26 и формулировку препятствия и сразу планируете, чем его закрыть."}, {"type": "steps", "items": ["Откройте уведомление и найдите пункт статьи 26 и описание причины. Без точного понимания основания все дальнейшие шаги вслепую.", "Оцените, согласны ли вы с регистратором. Если замечание справедливо, готовите документы на устранение. Если считаете приостановку незаконной, готовите обжалование.", "Соберите недостающие или исправленные документы: доверенность, корректный договор, решение об одобрении сделки, документы о границах участка.", "Подайте дополнительные документы по тому же делу через МФЦ или Госуслуги. Новую госпошлину при этом платить не нужно, дело то же самое.", "Дождитесь возобновления. После устранения причины регистратор продолжает регистрацию, и срок не тянется до конца трёх месяцев."]}, {"type": "h2", "text": "Как устранить причину и подать заново"}, {"type": "p", "text": "Самый частый и самый быстрый путь это донести документы по уже открытому делу. Вы не подаёте сделку заново и не платите пошлину второй раз, вы досылаете то, чего не хватило, пока приостановка действует. Регистратор видит, что препятствие снято, и **возобновляет регистрацию**."}, {"type": "p", "text": "Если же срок приостановки истёк и причину снять не удалось, регистратор выносит отказ. После отказа дело закрыто, и заходить придётся новым пакетом и новой пошлиной. Поэтому правило железное: укладывайтесь в срок. Не тяните с межеванием, с получением корпоративного одобрения, с исправлением договора. Три месяца кажутся большими, но согласование внутри компании и кадастровые работы съедают их быстро."}, {"type": "note", "style": "info", "text": "Донесение документов по тому же делу **не требует повторной госпошлины**. А вот после отказа и новой подачи пошлину платят заново. Это ещё один довод закрыть замечание внутри срока приостановки, а не доводить до отказа."}, {"type": "h2", "text": "Досудебное обжалование: апелляционная комиссия"}, {"type": "p", "text": "Если вы считаете, что регистратор остановил регистрацию необоснованно, спорить можно не только донесением документов, но и обжалованием. Первая инстанция здесь это апелляционная комиссия при органе регистрации прав. Порядок описан в статье 31.2 218-ФЗ."}, {"type": "p", "text": "Раньше через комиссию обжаловали в основном приостановки по кадастровому учёту. С 2026 года механизм расширили: апелляционная комиссия рассматривает и обжалование приостановок по регистрации прав. Для коммерческих сделок это удобный и довольно быстрый досудебный фильтр."}, {"type": "key", "stat": "15 + 15", "text": "15 рабочих дней с даты решения о приостановке на подачу заявления в комиссию. И не более 15 рабочих дней со дня поступления заявления на его рассмотрение."}, {"type": "bullets", "items": ["Срок подачи: 15 рабочих дней с даты принятия решения о приостановлении. Пропустите, и комиссия заявление не примет.", "Способы подачи: лично, почтой с описью и уведомлением, в электронной форме через интернет и единый портал.", "Срок рассмотрения: не более 15 рабочих дней со дня поступления заявления в комиссию.", "Обжаловать можно только первый поданный пакет документов по делу.", "Если решение о приостановке уже обжаловано в суд, комиссия заявление не примет. Два пути одновременно не работают, выбирайте один.", "Если комиссия удовлетворяет жалобу, приостановка отменяется и регистрацию продолжают. Если отклоняет, остаётся суд."]}, {"type": "h2", "text": "Судебное обжалование"}, {"type": "p", "text": "И приостановку, и отказ заинтересованное лицо вправе обжаловать в суд (ст. 26 и 27 218-ФЗ). Для компаний и ИП это арбитражный суд, для граждан суды общей юрисдикции. Если до этого вы прошли апелляционную комиссию и она отклонила жалобу, её решение тоже обжалуется в суд в порядке административного судопроизводства."}, {"type": "p", "text": "На практике суд это последний рубеж: дольше и дороже, чем донести документы или пройти комиссию. Поэтому идут туда, когда регистратор и комиссия не правы по сути, а сама приостановка уже грозит сорвать сделку. Перед иском трезво оцените, что быстрее закроет вопрос: исправленный документ за неделю или судебный процесс на месяцы."}, {"type": "h2", "text": "Как вообще не попасть в приостановку"}, {"type": "p", "text": "Дешевле всего приостановка, которой не случилось. Большинство замечаний по коммерческой недвижимости предсказуемы, и снимаются они проверкой до подачи, а не после."}, {"type": "steps", "items": ["Закажите свежую выписку из ЕГРН на объект и сверьте площадь, адрес, кадастровый номер и правообладателя с тем, что в договоре. Расхождения это прямой путь к пункту 3 статьи 26.", "Проверьте границы земельного участка в ЕГРН заранее. Нет установленных границ, делайте межевание до сделки, а не во время приостановки.", "Проверьте полномочия подписанта: действующая выписка из ЕГРЮЛ, срок полномочий директора, доверенность представителя, корпоративное одобрение крупной сделки или сделки с заинтересованностью.", "Выверьте форму и содержание договора: существенные условия, точное описание предмета, обязательные приложения, нотариальная форма там, где она требуется.", "Соберите полный комплект документов под конкретное основание и формат подачи. Один недостающий лист, и регистрацию останавливают на ровном месте."]}, {"type": "note", "style": "info", "text": "По коммерческим объектам в Москве предварительная проверка ЕГРН, границ участка и полномочий сторон закрывает большую часть оснований из статьи 26 ещё до подачи. Это **самая дешёвая страховка** от срыва сроков сделки."}], "faq": [{"q": "Приостановка это уже отказ?", "a": "Нет. Приостановка это пауза, чтобы устранить замечания, она длится до трёх месяцев. Отказ по статье 27 наступает только если в течение срока приостановки причины из статьи 26 так и не сняты. Пока срок идёт и вы работаете, до отказа дело не доходит."}, {"q": "Сколько максимум длится приостановка?", "a": "По решению регистратора стандартный максимум три месяца (ч. 2 ст. 26). Если приостановили из-за недостающих документов по межведомственным запросам, не больше месяца. По заявлению самих сторон о приостановке тоже до месяца."}, {"q": "Нужно ли платить госпошлину заново при устранении замечаний?", "a": "Нет, если вы доносите документы по тому же делу, пока приостановка действует. Повторная пошлина появляется только если дело завершилось отказом и вы подаёте сделку новым пакетом."}, {"q": "В какой срок подавать жалобу в апелляционную комиссию?", "a": "15 рабочих дней с даты решения о приостановлении. Комиссия рассматривает заявление не более 15 рабочих дней со дня его поступления. Если решение уже обжаловано в суд, комиссия заявление не примет."}, {"q": "Какая причина приостановки по коммерции самая частая?", "a": "Чаще всего это проблемы с границами земельного участка (основания, связанные с границами участка, действуют с 1 марта 2025 года), несоответствие формы и содержания документов и подпись неуполномоченного лица. Все три снимаются проверкой до подачи."}], "start": "Получили уведомление о приостановке по коммерческому объекту в Москве? Пришлите нам номер пункта статьи 26 из уведомления и пакет документов по сделке. Юристы KEO GROUP разберут основание, подскажут, что донести и в какой срок, и при необходимости подготовят обжалование в апелляционную комиссию или суд, чтобы не довести дело до отказа.", "sources": [{"title": "Федеральный закон от 13.07.2015 № 218-ФЗ «О государственной регистрации недвижимости», статья 26 (КонсультантПлюс)", "url": "https://www.consultant.ru/document/cons_doc_LAW_182661/f10dc2166d2e834a0086658226e2f96fb5f1cb5f/"}, {"title": "Статья 27. Отказ в осуществлении кадастрового учёта и (или) государственной регистрации прав (КонсультантПлюс)", "url": "https://www.consultant.ru/document/cons_doc_LAW_182661/57b5e78bd4909a6e15d4c3c0f17f15de22d885f5/"}, {"title": "Статья 31.2. Порядок обжалования решения о приостановлении в апелляционную комиссию (КонсультантПлюс)", "url": "https://www.consultant.ru/document/cons_doc_LAW_182661/83295bf0f5e516b936afd4c1a22990e4e41c4d3d/"}, {"title": "Закон о регистрации недвижимости 218-ФЗ, полный текст (ГАРАНТ)", "url": "https://base.garant.ru/71129192/"}, {"title": "Новые основания для приостановки кадастрового учёта и регистрации с 2025 года (АСЕРГРУПП)", "url": "https://asergroup.ru/news/zemelno-imushchestvennye-otnosheniya/novye-osnovaniya-dlya-priostanovki-gosudarstvennogo-kadastrovogo-ucheta-i-gosudarstvennoy-registrats/"}, {"title": "Как действует апелляционная комиссия по обжалованию приостановлений (CorConsult)", "url": "https://corconsult.ru/blog/appeal"}, {"title": "Основания и сроки приостановления кадастрового учёта и регистрации прав (Росреестр)", "url": "https://rosreestr.gov.ru/press/archive/publications/osnovaniya-i-sroki-priostanovleniya-osushchestvleniya-gosudarstvennogo-kadastrovogo-ucheta-i-ili-gos/"}], "img": "rosreestr", "c": "#27c281", "cat": "Росреестр", "date": "Июнь 2026"}, {"slug": "legalizaciya-819pp", "title": "Легализация самостроя в Москве: как выйти из 819-ПП и узаконить объект через ГЗК", "lede": "Адрес попал в городской список самовольных построек, и сделки встали, а над зданием повис риск сноса. Разбираем, что такое реестр по 819-ПП, на чём держится легализация по статье 222 ГК РФ, и как пройти внесудебный путь через Градостроительно-земельную комиссию: документы, этапы, сроки и ошибки, из-за которых дело буксует.", "readmin": 11, "tldr": ["819-ПП это городской механизм выявления самостроя. Сам перечень объектов с признаками самовольной постройки ведётся в приложениях, попадание в него блокирует сделки и открывает иск о сносе.", "Выявляет нарушения Госинспекция по недвижимости, иски о сносе подаёт Департамент городского имущества, а решение о сохранении объекта принимает ГЗК Москвы.", "Правовая основа сохранения постройки это пункт 3 статьи 222 ГК РФ: права на участок, допускающие стройку, соответствие объекта требованиям, отсутствие угрозы жизни и здоровью.", "Внесудебный путь через ГЗК: ЗОС, АГР, обоснование, согласования, протокол ГЗК, оплата компенсации, исключение из реестра и снятие обременений в ЕГРН.", "Ориентир по срокам внесудебной легализации: примерно 6 до 9 месяцев до выписки из протокола ГЗК."], "blocks": [{"type": "h2", "text": "Что такое реестр самовольных построек и 819-ПП"}, {"type": "p", "text": "Речь о постановлении Правительства Москвы от 11 декабря 2013 года № 819-ПП. Полное название длинное: «Об утверждении Положения о взаимодействии органов исполнительной власти города Москвы при организации работы по выявлению и пресечению незаконного (нецелевого) использования земельных участков». Документ живой, его правят регулярно, последняя редакция датирована 4 июня 2025 года, так что считать его устаревшим не стоит."}, {"type": "p", "text": "Главная для собственника часть это приложения к постановлению, городские перечни. Туда вносят адреса объектов с признаками самовольной постройки или реконструкции. Отдельно идут объекты, право собственности на которые уже зарегистрировано в ЕГРН, отдельно те, где регистрации нет. Перечень не статичен: новые адреса подгружают порциями в течение года. Чаще всего под удар попадают мансарды, надстроенные этажи, пристройки, антресоли и части помещений, которые появились без разрешений."}, {"type": "key", "stat": "11.12.2013", "text": "Дата принятия 819-ПП. Документ действует и сейчас, с поправками вплоть до редакции от 4 июня 2025 года."}, {"type": "h2", "text": "Чем грозит попадание в список"}, {"type": "p", "text": "Само по себе включение адреса в перечень **это ещё не снос**. Но это сигнал, что городские органы считают объект проблемным, и дальше начинается цепочка ограничений. Бизнес обычно сталкивается с ними не в теории, а когда срывается конкретная сделка."}, {"type": "bullets", "items": ["**Сделки блокируются**: продать, заложить или законно сдать объект, попавший в перечень, фактически невозможно, регистрация перехода права буксует.", "Появляется **риск сноса**: Департамент городского имущества может подать иск о сносе самовольной постройки за счёт собственника.", "Подключение и легализация сетей осложняются, новые мощности на спорный объект получить трудно.", "Возможны административные санкции за нецелевое использование участка, вплоть до приостановки деятельности и предписаний."]}, {"type": "note", "style": "warn", "text": "Опасно ждать «само рассосётся». Пока адрес висит в перечне, **время работает против собственника**: накапливается просрочка по платежам за землю, а иск о сносе может уйти в суд раньше, чем вы соберёте документы на легализацию."}, {"type": "h2", "text": "Правовая основа: статья 222 ГК РФ"}, {"type": "p", "text": "Юридический фундамент всей легализации это статья 222 Гражданского кодекса. Она же определяет, что вообще считать самостроем: здание или сооружение на участке, не отведённом для таких целей, либо построенное без нужных разрешений, либо с существенным нарушением градостроительных и строительных норм. По общему правилу право собственности на такой объект не возникает, и он подлежит сносу."}, {"type": "p", "text": "Но в той же статье есть и выход. Пункт 3 описывает условия, при которых постройку можно сохранить и признать на неё право. Их нужно соблюсти одновременно, не выборочно."}, {"type": "quote", "text": "Право собственности на самовольную постройку может быть признано за лицом, в собственности которого находится земельный участок, если лицо имеет права на участок, допускающие строительство на нём данного объекта; если на день обращения в суд постройка соответствует установленным требованиям; если сохранение постройки не нарушает права других лиц и не создаёт угрозу жизни и здоровью граждан.", "cite": "Пункт 3 статьи 222 ГК РФ"}, {"type": "p", "text": "Из этого вытекает простая логика подготовки: нужно **доказать три вещи**. Что земля под объектом ваша или у вас есть права на стройку. Что сам объект приведён к нормам или изначально им соответствует. Что он никому не мешает и безопасен. Если хотя бы один пункт провисает, ни суд, ни комиссия объект не сохранят."}, {"type": "h2", "text": "Роль ГЗК Москвы и что она решает"}, {"type": "p", "text": "В Москве у самостроя два маршрута: судебный (иск о признании права) и административный (через Градостроительно-земельную комиссию). Внесудебный путь через ГЗК обычно **дешевле, спокойнее и предсказуемее**, поэтому с него и стоит начинать, если объект в принципе сохраняем."}, {"type": "p", "text": "ГЗК это коллегиальный городской орган, который принимает решение по судьбе объекта. По сути она отвечает на вопрос: можно ли сохранить эту постройку в её фактических габаритах, на каких условиях и за какую плату в бюджет. Решение комиссии оформляется протоколом, и именно протокол ГЗК становится тем документом, на основании которого объект потом исключают из перечня 819-ПП."}, {"type": "p", "text": "Важно различать роли органов, их легко перепутать. Госинспекция по недвижимости (ГИН) выявляет нарушение и обследует объект. Департамент городского имущества подаёт иск о сносе. ГЗК решает вопрос о сохранении. ДГП согласует архитектурно-градостроительное решение. Каждый отвечает за свой участок, и заявителю приходится пройти через всех."}, {"type": "h2", "text": "Какие документы и заключения готовят"}, {"type": "p", "text": "Пакет собирается под конкретный объект, но костяк повторяется из дела в дело. Разрабатывают его аккредитованные организации, своими силами собственник такой комплект почти никогда не закроет."}, {"type": "bullets", "items": ["ЗОС, заключение о соответствии объекта строительным, санитарным и противопожарным нормам. Это сердце доказательной базы по статье 222.", "АГР, архитектурно-градостроительное решение, альбом, который согласует ДГП (Комитет по архитектуре и градостроительству).", "Обоснование сохранения объекта и его технико-экономические параметры: площади, габариты, назначение.", "Кадастровые и технические документы, обмеры, оценка пожарных рисков, при необходимости паспорт безопасности.", "Согласования по сетям, если объект затрагивает инженерную инфраструктуру: подключения и охранные зоны проверяют с ресурсоснабжающими организациями (например, по водоснабжению и канализации, водостоку), состав согласований зависит от того, какие сети реально задеты."]}, {"type": "note", "style": "info", "text": "Состав сетевых согласований не универсален. Если объект не пересекает водопровод, канализацию или водосток, тащить туда документы не нужно. Сначала определяют, какие сети реально затронуты, и только под них собирают согласования. Это экономит и время, и деньги."}, {"type": "h2", "text": "Этапы и сроки внесудебной легализации"}, {"type": "p", "text": "Дорога длинная, и идти по ней лучше по порядку. Каждый следующий шаг опирается на результат предыдущего, перепрыгнуть нельзя."}, {"type": "steps", "items": ["Обращение в Госинспекцию по недвижимости с заявлением о возможности внесудебного сохранения объекта.", "Рассмотрение на межведомственной комиссии: принципиальное решение, сохраняем или нет, и рекомендации по документации.", "Разработка технического пакета: ЗОС, АГР, обоснование, экспертизы. Самый трудоёмкий этап, его ведут аккредитованные организации.", "Согласование АГР в ДГП и получение необходимых согласований по сетям, если они затронуты.", "Повторное обследование объекта Госинспекцией: фактическое состояние сверяют с подготовленной документацией.", "Вынесение вопроса на ГЗК и получение протокола с условиями сохранения объекта.", "Оформление земельных отношений с Департаментом городского имущества и оплата установленной компенсации в бюджет.", "Финальное обследование, исключение объекта из перечня 819-ПП, снятие обременений и внесение сведений в ЕГРН."]}, {"type": "key", "stat": "6 до 9 месяцев", "text": "Ориентировочный срок внесудебной легализации до выписки из протокола ГЗК. На сложных объектах с сетями и спорной землёй может быть дольше."}, {"type": "h2", "text": "Чем всё заканчивается"}, {"type": "p",
