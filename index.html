"text": "Финал у удачного дела понятный. ГЗК выпускает протокол, который подтверждает: объект сохраняется. На его основании адрес исключают из перечня 819-ПП, а Департамент городского имущества отзывает иск о сносе, если тот уже был подан. Обременения снимают, сведения приводят в порядок в ЕГРН, и право собственности на объект снова становится «чистым»: с ним можно работать, продавать, закладывать, сдавать."}, {"type": "p", "text": "Если внесудебный путь по каким-то причинам закрыт, остаётся суд по статье 222 ГК РФ. Логика доказывания там та же самая, только площадкой выступает не комиссия, а судья, и многое решает та же техническая база: ЗОС, обмеры, экспертизы по безопасности."}, {"type": "h2", "text": "Типичные ошибки"}, {"type": "p", "text": "Большинство провалов это не злой умысел города, а слабая подготовка на старте. Вот что чаще всего ломает дело."}, {"type": "bullets", "items": ["Тянут до последнего. Заявление подают, когда иск о сносе уже в суде, и времени на спокойную работу не остаётся.", "Игнорируют землю. Объект приводят к нормам, а права на участок под стройку так и не оформлены, и пункт 3 статьи 222 не закрывается.", "Экономят на ЗОС и экспертизах. Заключение, сделанное «на отвяжись», разваливается при повторном обследовании.", "Фактический объект расходится с документацией. На бумаге одни габариты, в натуре другие, и Госинспекция это фиксирует.", "Берутся за безнадёжный объект. Если постройка нарушает нормы безопасности или права соседей всерьёз, её не сохранит ни ГЗК, ни суд, и деньги на документы уходят впустую.", "Путают органы и стадии, теряют время на согласованиях не там, где нужно."]}, {"type": "note", "style": "warn", "text": "Ни один консультант не вправе гарантировать сохранение объекта: решение принимает ГЗК или суд, и зависит оно от фактов. Честная работа это **трезвая оценка шансов** до вложений в документацию, а не обещание стопроцентного результата."}], "faq": [{"q": "Объект попал в перечень 819-ПП, значит, его точно снесут?", "a": "Нет. Включение в перечень это сигнал о проблеме и основание для ограничений, а не приговор. У собственника есть внесудебный путь через ГЗК и судебный по статье 222 ГК РФ. Снос наступает, когда объект сохранить нельзя или собственник бездействует."}, {"q": "Можно ли пройти легализацию без суда?", "a": "Да, если объект в принципе сохраняем. Внесудебный маршрут идёт через Госинспекцию по недвижимости и Градостроительно-земельную комиссию и заканчивается протоколом ГЗК и исключением из перечня. Суд по статье 222 это запасной вариант, если административный путь закрыт."}, {"q": "Сколько времени занимает легализация через ГЗК?", "a": "Ориентир по практике: примерно от 6 до 9 месяцев до получения выписки из протокола ГЗК. На объектах со сложной землёй и затронутыми сетями срок может вырасти. Точный прогноз дают только после оценки конкретного объекта."}, {"q": "Что такое ЗОС и зачем оно нужно?", "a": "ЗОС это заключение о соответствии объекта строительным, санитарным и противопожарным нормам. Оно доказывает ключевые условия статьи 222: что постройка отвечает требованиям и не угрожает жизни и здоровью. Без качественного ЗОС дело о сохранении объекта почти не имеет шансов."}, {"q": "Нужно ли согласование с водоканалом и водостоком?", "a": "Только если объект реально затрагивает соответствующие сети или их охранные зоны. Сначала определяют, какие коммуникации задеты, и согласования собирают строго под них. Универсального списка нет, его формируют под конкретный объект."}], "start": "Начните с трезвой диагностики. Проверьте, числится ли адрес в перечне 819-ПП и в каком приложении, поднимите правоустанавливающие документы на участок и сверьте фактические габариты объекта с тем, что есть в ЕГРН и БТИ. Дальше нужна предварительная оценка по статье 222: оформлена ли земля под стройку, можно ли привести объект к нормам, нет ли угрозы безопасности и правам соседей. Эта оценка покажет, реален ли внесудебный путь через ГЗК, и сколько примерно займёт документация. Если решите идти, делайте это до того, как Департамент городского имущества подаст иск о сносе: на спокойной стадии шансов и времени заметно больше. Юристы KEO GROUP помогут оценить перспективу по вашему адресу и собрать пакет под ГЗК.", "sources": [{"title": "Постановление Правительства Москвы от 11.12.2013 N 819-ПП (база ГАРАНТ, с изменениями)", "url": "https://base.garant.ru/70533726/"}, {"title": "Постановление Правительства Москвы от 11.12.2013 N 819-ПП, редакция от 04.06.2025 (Контур.Норматив)", "url": "https://normativ.kontur.ru/document?moduleId=3&documentId=103324"}, {"title": "ГК РФ Статья 222. Самовольная постройка (КонсультантПлюс)", "url": "https://www.consultant.ru/document/cons_doc_LAW_5142/f670878d88ab83726bd1804b82668b84b027802e/"}, {"title": "Статья 222 ГК РФ. Самовольная постройка (база ГАРАНТ)", "url": "https://base.garant.ru/10164072/563198f2b81e68dd907ddc26c916e9b0/"}, {"title": "Легализация самовольных построек через ГЗК Москвы: процедура и документы", "url": "https://encom.ru/services/legalizacziya-samovolnyh-postroek/legalizacziya-samovolnyh-postroek-cherez-gradostroitelno-zemelnuyu-komissiyu-gzk/"}, {"title": "Постановление Правительства Москвы 819-ПП: исключение из реестра самостроев", "url": "https://encom.ru/articles/legalizacziya-samovolnyh-postroek/postanovlenie-pravitelstva-moskvy-819-pp-vyyavlenie-i-presechenie-samovolnyh-postroek/"}], "img": "legal", "c": "#ef7320", "cat": "Легализация", "date": "Июнь 2026"}, {"slug": "podgotovka-k-ekspertize", "title": "Подготовка к судебной экспертизе по самострою: почему это 80% успеха", "lede": "В делах о сносе исход решает не красноречие юриста в зале, а заключение эксперта. С 2024 года такую экспертизу проводят только государственные эксперты Минюста, и они строги. Разбираем, что проверяет эксперт, какие нарушения топят дело и как подготовить здание заранее, пока есть время.", "readmin": 10, "tldr": ["С 2024 года судебную строительно-техническую экспертизу по самострою проводят только государственные организации, ФБУ РФЦСЭ при Минюсте. Частных экспертиз по этим делам больше нет.", "Госэксперт строже частного и не оценивает устранимость нарушений: нашёл несоответствие нормам, и это основание для сноса.", "Очередь на экспертизу 6 до 12 месяцев. Это и есть окно, чтобы привести здание в порядок: после экспертизы исправлять уже поздно.", "Эксперт отвечает на 5 вопросов: капитальность, реконструкция или новое строительство, соответствие АГР и БТИ, строительные и пожарные нормы, угроза жизни и здоровью.", "Экономика простая: подготовка стоит 5 до 15% от стоимости объекта, снос обходится в 100%."], "blocks": [{"type": "h2", "text": "Что вообще происходит в деле о самострое"}, {"type": "p", "text": "Сценарий почти всегда один. Департамент городского имущества подаёт иск о сносе и требует освободить участок. Суд назначает строительно-техническую экспертизу. Эксперт выезжает на объект, и дальше всё держится на его заключении: нашёл существенные нарушения, и здание признают самовольной постройкой со сносом за счёт собственника. Поэтому **исход дела решает не зал суда, а экспертиза**."}, {"type": "p", "text": "Из этого вытекает простая мысль, которую собственники часто понимают слишком поздно. Готовить нужно не речь для суда, а само здание. Эксперт смотрит на конструкции, пожарную безопасность и документы, а не на аргументы сторон."}, {"type": "h2", "text": "Ключевое изменение: экспертиза только государственная"}, {"type": "p", "text": "Раньше по таким делам можно было привлечь частного эксперта, который оценивал в том числе устранимость нарушений. С конца 2023 года правила поменялись. По распоряжению Правительства РФ от 31.10.2023 № 3041-р судебная экспертиза по гражданским делам о самовольном строительстве проводится исключительно государственными судебно-экспертными организациями, прежде всего ФБУ РФЦСЭ при Минюсте."}, {"type": "note", "style": "warn", "text": "Госэксперт строже частного и, как правило, **не рассматривает устранимость**: он фиксирует факт нарушения на дату осмотра. Поэтому всё, что можно было исправить, нужно исправить ДО его приезда, а не обещать суду устранить потом."}, {"type": "key", "stat": "6 до 12 месяцев", "text": "Очередь на экспертизу в РФЦСЭ из-за кадрового дефицита. Пока дело стоит в очереди, у собственника есть время привести объект в порядок. После экспертизы это окно закрывается."}, {"type": "h2", "text": "Что именно проверяет эксперт"}, {"type": "p", "text": "Заключение строится вокруг пяти вопросов суда. Понимая их заранее, можно закрыть слабые места до осмотра."}, {"type": "bullets", "items": ["Капитальность: объект капитальный или некапитальный, можно ли переместить без ущерба назначению.", "Реконструкция или новое строительство: изменились ли этажность, площадь и объём с даты АГР.", "Соответствие АГР, госэкспертизе и данным БТИ: совпадает ли здание с исходной документацией и разрешениями.", "Строительные и пожарные нормы: соответствие СНиП и СП, требованиям ФЗ-123 и ФЗ-384, наличие существенных нарушений.", "Угроза жизни и здоровью: механическая безопасность, эвакуация, пожаробезопасность, инженерные системы."]}, {"type": "h2", "text": "Что чаще всего находят на неподготовленных объектах"}, {"type": "p", "text": "Набор типовых нарушений предсказуем, и почти все они устранимы заранее. Вот что обычно всплывает на осмотре."}, {"type": "bullets", "items": ["Пожарная безопасность: нет автоматической сигнализации и планов эвакуации, горючие материалы на путях, нет пожарных шкафов.", "Эвакуационные пути: ширина дверей меньше 0,8 м, нет аварийного освещения, перепады и заблокированные выходы.", "Несущие конструкции: нет огнезащитной обработки, коррозия, несанкционированные проёмы в стенах.", "Инженерные системы: нет вентиляции и дымоудаления, электрика не по ПУЭ, отсутствуют водомерные узлы.", "Расхождение с БТИ: фактическая площадь не совпадает с данными БТИ, не отражены перепланировки.", "Доступность для маломобильных групп: нет пандусов и санузлов, недостаточная ширина проходов."]}, {"type": "h2", "text": "Как мы готовим здание к экспертизе"}, {"type": "p", "text": "Логика подготовки повторяет логику самой экспертизы: сначала найти всё, что найдёт эксперт, потом устранить, потом проверить себя по его же чек-листу."}, {"type": "steps", "items": ["Аудит объекта. Полное техническое обследование по ГОСТ 31937-2011, фиксируем все отклонения от норм.", "Заключение по устранению замечаний. Составляем перечень несоответствий с конкретными мерами по каждому.", "Устранение нарушений. Пожарная безопасность, эвакуация, инженерия, конструкции, приведение данных БТИ в соответствие.", "Контрольная проверка. Повторный осмотр по чек-листу эксперта, по сути имитация экспертизы Минюста до самой экспертизы."]}, {"type": "note", "style": "info", "text": "Качественная подготовка это **80% успеха** в делах о самострое. Эксперт подтверждает соответствие нормам и отсутствие угрозы, и тогда суд сохраняет объект, а не сносит."}, {"type": "h2", "text": "Чек-лист: что закрыть до осмотра"}, {"type": "bullets", "items": ["Обследование по ГОСТ 31937-2011 и заключение по устранению замечаний.", "Данные БТИ приведены в соответствие с фактом.", "Автоматическая пожарная сигнализация и оповещение работают.", "Эвакуационные выходы не уже 0,8 м, планы эвакуации на каждом этаже, аварийное освещение.", "Огнетушители (минимум два на этаж), на путях нет горючих материалов.", "Обеспечен подъезд пожарной техники, проверена доступность для маломобильных групп.", "Финальный контрольный аудит по чек-листу эксперта."]}, {"type": "h2", "text": "Почему начинать нужно заранее"}, {"type": "p", "text": "Три причины не откладывать."}, {"type": "bullets", "items": ["Время. Очередь в РФЦСЭ это 6 до 12 месяцев. Пока вы ждёте, можно всё исправить. После экспертизы поздно.", "Необратимость. Отрицательное заключение госэксперта **практически невозможно оспорить**, а повторная экспертиза снова идёт в РФЦСЭ.", "Экономика. Подготовка стоит 5 до 15% от стоимости объекта, снос обходится в 100%. Выбор очевиден."]}, {"type": "quote", "text": "Право собственности на самовольную постройку может быть признано, если на день обращения в суд постройка соответствует установленным требованиям и её сохранение не создаёт угрозу жизни и здоровью граждан.", "cite": "Пункт 3 статьи 222 ГК РФ"}], "faq": [{"q": "Можно ли привлечь частного эксперта вместо государственного", "a": "Нет. По распоряжению Правительства РФ № 3041-р от 31.10.2023 судебную экспертизу по делам о самовольном строительстве проводят только государственные организации, прежде всего РФЦСЭ при Минюсте. Частное заключение по такому делу суд как экспертизу не примет, его можно использовать лишь как дополнительный довод."}, {"q": "Сколько ждать экспертизу", "a": "Из-за кадрового дефицита очередь в РФЦСЭ составляет от 6 до 12 месяцев. Это не повод расслабляться, а наоборот окно для подготовки: за это время здание можно привести в соответствие нормам, и к осмотру эксперта прийти уже без нарушений."}, {"q": "Что будет, если заключение отрицательное", "a": "Отрицательное заключение госэксперта практически невозможно оспорить, а повторная экспертиза снова попадёт в ту же систему. Поэтому ставка делается не на оспаривание после, а на качественную подготовку до: дешевле и надёжнее закрыть нарушения заранее."}, {"q": "Сколько стоит подготовка к экспертизе", "a": "Ориентир по практике: от 5 до 15% от стоимости объекта в зависимости от его состояния и объёма нарушений. Для сравнения снос обходится в полную стоимость объекта плюс расходы. На фоне риска потерять здание подготовка почти всегда оправдана."}, {"q": "С чего начать", "a": "С технического обследования по ГОСТ 31937-2011: оно показывает реальную картину и перечень того, что нужно устранить. Пришлите нам адрес, кадастровый номер и документы БТИ, мы оценим объект и скажем, что закрыть до экспертизы и сколько это займёт."}], "start": "Если по вашему объекту уже идёт суд с ДГИ или назначена экспертиза, время работает против вас, но окно ещё есть. Пришлите адрес, кадастровый номер, документы БТИ и определение суда о назначении экспертизы. Мы проведём обследование по ГОСТ 31937-2011, выдадим заключение по устранению замечаний и приведём здание в соответствие нормам до приезда эксперта, чтобы заключение было в вашу пользу.", "sources": [{"title": "Распоряжение Правительства РФ от 31.10.2023 № 3041-р (ГАРАНТ)", "url": "https://www.garant.ru/products/ipo/prime/doc/407829137/"}, {"title": "ГК РФ Статья 222. Самовольная постройка (КонсультантПлюс)", "url": "https://www.consultant.ru/document/cons_doc_LAW_5142/f670878d88ab83726bd1804b82668b84b027802e/"}, {"title": "Федеральный закон № 123-ФЗ «Технический регламент о требованиях пожарной безопасности» (КонсультантПлюс)", "url": "https://www.consultant.ru/document/cons_doc_LAW_78699/"}, {"title": "Федеральный закон № 384-ФЗ «Технический регламент о безопасности зданий и сооружений» (КонсультантПлюс)", "url": "https://www.consultant.ru/document/cons_doc_LAW_95720/"}, {"title": "ГОСТ 31937-2011. Здания и сооружения. Правила обследования и мониторинга технического состояния (Docs.cntd)", "url": "https://docs.cntd.ru/document/1200100941"}, {"title": "СП 1.13130 Системы противопожарной защиты. Эвакуационные пути и выходы (Docs.cntd)", "url": "https://docs.cntd.ru/document/1200101593"}], "img": "ekspertiza", "c": "#ef7320", "cat": "Экспертиза", "date": "Июнь 2026"}, {"slug": "krt-kompensaciya", "title": "Объект попал в зону КРТ: как добиться справедливой компенсации при изъятии", "lede": "Решение о комплексном развитии территории появилось на сайте мэрии, и ваше здание оказалось в его границах. Это значит, что объект, скорее всего, изымут. Но цена этого изъятия не высечена в камне: первичная оценка от госоргана и сумма, которую реально можно получить, это часто две очень разные цифры. Разбираем, как устроен механизм и где собственник теряет деньги, если действует вслепую.", "readmin": 11, "tldr": ["КРТ регулирует глава 10 Градостроительного кодекса (статьи 64-71). Решение о КРТ содержит перечень объектов, которые попадают под снос, реконструкцию и изъятие.", "Возмещение по статье 56.8 Земельного кодекса это не только рыночная стоимость объекта, но и убытки, включая упущенную выгоду от аренды, расходы на переезд и поиск аналога.", "Первичная оценка по заказу госоргана нередко занижена. Закон позволяет оспорить размер возмещения в суде через судебную оценочную экспертизу.", "На подписание соглашения об изъятии у собственника есть один месяц со дня, когда он получил возможность ознакомиться с проектом (статья 56.12 ЗК).", "Главная защита собственника это свой отчёт независимого оценщика, заказанный до суда, и грамотно собранные доказательства убытков."], "blocks": [{"type": "h2", "text": "Что такое КРТ и почему это касается вашего объекта"}, {"type": "p", "text": "Комплексное развитие территории, или КРТ, это механизм, по которому город расчищает старые промзоны, неэффективно используемые кварталы и ветхую застройку под новое строительство. Юридически он живёт в главе 10 Градостроительного кодекса, статьи 64-71. Статья 64 задаёт цели, статья 65 виды КРТ (жилой застройки, нежилой застройки, незастроенной территории и по инициативе правообладателей), статья 67 описывает само решение о КРТ."}, {"type": "p", "text": "Ключевой документ для вас это именно решение о КРТ. По статье 67 ГрК в нём указывают границы территории и перечень объектов капитального строительства внутри этих границ, в том числе тех, что пойдут под снос или реконструкцию. Если ваше здание попало в этот перечень, дальше последует изъятие для государственных или муниципальных нужд. Не «может последовать», **а последует**: обязанность принять решение об изъятии прямо зашита в договор о КРТ между городом и застройщиком."}, {"type": "note", "style": "info", "text": "В Москве проекты решений о КРТ публикуют на mos.ru и на профильном портале krt.mos.ru. Порядок изъятия для КРТ нежилой застройки в столице установлен постановлением Правительства Москвы от 23.12.2015 № 941-ПП. Отслеживать публикации стоит заранее: чем раньше вы узнали, что попадаете в границы, тем больше времени на подготовку."}, {"type": "h2", "text": "Как принимается решение и что оно меняет для собственника"}, {"type": "p", "text": "Решение о КРТ принимает уполномоченный орган (в Москве это Правительство Москвы), и оно проходит свою процедуру согласования и публикации. После того как решение принято, копию решения об изъятии собственники объектов в границах территории получают в течение семи рабочих дней (статья 56.12 ЗК). С этого момента запускается отдельная процедура изъятия с оценкой и соглашением."}, {"type": "p", "text": "Важный момент про сроки запуска. Между принятием решения и реальным предложением о выкупе нередко проходит заметное время, иногда несколько лет. Это не повод расслабиться, а повод собрать документы и зафиксировать состояние объекта и его доходность, пока всё ещё работает."}, {"type": "quote", "text": "Решение суда о принудительном изъятии для целей КРТ может быть оспорено в части размера компенсации за изъятые земельные участки и расположенные на них объекты недвижимости.", "cite": "Пункт 13 статьи 56.12 Земельного кодекса РФ"}, {"type": "p", "text": "Из этой нормы следует трезвый вывод. Спорить о том, изымать или не изымать, почти бесперспективно: законность самого изъятия для КРТ оспорить крайне трудно. А вот **спорить про деньги закон прямо разрешает**. Поэтому вся энергия собственника должна уходить не на попытку «отбиться» от изъятия, а на то, чтобы получить за объект честную сумму."}, {"type": "h2", "text": "Что по закону входит в возмещение"}, {"type": "p", "text": "Размер компенсации считают по статье 56.8 Земельного кодекса и по Федеральному закону об оценочной деятельности от 29.07.1998 № 135-ФЗ. И тут собственники часто недооценивают, что им вообще положено. Возмещение это не одна цифра «за стены», а сумма из нескольких частей."}, {"type": "bullets", "items": ["Рыночная стоимость прав на земельный участок (собственность, аренда, постоянное бессрочное пользование).", "Рыночная стоимость объектов недвижимости, расположенных на участке: здание, сооружение, неотделимые улучшения.", "Убытки, причинённые изъятием. Сюда входит упущенная выгода, например недополученная арендная плата, если здание сдавалось.", "Расходы на переезд, на поиск и оформление аналогичного объекта, на досрочное прекращение обязательств перед третьими лицами."]}, {"type": "key", "stat": "3 части", "text": "Полное возмещение это рыночная стоимость недвижимости плюс рыночная стоимость прав на землю плюс убытки и упущенная выгода. Если в расчёте госоргана видна только первая строка, перед вами **заниженная оценка**."}, {"type": "p", "text": "На практике именно убытки и упущенная выгода чаще всего «теряются» в первичном расчёте. Действующий арендный бизнес, налаженный поток клиентов, затраты на новое помещение: всё это деньги, которые закон признаёт, но которые не появятся в отчёте сами собой. Их нужно доказать документами: договорами аренды, выписками о платежах, расчётами."}, {"type": "h2", "text": "Почему первоначальная оценка часто ниже рыночной"}, {"type": "p", "text": "Здесь нет злого умысла в чистом виде, но есть структурный перекос. Оценку для целей изъятия заказывает та сторона, которая платит, то есть госорган или оператор КРТ. Оценщик работает добросовестно, но в рамках полученного задания и доступной ему информации. А информация эта обычно неполная: оценщик не всегда видит реальную доходность объекта, состояние внутренних помещений, особенности местоположения и арендный потенциал."}, {"type": "p", "text": "Юристы, которые ведут такие споры, отмечают, что разрыв между первичной оценкой и суммой, установленной судом по результатам экспертизы, нередко **исчисляется десятками процентов**. Точная величина зависит от объекта, и обещать конкретный процент заранее нельзя. Но сама закономерность устойчивая: первая цифра почти всегда ниже той, что можно обосновать."}, {"type": "note", "style": "warn", "text": "Соглашение об изъятии это не «формальная бумага для галочки». Подписав его, вы соглашаетесь с указанной в нём суммой. Оспорить размер возмещения после добровольного подписания соглашения будет **практически невозможно**. Поэтому подпись ставят только тогда, когда цифра вас действительно устраивает или подтверждена вашей оценкой."}, {"type": "h2", "text": "Сроки: что и за сколько дней происходит"}, {"type": "p", "text": "Тайминг по статье 56.12 ЗК для КРТ устроен жёстко, и собственнику важно держать его в голове, чтобы не пропустить точку для манёвра."}, {"type": "bullets", "items": ["7 рабочих дней на то, чтобы собственнику направили копию решения об изъятии после его принятия.", "1 месяц на подписание соглашения об изъятии со дня, когда вам предоставили возможность ознакомиться с проектом соглашения и приложенным отчётом об оценке.", "Если за месяц соглашение не подписано, орган власти обращается в суд с иском о принудительном изъятии и прекращении ваших прав на объект."]}, {"type": "p", "text": "**Месяц это мало**. За это время нужно успеть проанализировать чужой отчёт об оценке, понять, занижен ли он, и принять решение: подписывать, торговаться или идти в спор. Если действовать с нуля в последнюю неделю, времени на свою оценку уже не останется, и собственник либо подписывает невыгодное соглашение, либо входит в суд без подготовленной позиции."}, {"type": "h2", "text": "Как оспорить размер компенсации через суд"}, {"type": "p", "text": "Спор о цене это не «жалоба» и не переговоры на эмоциях, а нормальный процесс с понятной логикой. Решение об изъятии устоит, а вот сумму суд пересматривает по существу, опираясь на доказательства. И главный инструмент здесь судебная оценочная экспертиза."}, {"type": "steps", "items": ["Закажите собственный отчёт независимого оценщика ещё до суда. Это ваша опорная цифра и одновременно сигнал, что вы готовы спорить предметно. Без внесудебного отчёта суд может вообще отказать в назначении экспертизы.", "Соберите доказательства убытков и упущенной выгоды: договоры аренды, документы о платежах, расчёты затрат на переезд и новый объект, оценку неотделимых улучшений.", "Сформулируйте мотивированные возражения на соглашение и не подписывайте его, если сумма занижена. Молчаливое согласие за месяц закон трактует не в вашу пользу.", "В судебном процессе заявите ходатайство о назначении судебной оценочной экспертизы. Именно её результат, как правило, ложится в основу решения о размере возмещения.", "Контролируйте кандидатуру эксперта и вопросы перед ним: от грамотной постановки вопросов зависит, попадут ли в расчёт ваши убытки и упущенная выгода, а не только «голые» стены."]}, {"type": "key", "stat": "56.8 и 56.12 ЗК", "text": "Две статьи Земельного кодекса, на которых держится спор. Первая определяет, из чего складывается возмещение. Вторая задаёт процедуру и прямо разрешает оспаривать размер компенсации в суде."}, {"type": "h2", "text": "На что обратить внимание, чтобы не потерять в деньгах"}, {"type": "p", "text": "Несколько практичных вещей, которые отличают собственника, получившего справедливую сумму, от того, кто подписал первое, что предложили."}, {"type": "bullets", "items": ["Не подписывайте соглашение под давлением «срока» и «всё равно изымут». Изымут, да, но за цену, которую вы вправе обосновать.", "Не ориентируйтесь только на кадастровую стоимость: к рыночной она часто не имеет отношения и обычно ниже.", "Зафиксируйте доходность объекта заранее. Действующие договоры аренды и подтверждённые платежи это ваша упущенная выгода в деньгах.", "Проверьте, всё ли учтено: права на землю, неотделимые улучшения, расходы на переезд и поиск аналога. Каждая пропущенная строка это потерянные деньги.", "Считайте экономику спора. Стоимость своей оценки и юриста почти всегда несопоставимо мала по сравнению с разницей между заниженной и справедливой суммой."]}, {"type": "p", "text": "КРТ это не повод для паники и не приговор по цене. Это процедура с понятными правилами, в которой у собственника есть **законное право спорить о деньгах** и реальные инструменты, чтобы этот спор выиграть. Проигрывают обычно не те, у кого «слабый объект», а те, кто упустил месяц и подписал не глядя."}], "faq": [{"q": "Можно ли вообще отказаться от изъятия и сохранить объект?", "a": "На практике почти нет. Законность изъятия для целей КРТ оспорить крайне трудно: эта возможность заложена в само решение о КРТ и в договор с застройщиком. Закон прямо разрешает спорить о размере компенсации, а не о факте изъятия. Поэтому реалистичная цель собственника это справедливая цена, а не сохранение объекта."}, {"q": "Сколько времени у меня есть на решение после получения соглашения?", "a": "По статье 56.12 ЗК на подписание соглашения об изъятии отводится один месяц со дня, когда вам предоставили возможность ознакомиться с проектом соглашения и отчётом об оценке. Если за месяц соглашение не подписано, орган власти идёт в суд с иском о принудительном изъятии. За этот месяц нужно успеть оценить чужой отчёт и решить, спорить ли."}, {"q": "Что выгоднее: подписать соглашение или идти в суд?", "a": "Зависит от суммы. Если предложенная цифра подтверждается вашей независимой оценкой и учитывает землю и убытки, разумно подписать. Если оценка занижена, спор через судебную экспертизу часто даёт заметно большую сумму. Но решать это нужно со своим отчётом на руках, а не вслепую."}, {"q": "Входит ли упущенная выгода от аренды в компенсацию?", "a": "Да. По статье 56.8 ЗК в возмещение включаются убытки, причинённые изъятием, и упущенная выгода это их часть. Но она не появится в расчёте сама: её нужно доказать договорами аренды, документами о платежах и расчётами. Без доказательств её просто не учтут."}, {"q": "Обязательно ли заказывать свою оценку до суда?", "a": "Это сильно повышает шансы. Собственный отчёт независимого оценщика это ваша опорная цифра и основание для назначения судебной экспертизы. Без внесудебного отчёта суд может отказать в назначении экспертизы, и вы войдёте в спор без аргументов."}], "start": "Если ваш объект попал в границы КРТ или вы только увидели проект решения на mos.ru, не ждите соглашения с уже проставленной суммой. Покажите нам документы по объекту: мы оценим, занижена ли предложенная компенсация, посчитаем недостающие убытки и упущенную выгоду и выстроим позицию для спора. Чем раньше начнём, тем больше у вас времени до того самого месяца на подписание.", "sources": [{"title": "Градостроительный кодекс РФ, глава 10 «Комплексное развитие территории» (ст. 64-71), КонсультантПлюс", "url": "https://www.consultant.ru/document/cons_doc_LAW_51040/381915d21931faa78bc4ef1508a48dfe972fc537/"}, {"title": "ГрК РФ, статья 67 «Решение о комплексном развитии территории», КонсультантПлюс", "url": "https://www.consultant.ru/document/cons_doc_LAW_51040/0956dbda06f096d5307b892f34fe835b65ebec51/"}, {"title": "ЗК РФ, статья 56.8 «Особенности определения размера возмещения при изъятии», КонсультантПлюс", "url": "https://www.consultant.ru/document/cons_doc_LAW_33773/5242db24527be53872525cc4e4037ee7e90b8aea/"}, {"title": "ЗК РФ, статья 56.12 «Особенности изъятия земельных участков и объектов в целях КРТ», КонсультантПлюс", "url": "https://www.consultant.ru/document/cons_doc_LAW_33773/0e329188cd44b64af243f69d61f35ba796a3333a/"}, {"title": "Изъятие недвижимости для КРТ: как это происходит, Право.ру", "url": "https://pravo.ru/opinion/244547/"}, {"title": "Энциклопедия судебной практики к ст. 56.8 ЗК РФ, ГАРАНТ", "url": "https://base.garant.ru/57592013/"}, {"title": "Московская программа КРТ, официальный портал krt.mos.ru", "url": "https://krt.mos.ru/"}], "img": "krt", "c": "#ef7320", "cat": "КРТ", "date": "Июнь 2026"}, {"slug": "smena-vri", "title": "Смена ВРИ земельного участка: зачем нужна и сколько стоит ошибка", "lede": "Вид разрешённого использования это одна строка в выписке ЕГРН, но именно она решает, можно ли на участке строить, сдавать его в аренду и спать спокойно. Если назначение не совпадает с тем, что вы реально делаете на земле, цена вопроса начинается от 100 тысяч рублей штрафа и доходит до изъятия участка. Разбираем, что такое ВРИ, чем грозит несовпадение и как менять назначение в Москве по двум законным путям.", "readmin": 11, "tldr": ["ВРИ это назначение участка по ст. 37 ГрК РФ: основные, условно разрешённые и вспомогательные виды.", "Росреестр не зарегистрирует договор аренды и не даст строить, если стройка или бизнес не вписываются в ВРИ.", "Нецелевое использование тянет штраф по ч. 1 ст. 8.8 КоАП: для юрлиц от 1,5 до 2% кадастровой стоимости, но не менее 100 000 рублей.", "В тяжёлых случаях участок изымают по ст. 285, 286 ГК РФ, плюс налог пересчитывают по повышенной ставке.", "Менять ВРИ можно двумя путями: на другой основной вид по заявлению или через изменение ПЗЗ и условно разрешённый вид.", "В Москве вопрос решает Градостроительно-земельная комиссия, публичные слушания по ПЗЗ не проводятся с марта 2022 года."], "blocks": [{"type": "h2", "text": "Что такое ВРИ и почему это не формальность"}, {"type": "p", "text": "Вид разрешённого использования это юридический ответ на вопрос «что здесь вообще можно делать». Под склад, под офис, под автосервис, под многоквартирный дом. Категория земель задаёт крупную рамку (земли населённых пунктов, сельхозназначения и так далее), а ВРИ уточняет рамку до конкретики. Две строки в выписке ЕГРН, от которых зависит почти всё."}, {"type": "p", "text": "Статья 37 Градостроительного кодекса делит все виды на три группы, и разница между ними практическая, а не теоретическая. Основные виды собственник выбирает сам, без чьего-либо разрешения. Вспомогательные идут только в довесок к основным (например, парковка или трансформаторная при здании) и тоже не требуют согласований. А вот условно разрешённый вид это отдельная история: на него нужно получать разрешение через процедуру, и просто так его не возьмёшь."}, {"type": "quote", "text": "Основные и вспомогательные виды разрешённого использования земельных участков и объектов капитального строительства правообладателями земельных участков и объектов капитального строительства выбираются самостоятельно без дополнительных разрешений и согласования.", "cite": "Часть 4 статьи 37 ГрК РФ"}, {"type": "key", "stat": "3 вида", "text": "ВРИ по ст. 37 ГрК РФ: основные, условно разрешённые и вспомогательные. Основной и вспомогательный берутся самостоятельно, условно разрешённый только через разрешение."}, {"type": "h2", "text": "Что ломается, когда ВРИ не тот"}, {"type": "p", "text": "Самое болезненное вы почувствуете не от инспектора, а от Росреестра, и заметите это в худший момент: на сделке или перед стройкой. Если назначение участка не совпадает с тем, что вы задумали, **регистратор просто откажет**."}, {"type": "bullets", "items": ["Аренда не регистрируется. Заключили договор под производство, а ВРИ говорит «для индивидуального жилого дома», и Росреестр аренду не пропустит.", "**Стройка не начнётся**. Разрешение на строительство и градостроительный план участка опираются на ВРИ. Назначение под склад не даст построить торговый центр.", "**Банк не даст кредит**. Под залог или проектное финансирование банк смотрит ВРИ и сам видит, что использование незаконно.", "Сделку отыграют назад. Покупатель, который позже упрётся в несовпадение назначения, имеет все основания оспаривать цену и саму покупку."]}, {"type": "note", "style": "warn", "text": "Частая ловушка: участок куплен «под бизнес», на словах продавца всё можно, а в выписке ЕГРН стоит назначение, под которое этот бизнес не подходит. Проверять ВРИ нужно до сделки, а не после первого отказа Росреестра."}, {"type": "h2", "text": "Сколько стоит ошибка: штраф, налог, изъятие"}, {"type": "p", "text": "Нецелевое использование это не «само рассосётся». Это состав по части 1 статьи 8.8 КоАП РФ, и для юрлиц суммы заметные. Штраф считают от кадастровой стоимости участка, и чем дороже земля, тем больнее."}, {"type": "key", "stat": "от 100 000 ₽", "text": "Штраф для юрлица по ч. 1 ст. 8.8 КоАП за использование участка не по назначению: от 1,5 до 2% кадастровой стоимости, но не менее 100 000 рублей. Если кадастровая стоимость не определена, от 100 000 до 200 000 рублей."}, {"type": "p", "text": "Для понимания масштаба: для граждан это от 0,5 до 1% кадастровой стоимости (минимум 10 000 рублей), для должностных лиц от 1 до 1,5% (минимум 20 000 рублей). Штраф разовый по факту проверки, но если нарушение не устранить, его выпишут снова."}, {"type": "p", "text": "Дальше включается налог. Льготную пониженную ставку (например, 0,3% для отдельных категорий) при нецелевом использовании применять нельзя: налог пересчитывают по ставке «для прочих земель», до 1,5%, и считают с момента, когда нарушение началось или было обнаружено, и до месяца, в котором его устранили. То есть переплата идёт всё время, пока тянете."}, {"type": "note", "style": "warn", "text": "Самый жёсткий сценарий: **изъятие участка**. Статьи 285 и 286 Гражданского кодекса позволяют изъять землю у собственника, если она используется с грубым нарушением, в том числе не по целевому назначению. На практике это крайняя мера, ей предшествует предписание и срок на устранение, но как реальный риск её держат в уме всегда."}, {"type": "h2", "text": "Путь первый: смена ВРИ в пределах регламента"}, {"type": "p", "text": "Это самый быстрый и дешёвый сценарий, и начинать всегда стоит с проверки, доступен ли он. Открываете правила землепользования и застройки (ПЗЗ), находите свою территориальную зону и смотрите список основных видов. Если нужное вам назначение там уже есть как основной вид, менять ПЗЗ не нужно вообще. Достаточно заявления."}, {"type": "steps", "items": ["Определите территориальную зону участка и посмотрите её градостроительный регламент в ПЗЗ Москвы.", "Убедитесь, что нужный ВРИ значится там как основной (или вспомогательный) вид, а не как условно разрешённый.", "Подайте заявление об изменении сведений о ВРИ, после чего изменение вносится в ЕГРН.", "Получите обновлённую выписку и проверьте, что новое назначение встало корректно."]}, {"type": "note", "style": "info", "text": "Главный плюс этого пути: основной и вспомогательный виды по ст. 37 ГрК РФ **выбираются собственником самостоятельно**, без публичных слушаний и без разрешения комиссии. Если ваш случай сюда попадает, **не усложняйте его сами**."}, {"type": "h2", "text": "Путь второй: через ПЗЗ или условно разрешённый вид"}, {"type": "p", "text": "Если нужного назначения в регламенте зоны нет, или оно есть только как условно разрешённое, простым заявлением не обойтись. Нужно либо менять сами ПЗЗ (вносить изменения в регламент зоны), либо получать разрешение на условно разрешённый вид. В Москве оба маршрута проходят через Градостроительно-земельную комиссию (ГЗК)."}, {"type": "p", "text": "Важная московская особенность: классических публичных слушаний по изменению ПЗЗ здесь нет с марта 2022 года (Постановление Правительства Москвы № 438-ПП). Вопросы выносятся на рабочие группы и на ГЗК, решение оформляется постановлением Правительства Москвы. Это не делает процедуру формальной: город смотрит на градостроительную логику, нагрузку на территорию, транспорт и параметры застройки."}, {"type": "steps", "items": ["Проанализируйте участок и окружение: что разрешает зона, какие параметры застройки и ограничения действуют.", "Подготовьте обоснование и пакет документов под нужный ВРИ или новые параметры.", "Подайте обращение через mos.ru и пройдите рассмотрение на рабочих группах и ГЗК.", "Дождитесь решения комиссии и, при положительном исходе, постановления Правительства Москвы.", "Внесите изменения в ЕГРН и получите обновлённую выписку."]}, {"type": "key", "stat": "3-5 месяцев", "text": "Ориентировочный срок изменения ВРИ через ПЗЗ и ГЗК в Москве. Путь по основному виду в пределах регламента короче, сложные случаи с межеванием дольше."}, {"type": "h2", "text": "Когда в дело вступает проект межевания (ПМТ)"}, {"type": "p", "text": "Если вопрос не только в назначении, но и в самих границах (участок надо образовать, разделить, объединить или перекроить под застройку), одной сменой ВРИ не отделаешься. Понадобится проект межевания территории. Это градостроительная документация, которая определяет границы и характеристики образуемых и изменяемых участков, а для ряда случаев именно из ПМТ участку присваивают ВРИ."}, {"type": "p", "text": "В Москве подготовку и утверждение ПМТ регулирует Постановление Правительства Москвы № 1089-ПП от 26.12.2017. Подготовка материалов занимает ориентировочно ориентировочно несколько месяцев, а внесение изменений в уже действующий проект межевания может растянуться до полугода. Это самостоятельный трек, его лучше закладывать в график заранее, а не упираться в него на середине пути."}, {"type": "note", "style": "info", "text": "Простое правило: если меняется только строка назначения, ПМТ чаще всего не нужен. Если меняется конфигурация земли под проект, ПМТ почти наверняка появится в списке работ."}, {"type": "h2", "text": "Типичные ошибки, которые дорого обходятся"}, {"type": "bullets", "items": ["Начинают стройку или бизнес, не сверив ВРИ с фактом. Дальше отказ Росреестра и штраф по ст. 8.8 КоАП.", "Идут сразу в ПЗЗ и ГЗК, хотя нужный вид уже есть как основной и менялся бы заявлением. Лишние месяцы и деньги на ровном месте.", "Путают основной и условно разрешённый вид. Первый берётся сам, второй только через разрешение, и срок отличается кратно.", "Игнорируют межевание. Берутся менять назначение там, где сначала надо менять границы, и проект встаёт.", "Тянут с устранением нарушения. Пока ВРИ не приведён в порядок, идёт **повышенный налог** и риск повторного штрафа."]}, {"type": "p", "text": "Смена ВРИ редко бывает чисто бумажной задачей. Это связка из земельного, градостроительного и налогового права, где ошибка в начале умножается к концу. Поэтому маршрут лучше выбирать до первого заявления, а не методом проб."}], "faq": [{"q": "Можно ли поменять ВРИ без публичных слушаний в Москве?", "a": "Да. Публичные слушания по изменению ПЗЗ в Москве не проводятся с марта 2022 года (ПП № 438-ПП). Вопросы рассматривает Градостроительно-земельная комиссия, а решение оформляется постановлением Правительства Москвы. А если нужный вид уже значится в регламенте зоны как основной, менять ПЗЗ не нужно вовсе, достаточно заявления."}, {"q": "Какой штраф грозит юрлицу за использование участка не по назначению?", "a": "По части 1 статьи 8.8 КоАП РФ для юридических лиц это от 1,5 до 2% кадастровой стоимости участка, но не менее 100 000 рублей. Если кадастровая стоимость не определена, от 100 000 до 200 000 рублей. Плюс налог за период нарушения пересчитают по повышенной ставке."}, {"q": "Чем основной вид отличается от условно разрешённого?", "a": "Основной (и вспомогательный) вид собственник выбирает самостоятельно, без разрешений и согласований (ч. 4 ст. 37 ГрК РФ). На условно разрешённый вид нужно получать разрешение через установленную процедуру, и это занимает заметно больше времени."}, {"q": "Когда при смене ВРИ нужен проект межевания территории?", "a": "Когда меняется не только назначение, но и сами границы участка: его образуют, делят, объединяют или перекраивают под застройку. В ряде случаев ВРИ участку присваивается именно из проекта межевания. В Москве ПМТ готовится по ПП № 1089-ПП, ориентировочно ориентировочно несколько месяцев на подготовку."}, {"q": "Могут ли действительно изъять участок за нецелевое использование?", "a": "Да, статьи 285 и 286 ГК РФ это допускают при грубом нарушении, включая использование не по целевому назначению. На практике это крайняя мера: сначала предписание и срок на устранение. Но как реальный риск изъятие существует, и игнорировать его не стоит."}], "start": "Не уверены, каким путём менять назначение вашего участка, и стоит ли вообще трогать ПЗЗ? Пришлите кадастровый номер, мы проверим ВРИ по выписке и регламенту зоны и скажем, решается вопрос заявлением или придётся идти через ГЗК и межевание. Разберём риски по ст. 8.8 КоАП и налогу до того, как они станут вашими.", "sources": [{"title": "ГрК РФ Статья 37. Виды разрешённого использования земельных участков и объектов капитального строительства (КонсультантПлюс)", "url": "https://www.consultant.ru/document/cons_doc_LAW_51040/39dc72c976ad75cbd1bbdc145ebfc7388c21062e/"}, {"title": "КоАП РФ Статья 8.8. Использование земельных участков не по целевому назначению (КонсультантПлюс)", "url": "https://www.consultant.ru/document/cons_doc_LAW_34661/54179b602a94ee33b01318897e0f050dc25d73cf/"}, {"title": "ГК РФ Статья 285. Изъятие земельного участка, используемого с нарушением законодательства (КонсультантПлюс)", "url": "https://www.consultant.ru/document/cons_doc_LAW_5142/84a85f05be901b483de1af649e5776ae081dd041/"}, {"title": "ГК РФ Статья 286. Порядок изъятия земельного участка, не используемого по целевому назначению (КонсультантПлюс)", "url": "https://www.consultant.ru/document/cons_doc_LAW_5142/b75d3f1e830ccd24eb525e3ba812bff85cdddc3f/"}, {"title": "Направление и рассмотрение предложений о внесении изменений в ПЗЗ (mos.ru)", "url": "https://www.mos.ru/mka/function/gosudarstvennye-uslugi/napravlenie-i-rassmotrenie-predlozhenii-o-vnesenii-izmenenii-v-pzz/"}, {"title": "НК РФ Статья 394. Налоговая ставка по земельному налогу (КонсультантПлюс)", "url": "https://www.consultant.ru/document/cons_doc_LAW_28165/fd2ac88b2311a6053a128cfa43aa07672e826213/"}], "img": "vri", "c": "#ef7320", "cat": "Земля", "date": "Июнь 2026"}, {"slug": "nekapitalka-636", "title": "Некапитальные объекты в Москве: как согласовать и не попасть под снос", "lede": "Павильон, ангар или модульный склад без согласования живёт в городе на птичьих правах. Москва видит такие объекты со спутника и камер, а сносит их без суда и без компенсации. Разбираем, чем регулируется размещение, до какой даты надо успеть с легализацией и как пройти процедуру, чтобы постройку не демонтировали за ваш счёт.", "readmin": 11, "tldr": ["Некапитальный объект это строение без прочной связи с землёй: его можно разобрать и перенести без ущерба. Павильоны, киоски, ангары, навесы, склады, модульные здания.", "Городская и неразграниченная земля идёт по 636-ПП от 13.11.2012 через ДГИ. Частная и федеральная земля плюс кровли зданий с 1 сентября 2024 года по 1255-ПП от 05.06.2024.", "Дедлайн легализации объектов, стоявших до 1 сентября 2024 года, это 1 сентября 2027 года. Для объектов на кровлях срок дольше, до 9 июля 2028 года.", "Без согласования объект сносит Госинспекция по недвижимости во внесудебном порядке, расходы на демонтаж взыщут с собственника. Плюс административный штраф.", "Согласование по 1255-ПП идёт через Рабочую группу при ГИН с участием ДГП, МЧС и префектуры. Заключение действует 10 лет."], "blocks": [{"type": "h2", "text": "Что вообще считается некапитальным объектом"}, {"type": "p", "text": "Граница между капитальным и некапитальным проходит **не по размеру** и не по тому, как объект выглядит. Она проходит **по связи с землёй**. Капитальное строение имеет фундамент и прочно сидит на участке: чтобы его убрать, нужно сносить. Некапитальный объект стоит на земле условно, его можно разобрать, погрузить и перевезти в другое место без несоразмерного ущерба."}, {"type": "p", "text": "На практике объект признают некапитальным, когда сходятся сразу несколько признаков: нет капитального фундамента, конструкция сборно-разборная (болтовые крепления, готовые заводские модули), инженерные сети подключены временно или их нет, а сам объект ставят на ограниченный срок. Под это описание попадают торговые павильоны и киоски, ангары и склады, открытые навесы, КПП, хозплощадки и модульные здания заводского изготовления."}, {"type": "note", "style": "info", "text": "Распространённое заблуждение: «если без фундамента, значит, согласовывать не надо». Наоборот. Отсутствие капитальной связи с землёй не выводит объект из-под контроля, а лишь определяет, по какому постановлению его согласовывать. Город следит за такими постройками через спутниковый мониторинг и городские камеры."}, {"type": "h2", "text": "Чем регулируется размещение: два постановления и две земли"}, {"type": "p", "text": "Правила зависят от того, на чьей земле стоит объект. Это ключевая развилка, с которой начинается любой проект."}, {"type": "p", "text": "Городская земля и участки, государственная собственность на которые не разграничена, идут по постановлению № 636-ПП от 13 ноября 2012 года. Полное название: «О размещении и установке на территории города Москвы объектов, не являющихся объектами капитального строительства, и о предоставлении земельных участков для целей, не связанных со строительством». Размещение оформляется через Департамент городского имущества (ДГИ), а по ряду объектов через аукцион и профильные департаменты."}, {"type": "p", "text": "Частная и федеральная земля, а также кровли зданий, строений и сооружений с 1 сентября 2024 года живут по отдельному акту: постановление № 1255-ПП от 5 июня 2024 года (в редакции от 9 июля 2025 года). До него собственники частных участков по сути оставались в серой зоне. Теперь у них есть прямой порядок: что разрешено, как согласовать и в какой срок."}, {"type": "key", "stat": "636-ПП и 1255-ПП", "text": "Городская земля через ДГИ это 636-ПП от 13.11.2012. Частная и федеральная земля плюс кровли это 1255-ПП от 05.06.2024, действует с 1 сентября 2024 года."}, {"type": "h2", "text": "Чем грозит объект без согласования"}, {"type": "p", "text": "Главная опасность **не штраф, а снос**. Некапитальный объект, размещённый с нарушением порядка, **демонтируют во внесудебном порядке**. Госинспекция по недвижимости составляет акт, даёт собственнику срок на добровольный демонтаж, и если объект не убран, сносит его сама. Расходы на демонтаж потом взыскивают с собственника. **Никакой компенсации** за снесённую постройку при этом не предусмотрено."}, {"type": "bullets", "items": ["Снос без суда по акту Госинспекции по недвижимости, если объект размещён без согласования.", "Никакой компенсации: вы теряете и саму постройку, и деньги, вложенные в неё.", "Взыскание стоимости демонтажа: город сносит за свой счёт, а сумму выставляет вам.", "Административный штраф по Кодексу города Москвы об административных правонарушениях, который может накладываться неоднократно.", "Предписание ГИН с требованием устранить нарушение в установленный срок."]}, {"type": "note", "style": "warn", "text": "Снести объект задним числом или согласовать его постфактум можно, но это всегда дольше, дороже и с меньшими шансами, чем согласование заранее. Если на участке уже есть неузаконенный самострой, его сначала придётся легализовать или убрать, иначе по новому объекту откажут."}, {"type": "h2", "text": "Дедлайн легализации: до какой даты надо успеть"}, {"type": "p", "text": "Самый частый вопрос от собственников: что делать с тем, что уже стоит. Постановление 1255-ПП дало переходный период. Объекты, размещённые на частной и федеральной земле до 1 сентября 2024 года, нужно привести в соответствие с новым порядком в течение трёх лет. То есть крайний срок легализации это **1 сентября 2027 года**."}, {"type": "key", "stat": "1 сентября 2027", "text": "Крайний срок согласовать некапитальные объекты, которые стояли на частной или федеральной земле до 1 сентября 2024 года. Для объектов на кровлях зданий срок дольше, **до 9 июля 2028 года**."}, {"type": "p", "text": "Дата 1 сентября 2027 года реальна, она следует из переходных положений 1255-ПП. После неё несогласованный объект становится кандидатом на снос. Тянуть до последнего опасно: процедура согласования занимает месяцы, а проектировщики и согласующие органы ближе к дедлайну будут перегружены. Закладывать на весь путь меньше полугода рискованно."}, {"type": "h2", "text": "Как проходит согласование по 1255-ПП"}, {"type": "p", "text": "Решение по объектам на частной и федеральной земле принимает Рабочая группа при Госинспекции по недвижимости. В неё входят представители ДГП, префектур, МЧС и других ведомств. ДГП отвечает за внешний вид, ГИН выдаёт итоговое заключение. Вот логика пути."}, {"type": "steps", "items": ["Проверьте участок до старта: границы, обременения, зоны с особыми условиями (ЗОУИТ), не попадает ли земля в проект комплексного развития территории (КРТ), нет ли долгов по аренде и старого самостроя.", "Подготовьте концепцию объекта и архитектурно-художественное решение (АХР), согласуйте его в ДГП. Внешний вид важен: устаревшие материалы и кривые пропорции это частая причина отказа.", "Разработайте проект размещения с ситуационным планом и обоснованием противопожарных расстояний.", "Подайте комплект в Госинспекцию по недвижимости. Вопрос выносится на Рабочую группу.", "Получите заключение. Срок рассмотрения порядка месяца, само заключение оформляется в течение нескольких рабочих дней после решения.", "Разместите объект строго по согласованным параметрам. Заключение действует 10 лет."]}, {"type": "note", "style": "info", "text": "Часть объектов согласовывать не нужно вовсе. По 1255-ПП без процедуры можно размещать строения площадью до 20 кв. м, открытые навесы до 100 кв. м, нестационарные инвентарные объекты заводского изготовления до 40 кв. м, а также объекты на участках ЛПХ, ИЖС и садоводства. Точный перечень и условия смотрите в тексте постановления: формулировки имеют значение."}, {"type": "quote", "text": "Объекты, не являющиеся объектами капитального строительства, размещаются на земельных участках, находящихся в частной и федеральной собственности, на период 10 лет, если иной срок жизненного цикла объекта не установлен документацией.", "cite": "Постановление Правительства Москвы № 1255-ПП от 05.06.2024, приложение 1"}, {"type": "h2", "text": "Типичные ошибки, из-за которых отказывают или сносят"}, {"type": "p", "text": "Большинство провалов предсказуемы, и почти все из них видны ещё на старте, если правильно проверить участок и проект."}, {"type": "bullets", "items": ["Объект ставят сначала, согласуют потом. К моменту проверки ГИН постройка уже стоит без документов, и разговор идёт не про согласование, а про снос.", "Превышение лимита площади застройки. На своей земле объекты занимают ограниченную долю свободной от застройки части участка, выход за лимит это отказ.", "Внешний вид из девяностых: профлист, сайдинг, грубые пропорции. ДГП такое не пропускает.", "Недостаточные противопожарные расстояния и слабое обоснование в проекте.", "Земельные проблемы: участок в зоне КРТ или ЗОУИТ, долги по аренде, старый незаконный объект, который надо разрулить первым.", "Путаница с постановлением: проект готовят по 636-ПП, хотя земля частная и нужен 1255-ПП, или наоборот."]}, {"type": "p", "text": "Вывод простой. Некапитальность это не индульгенция. Город относится к временным постройкам так же серьёзно, как к капитальным, и контролирует их плотно. Выигрывает тот, кто проверил землю заранее, выбрал правильное постановление и подал документы до дедлайна, а не после предписания о сносе."}], "faq": [{"q": "Нужно ли согласовывать некапитальный объект на собственном участке?", "a": "Да, если объект не попадает в перечень исключений по 1255-ПП. Без процедуры можно размещать, в частности, строения до 20 кв. м, навесы до 100 кв. м и ряд объектов на землях ИЖС, ЛПХ и садоводства. Остальное согласуется через Рабочую группу при Госинспекции по недвижимости. Точные условия проверяйте по тексту постановления, формулировки решают."}, {"q": "До какого числа надо легализовать уже стоящий объект?", "a": "Объекты на частной и федеральной земле, размещённые до 1 сентября 2024 года, нужно привести в соответствие с 1255-ПП до 1 сентября 2027 года. Для объектов на кровлях зданий срок дольше, до 9 июля 2028 года. После дедлайна несогласованный объект становится кандидатом на снос."}, {"q": "Что будет, если ничего не делать?", "a": "Госинспекция по недвижимости вправе снести объект во внесудебном порядке по своему акту. Сначала собственнику дают срок на добровольный демонтаж, затем город сносит сам и взыскивает расходы. Компенсации за снесённую постройку нет, плюс возможен административный штраф, который накладывается неоднократно."}, {"q": "Чем 636-ПП отличается от 1255-ПП?", "a": "Постановлением 636-ПП от 13.11.2012 регулируется размещение на городской и неразграниченной земле через ДГИ. Постановлением 1255-ПП от 05.06.2024, действующим с 1 сентября 2024 года, регулируется частная и федеральная земля, а также кровли. Развилка идёт по тому, на чьей земле стоит объект."}, {"q": "Сколько времени занимает согласование?", "a": "Само рассмотрение в Госинспекции по недвижимости занимает около месяца, заключение оформляется в течение нескольких рабочих дней после решения Рабочей группы. Но до подачи нужны проект размещения и согласованное в ДГП АХР, поэтому весь путь обычно растягивается на несколько месяцев. Готовое заключение действует 10 лет."}], "start": "Начните с двух вопросов: на чьей земле стоит (или встанет) объект и попадает ли он под согласование. От этого зависит постановление, орган и весь путь. Если объект уже размещён без документов, не ждите проверки ГИН, дедлайн 1 сентября 2027 года жёсткий, а очередь к дедлайну будет плотной. KEO GROUP проверит участок на обременения, КРТ и старый самострой, подберёт правильную процедуру (636-ПП или 1255-ПП), подготовит АХР и проект размещения и проведёт согласование до заключения, чтобы вашу постройку не снесли за ваш же счёт.", "sources": [{"title": "Постановление Правительства Москвы № 636-ПП от 13.11.2012 (официальный текст, mos.ru)", "url": "https://www.mos.ru/authority/documents/doc/7545220/"}, {"title": "Постановление Правительства Москвы № 1255-ПП от 05.06.2024 (ред. от 09.07.2025), ГАРАНТ", "url": "https://base.garant.ru/409183226/"}, {"title": "Приложение 1 к 1255-ПП. Порядок размещения некапитальных объектов на частной и федеральной земле, ГАРАНТ", "url": "https://base.garant.ru/409183226/53f89421bbdaf741eb2d1ecc4ddb4c33/"}, {"title": "Текст 636-ПП на КонсультантПлюс", "url": "https://www.consultant.ru/cons/cgi/online.cgi?req=doc&base=MLAW&n=140087"}, {"title": "Согласование некапитального объекта на собственном участке (юридический разбор, Ляпунов Терехин и партнёры)", "url": "https://slp-legal.ru/publishing/soglasovanie-nekapitalnogo-obekta-na-sobstvennom-uchastke"}, {"title": "Как в Москве согласовать некапитальный объект в 2026 году без отказа, штрафов и сноса", "url": "https://encom.ru/articles/proektirovanie/kak-v-moskve-soglasovat-nekapitalnyj-obekt-v-2026-godu-bez-otkaza-shtrafov-i-snosa/"}, {"title": "Порядок размещения некапитальных построек на частной и федеральной земле урегулировали в городе (icmos.ru)", "url": "https://icmos.ru/news/poryadok-razmeshheniya-nekapitalnyx-postroek-na-zemlyax-federalnoi-i-castnoi-sobstvennosti-uregulirovali-v-gorode"}], "img": "nekapitalka", "c": "#ef7320", "cat": "Некапитальные объекты", "date": "Июнь 2026"}, {"slug": "vykup-159fz", "title": "Выкуп арендуемого помещения у города по 159-ФЗ: кому положен и как не переплатить", "lede": "Малый и средний бизнес в Москве может выкупить помещение, которое арендует у города, на льготных условиях и без торгов. Право реальное, оно прописано в законе. Но город почти всегда называет цену выше рынка, и тут начинается главная работа: как пройти процедуру через ДГИ и сбить завышенную оценку законным путём.", "readmin": 11, "tldr": ["Преимущественное право выкупа дано субъектам МСП Федеральным законом от 22.07.2008 № 159-ФЗ: помещение продают без торгов, тому, кто его арендует.", "Базовые условия: непрерывная аренда от одного года, нет долгов по аренде и неустойкам, помещение не в специальном перечне для МСП, арендатор есть в реестре МСП.", "Цена выкупа это рыночная оценка от оценщика, которого нанимает город. На практике она нередко завышена.", "Оспорить цену можно: своя независимая оценка по 135-ФЗ, протокол разногласий, иск и почти всегда судебная экспертиза.", "Платить можно в рассрочку не меньше пяти лет, проценты по ней льготные, треть ключевой ставки ЦБ."], "blocks": [{"type": "h2", "text": "Что вообще даёт 159-ФЗ"}, {"type": "p", "text": "Если ваша компания или ИП годами арендует у города помещение и исправно платит, закон даёт вам **право его выкупить раньше всех** остальных. Это и есть преимущественное право, оно описано в Федеральном законе от 22.07.2008 № 159-ФЗ. Смысл простой: город не выставляет помещение на торги и не ищет покупателя на стороне, а предлагает его вам напрямую, по рыночной цене и с рассрочкой."}, {"type": "p", "text": "Закон писали под малый и средний бизнес, чтобы арендаторы могли закрепить за собой место, в которое уже вложились. Поэтому и условия мягче обычной приватизации, и платить разрешают частями. Дальше разберём, кому это право реально положено и где чаще всего теряют деньги."}, {"type": "key", "stat": "159-ФЗ", "text": "Федеральный закон от 22.07.2008 № 159-ФЗ. Полное название длинное, но суть одна: особенности отчуждения государственного и муниципального имущества, которое арендует малый и средний бизнес."}, {"type": "h2", "text": "Кому положен выкуп: четыре условия"}, {"type": "p", "text": "Право возникает не у любого арендатора. Нужно одновременно совпасть по четырём пунктам, они в статье 3 закона. Проверьте себя по каждому, потому что ДГИ откажет, если выпадает хотя бы один."}, {"type": "bullets", "items": ["Срок аренды. Помещение должно быть у вас во временном владении или пользовании непрерывно от одного года и больше на день подачи заявления. Раньше требовалось два года, но поправки, вступившие в силу 6 июня 2024 года, **сократили срок до одного года**.", "Нет долгов. На день заключения договора у вас не должно быть задолженности по арендной плате и по неустойкам (штрафам, пеням). Даже небольшой непогашенный штраф способен сорвать сделку, поэтому платежи закрывают заранее.", "Помещение не в перечне для МСП. Если объект включён в специальный перечень имущества, предназначенного для передачи в аренду малому и среднему бизнесу, выкупить его по 159-ФЗ нельзя. Это нужно проверять отдельно.", "Вы в реестре МСП. Сведения о вашей компании или ИП должны быть в едином реестре субъектов малого и среднего предпринимательства и не должны быть оттуда исключены на день сделки."]}, {"type": "note", "style": "info", "text": "Поправки 2024 года расширили закон: теперь по 159-ФЗ можно выкупать не только помещения, но и движимое имущество, которое бизнес арендует у города. Логика и условия похожие, но проверять детали по своему объекту стоит отдельно."}, {"type": "h2", "text": "Как запускается процедура и при чём тут ДГИ"}, {"type": "p", "text": "В Москве распоряжается городским имуществом Департамент городского имущества, сокращённо ДГИ. Запустить выкуп можно двумя путями. Первый: вы сами подаёте в ДГИ заявление о реализации преимущественного права. Второй: инициативу проявляет сам орган, когда город решает продать объект, и тогда он обязан сначала предложить его вам как арендатору."}, {"type": "p", "text": "На практике чаще действует арендатор. Вы подаёте заявление, ДГИ проверяет, что вы проходите по всем условиям, и заказывает оценку рыночной стоимости. После этого вам направляют проект договора купли-продажи с указанной ценой. Вот эта цена и есть момент, ради которого стоит читать статью до конца."}, {"type": "key", "stat": "30 дней", "text": "Столько даётся на подписание договора с момента, когда вы получили проект от ДГИ (статья 4 закона). Срок жёсткий, но он приостанавливается, если вы оспариваете цену, об этом ниже."}, {"type": "h2", "text": "Откуда берётся цена и почему она нередко завышена"}, {"type": "p", "text": "Цена выкупа это рыночная стоимость помещения. Определяет её независимый оценщик, но нанимает его город, и отчёт ложится в основу договора. Формально всё по закону об оценочной деятельности (135-ФЗ). По факту цифра в проекте договора **часто оказывается выше** того, за сколько объект реально продали бы на рынке."}, {"type": "p", "text": "Причины разные: оценщик берёт неудачные объекты для сравнения, не учитывает состояние помещения, планировку, проблемный вход или то, что часть площади подвальная и почти не используется. Спорить с этим эмоциями бесполезно. Работает только встречная цифра, посчитанная по тем же правилам."}, {"type": "note", "style": "warn", "text": "Не подписывайте договор молча, если цена кажется высокой. **Подпись без возражений это согласие** с суммой. Оспорить её потом будет несравнимо труднее, чем заявить разногласия сразу."}, {"type": "h2", "text": "Как оспорить оценку: пошагово"}, {"type": "p", "text": "**Снизить цену законным путём вполне реально**. Схема отработанная, по ней проходят сотни дел. Главное, уложиться в сроки и собрать сильный отчёт об оценке."}, {"type": "steps", "items": ["Закажите свою независимую оценку. Оценщик должен состоять в саморегулируемой организации и работать по 135-ФЗ. На практике независимая оценка нередко выходит заметно ниже той, что насчитал город.", "Подпишите договор с протоколом разногласий. В пределах тридцатидневного срока подпишите проект, но приложите протокол разногласий по цене и свой отчёт об оценке. Так вы и не пропускаете срок, и фиксируете несогласие.", "Дождитесь позиции ДГИ. Город, как правило, на свою цену не соглашается. Это нормальный сценарий, дальше спор уходит в суд.", "Подайте иск об урегулировании разногласий. Вы просите суд установить цену по рыночной стоимости и обязать ДГИ заключить договор на этих условиях.", "Готовьтесь к судебной экспертизе. По таким делам суд почти всегда назначает свою экспертизу. Именно её результат обычно и становится итоговой ценой, и он, как правило, ниже цифры ДГИ.", "Исполните решение. После вступления решения в силу сделку оформляют по цене, которую установил суд."]}, {"type": "quote", "text": "Срок, указанный в части 4 настоящей статьи, приостанавливается в случае, если субъект малого и среднего предпринимательства оспаривает достоверность величины рыночной стоимости объекта оценки, до дня вступления в законную силу решения суда.", "cite": "Статья 4 Федерального закона № 159-ФЗ"}, {"type": "p", "text": "Эта норма важная. Пока идёт спор о цене, **тридцатидневный срок на подписание не течёт**. То есть оспаривание оценки не лишает вас права на выкуп, помещение никуда не уходит, пока суд не вынесет решение."}, {"type": "h2", "text": "Рассрочка и другие частые споры с ДГИ"}, {"type": "p", "text": "Платить всю сумму сразу закон не заставляет. Вы вправе попросить рассрочку, и по 159-ФЗ её срок **не может быть меньше пяти лет**. Проценты на остаток льготные, считаются от ключевой ставки ЦБ (по сложившейся практике треть ключевой ставки). Для бизнеса это заметно мягче банковского кредита."}, {"type": "bullets", "items": ["Спор о самом праве. ДГИ иногда отказывает, ссылаясь на долг по аренде, недостаточный срок или включение объекта в перечень МСП. Часть таких отказов оспаривается, если основание спорное.", "Спор о цене. Самый частый конфликт, разбирали выше: своя оценка против оценки города.", "Спор о составе объекта. Бывает, что в выкуп пытаются включить лишние площади или, наоборот, не учесть то, чем вы реально пользуетесь.", "Срыв сроков самим ДГИ. Если орган тянет с проектом договора, его можно подтолкнуть, в том числе через суд."]}, {"type": "h2", "text": "Типичные ошибки арендаторов"}, {"type": "p", "text": "Большую часть денег и нервов теряют на одних и тех же вещах. Их легко обойти, если знать заранее."}, {"type": "bullets", "items": ["Подписывают договор по цене ДГИ без возражений, а потом пытаются оспорить. Поздно и почти безнадёжно.", "Копят даже мелкую задолженность по аренде или штрафам и из-за неё получают отказ.", "Пропускают тридцатидневный срок, не подав ни протокол разногласий, ни отказ.", "Берут слабый отчёт об оценке, который суд не примет всерьёз. Оценщика и качество отчёта стоит выбирать придирчиво.", "Не проверяют заранее, не попало ли помещение в перечень имущества для МСП."]}, {"type": "note", "style": "info", "text": "Короткий вывод: право на выкуп у добросовестного арендатора есть почти всегда, а вот цену почти всегда нужно отстаивать. Выигрывает тот, кто заранее закрыл долги, уложился в сроки и пришёл в суд с крепкой независимой оценкой."}], "faq": [{"q": "Сколько лет нужно арендовать помещение, чтобы его выкупить?", "a": "Сейчас достаточно непрерывной аренды от одного года на день подачи заявления. До поправок, вступивших в силу 6 июня 2024 года, требовалось два года."}, {"q": "Можно ли выкупить, если есть долг по аренде?", "a": "Нет. Одно из условий по статье 3 закона: на день заключения договора нет задолженности по арендной плате и по неустойкам. Долги, даже небольшие, гасят заранее."}, {"q": "Город назвал цену выше рынка. Что делать?", "a": "Не подписывать договор молча. Заказать свою независимую оценку по 135-ФЗ, в пределах тридцати дней подписать проект с протоколом разногласий и приложенным отчётом, а затем идти в суд. Пока спор о цене идёт, срок на подписание приостанавливается."}, {"q": "Насколько суд снижает цену?", "a": "Точную цифру никто не гарантирует, всё зависит от объекта и экспертизы. На практике независимая и судебная оценка нередко выходят заметно ниже той, что насчитал город, иногда снижение измеряется десятками процентов. Но это ориентир, а не обещание."}, {"q": "Обязательно ли платить сразу всю сумму?", "a": "Нет. По 159-ФЗ положена рассрочка не меньше пяти лет, проценты на остаток льготные, считаются от ключевой ставки ЦБ."}], "start": "Если вы арендуете помещение у города и думаете о выкупе, начните с двух простых проверок: пройдёте ли вы по четырём условиям статьи 3 и нет ли хвостов по аренде. Дальше юристы KEO GROUP помогут собрать заявление в ДГИ, проверить помещение по перечню МСП и, когда придёт цена от города, выстроить грамотное оспаривание оценки, чтобы вы не переплатили лишнего.", "sources": [{"title": "Федеральный закон от 22.07.2008 № 159-ФЗ (полный текст), КонсультантПлюс", "url": "https://www.consultant.ru/document/cons_doc_LAW_78582/"}, {"title": "Статья 3. Преимущественное право на приобретение арендуемого имущества, КонсультантПлюс", "url": "https://www.consultant.ru/document/cons_doc_LAW_78582/79c127485e36b0cbbd23dbba4584bf3e69528130/"}, {"title": "Статья 4. Порядок реализации преимущественного права арендаторов, КонсультантПлюс", "url": "https://www.consultant.ru/document/cons_doc_LAW_78582/93bbc2891a91d8ebe11e8832ba8ce798b4bdf0ce/"}, {"title": "Преимущественное право выкупа помещений, mos.ru (ДГИ Москвы)", "url": "https://www.mos.ru/dgi/function   faq:[["Как узнать, что объект включён в КРТ","Берём кадастровый номер и сверяем его с действующим проектом КРТ и публичными решениями города о развитии территории. Это единственный надёжный способ: устные слухи о сносе часто опережают реальные документы, а бывает и наоборот, объект уже в границах, а собственник не знает. На разборе мы скажем точно, попадает ли участок под изъятие и на какой стадии находится проект, потому что от стадии зависит, сколько времени у вас есть на действия."],["Почему судебная экспертиза даёт больше","Госоценка по изъятию системно занижает стоимость, она опирается на усреднённые подходы и редко смотрит на реальные сделки. Независимый эксперт считает рыночную цену по сопоставимым объектам, учитывает упущенную выгоду и сделанные улучшения. Поэтому в спорах по ст. 56.8 ЗК РФ независимая и судебная экспертиза обычно дают цифру выше городской. Нюанс: эксперта и методику стоит готовить заранее, до подписания соглашения."],["Что входит в компенсацию","В компенсацию входит рыночная стоимость самого объекта, понесённые убытки и упущенная выгода, а в части случаев и стоимость оборудования, которое нельзя перенести без потерь. Закон позволяет требовать возмещение всех реальных потерь, связанных с изъятием, не только «голых» стен. На практике город в первом предложении считает по минимуму, поэтому убытки и упущенную выгоду почти всегда приходится доказывать отдельно, документами и расчётами."],["Когда выплачивают деньги","Деньги перечисляют после того, как подписано соглашение о компенсации, либо после вступившего в силу решения суда, если по цене был спор. Ключевой момент: на подписание соглашения отводится 90 дней, и затягивать тут опасно. Если в этот срок не договориться и не заявить возражения, город вправе идти в суд по своей оценке, и шансов поднять сумму станет меньше. Поэтому позицию по цене лучше формировать с первого дня."]]},

  faq:[["Кому положен выкуп по 159-ФЗ","Преимущественное право выкупа по 159-ФЗ есть у малого и среднего бизнеса, который арендует помещение у города не менее 2 лет и не имеет задолженности по арендной плате. Помещение при этом не должно входить в перечень имущества, закрытого для приватизации. На что смотреть в первую очередь: непрерывность аренды и чистую платёжную историю, именно к ним чаще всего цепляется ДГИ, отказывая в праве на выкуп."],["Как оспорить цену выкупа","Цену оспаривают через независимую оценку, а если ДГИ не соглашается, то через суд. По нашим делам стоимость удавалось снижать в разы, потому что городская оценка нередко завышена и не отражает состояние и расположение конкретного помещения. Главное здесь не пропустить срок: оценку города нужно оспорить быстро, иначе она ляжет в основу договора, и поднимать вопрос о цене будет уже поздно."],["Что делать со штрафом за нецелевое","Сначала разбираем основание штрафа: проверяем, действительно ли использование расходится с договором и видом разрешённого использования. Дальше либо приводим назначение в порядок, либо обжалуем постановление, если нарушение спорное или сроки давности вышли. Часто штраф удаётся отменить или снизить, особенно когда нарушение формальное. Важный нюанс: на обжалование по КоАП РФ счёт идёт на дни, поэтому реагировать нужно сразу, не дожидаясь повторной проверки."],["Можно ли продлить льготную аренду","Да, льготную аренду можно продлить, и мы оформляем это так, чтобы льгота сохранилась и при последующих проверках. Здесь важна аккуратность с основаниями льготы и с целевым использованием помещения, потому что именно к ним город предъявляет претензии при перезаключении договора. Заранее собранные документы и устранённые формальные расхождения снимают большинство поводов для отказа в продлении."]]},

  faq:[["Что считается некапитальным","К некапитальным относят павильоны, склады, ангары, навесы и модульные здания, у которых нет заглублённого фундамента и которые можно перенести без несоразмерного ущерба. Ключевой признак именно прочная связь с землёй, а не размер или материал стен. На практике статус объекта спорят: одно и то же строение город может посчитать капитальным, и тогда правила игры меняются. Поэтому статус лучше определить заранее, до согласования или сделки."],["Разница 636-ПП и 1255-ПП","636-ПП регулирует размещение на городской земле и работает через ДГИ, а 1255-ПП касается частных участков и вводит новую процедуру, действующую с 01.09.2024. Разница принципиальная: от того, чья земля под объектом, зависит и орган, и порядок, и пакет документов. На что смотреть: сначала определяем форму собственности на участок, и только потом выбираем процедуру, иначе можно зайти не в тот регламент и потерять недели."],["Что грозит без согласования","Без согласования объект уязвим со всех сторон: штрафы, предписания, приостановка работы, требование о сносе и блокировка операций с имуществом. Город вправе демонтировать самовольную постройку, а собственник несёт расходы и теряет вложения. Отдельный риск в том, что несогласованный объект сложно продать или заложить, сделки по нему буксуют. Поэтому узаконивание почти всегда дешевле и спокойнее, чем разбираться с последствиями."],["Сколько занимает согласование","Согласование обычно занимает 45-75 дней, и срок плавает в зависимости от сложности объекта, его расположения и того, по какой процедуре идём. Время растягивают спорный статус строения, замечания по документам и межведомственные согласования. На что смотреть: чем раньше собран полный и корректный пакет, тем ближе вы к нижней границе срока, потому что основные задержки рождаются из доработок по ходу, а не из самой процедуры."]]},

/* ===== ФОРМА ===== */
function wireForm(){
  const f=document.getElementById('leadform'); if(!f) return;
  const name=document.getElementById('f-name'),phone=document.getElementById('f-phone'),agree=document.getElementById('f-agree'),
        submit=document.getElementById('f-submit'),note=document.getElementById('f-note'),ok=document.getElementById('f-ok');
  const eN=document.getElementById('e-name'),eP=document.getElementById('e-phone');
  note.textContent=FORM_ENDPOINT?'':'Демо-режим: проверка полей работает, заявка пока не уходит. Впишите адрес Formspree в Настройках панели.';
  const okPhone=()=>phone.value.replace(/\D/g,'').length>=10, okName=()=>name.value.trim().length>=2;
  function mark(el,e,good){el.classList.toggle('bad',!good);e.classList.toggle('show',!good);}
  function refresh(){submit.disabled=!(okName()&&okPhone()&&agree.checked);submit.style.opacity=submit.disabled?.55:1;}
  [name,phone].forEach(el=>el.addEventListener('input',refresh));
  name.addEventListener('blur',()=>mark(name,eN,okName()));phone.addEventListener('blur',()=>mark(phone,eP,okPhone()));
  agree.addEventListener('change',refresh); refresh();
  f.addEventListener('submit',async e=>{e.preventDefault();mark(name,eN,okName());mark(phone,eP,okPhone());
    if(!(okName()&&okPhone()&&agree.checked)){refresh();return;}
    if(f._gotcha&&f._gotcha.value)return;
    submit.disabled=true;submit.textContent='Отправляем…';
    if(!FORM_ENDPOINT){setTimeout(()=>{ok.classList.add('show');f.reset();submit.textContent='Отправить заявку';note.textContent='Это демо. В рабочей версии заявка ушла бы на почту компании.';},700);return;}
    try{const r=await fetch(FORM_ENDPOINT,{method:'POST',headers:{Accept:'application/json'},body:new FormData(f)});
      if(r.ok){location.hash='#/spasibo';}else{note.textContent='Что-то пошло не так. Позвоните нам или напишите в Telegram.';submit.disabled=false;submit.textContent='Отправить заявку';}
    }catch(_){note.textContent='Нет связи. Проверьте интернет или позвоните нам.';submit.disabled=false;submit.textContent='Отправить заявку';}});
}

function initMap(){
  if(!window.L)return;const el=document.getElementById('keomap');if(!el||el._init)return;el._init=true;
  const lat=55.70258,lon=37.69617;
  const map=L.map(el,{scrollWheelZoom:false,attributionControl:true}).setView([lat,lon],16);
  map.attributionControl.setPrefix(false);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'© OpenStreetMap, © CARTO'}).addTo(map);
  const icon=L.divIcon({className:'keopin',html:'<div class="keopin-dot"></div>',iconSize:[22,22],iconAnchor:[11,11]});
  L.marker([lat,lon],{icon:icon}).addTo(map).bindPopup('<b>KEO GROUP</b><br>2-й Южнопортовый проезд, 20А стр.4<br>+7 499 647-75-66').openPopup();
  setTimeout(function(){map.invalidateSize();},200);
}
