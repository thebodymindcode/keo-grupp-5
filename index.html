<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>KEO GROUP, проектирование, легализация и регистрация коммерческой недвижимости в Москве</title>
<meta name="description" content="KEO GROUP: полный цикл по коммерческой недвижимости в Москве. Реконструкция, легализация 819-ПП, КРТ, Росреестр, ДГИ, смена ВРИ. более 25 лет, 30+ проектов, большой опыт прохождения ГЗК. Гарантия в договоре.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --bg:#f2f3f7; --white:#fff; --soft:#f5f6fb;
    --navy:#2b2a2e; --navy2:#1d1c20; --blue:#ef7320; --blue2:#d8620f;
    --ink2:#6d758d; --ink3:#9aa0b4; --line:#e8eaf2; --line2:#dfe2ee;
    --teal:#6ac9c8; --gold:#f2b705;
    --r:20px; --r-lg:30px; --r-sm:12px; --wrap:1240px;
    --sans:"Montserrat",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --sh:0 6px 26px rgba(40,38,44,.08); --sh-h:0 16px 44px rgba(40,38,44,.15);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--navy);font-family:var(--sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  .wrap{width:100%;max-width:var(--wrap);margin:0 auto;padding:0 24px}
  .long{max-width:860px;margin:0}
  .faqcol{max-width:1040px;margin:0 auto}
  .case.court .ph{display:none}
  .case.court .b{padding:22px}
  .court-foot{margin-top:14px;padding-top:12px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:3px}
  .court-num{font-size:12.5px;font-weight:700;color:var(--navy)}
  .court-resp{font-size:12px;color:var(--ink3)}
  .court-prep{margin-top:11px;font-size:12.5px;color:var(--navy);background:var(--soft);border-radius:10px;padding:10px 12px;line-height:1.5}
  .court-num{font-size:12.5px;font-weight:700;color:var(--blue2);text-decoration:none}
  .court-num:hover{text-decoration:underline}
  .court-win{margin-top:12px;display:inline-flex;align-items:center;gap:7px;background:color-mix(in srgb,var(--green) 12%,#fff);color:#1f9d6b;font-weight:800;font-size:13px;padding:8px 13px;border-radius:10px}
  .article b.hl,.art-ul b.hl,.art-tldr b.hl,.art-note p b.hl,details.faq p b.hl{color:var(--navy);font-weight:700;background:linear-gradient(transparent 62%,color-mix(in srgb,var(--blue) 22%,#fff) 0)}
  .art-key-t b.hl{color:#fff;font-weight:800;background:none}
  .read2col{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:46px;align-items:start}
  .read-main{min-width:0}
  .read-side{position:sticky;top:88px}
  .sidecta{background:linear-gradient(135deg,var(--navy),#3d3a42);color:#fff;border-radius:20px;padding:26px 24px;box-shadow:var(--sh-h)}
  .sidecta-h{font-size:19px;font-weight:800;line-height:1.25;margin-bottom:10px}
  .sidecta p{font-size:14px;opacity:.92;margin:0 0 18px;line-height:1.55;color:#fff}
  .sidecta .btn.primary{background:var(--blue);width:100%}
  .sidecta .btn.primary:hover{background:#fff;color:var(--navy)}
  .sidecta-tel{display:block;text-align:center;color:#fff;font-weight:800;font-size:18px;margin-top:14px;text-decoration:none}
  .sidecta-note{text-align:center;font-size:12px;opacity:.8;margin-top:6px}
  @media(max-width:900px){.read2col{grid-template-columns:1fr;gap:28px}.read-side{position:static}.sidecta{max-width:520px}}
  .reqs>div{display:grid;grid-template-columns:210px 1fr;gap:14px;padding:11px 0;border-top:1px solid var(--line);font-size:14.5px}
  .reqs>div:first-child{border-top:0}
  .reqs span{color:var(--ink3)}
  .reqs b{color:var(--navy);font-weight:700}
  @media(max-width:600px){.reqs>div{grid-template-columns:1fr;gap:2px;padding:9px 0}}
  @supports(padding:max(0px)){.wrap{padding-left:max(24px,env(safe-area-inset-left));padding-right:max(24px,env(safe-area-inset-right))}body{padding-bottom:env(safe-area-inset-bottom)}}
  h1,h2,h3,h4{margin:0;font-weight:800;line-height:1.07;letter-spacing:-.02em;color:var(--navy)}
  h1{font-size:clamp(34px,5vw,60px);text-wrap:balance}
  .heroh1 span{display:block}.heroh1.stair span{margin-left:0;text-align:left}
  @media(min-width:900px){.heroh1 span{display:block}}
  h2{font-size:clamp(28px,3.6vw,44px)}
  h3{font-size:21px}
  p{margin:0 0 15px}
  .eyebrow{font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin:0 0 16px}
  .lede{font-size:clamp(16px,1.9vw,19px);color:var(--ink2);max-width:660px;font-weight:500;text-wrap:pretty}
  p,li,.muted,.b p,.card p,.owul li,details.faq p,.article p{text-wrap:pretty}
  body{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .muted{color:var(--ink2);font-weight:500} .ink3{color:var(--ink3)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:inherit;font-weight:700;font-size:15px;border-radius:var(--r-sm);padding:15px 26px;cursor:pointer;border:1.5px solid transparent;transition:all .25s ease;min-height:52px;position:relative}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--blue);color:#fff}
  .btn.primary:hover{background:var(--blue2);box-shadow:0 10px 26px rgba(53,184,252,.35)}
  .btn.ghost{background:var(--white);color:var(--navy);border-color:var(--line2)}
  .btn.ghost:hover{border-color:var(--blue);color:var(--blue2)}
  .btn.bracket::after{content:"";position:absolute;top:7px;right:7px;width:9px;height:9px;border-top:1.5px solid currentColor;border-right:1.5px solid currentColor;opacity:.5}
  /* header */
  header{position:sticky;top:0;z-index:80;background:rgba(255,255,255,.9);backdrop-filter:saturate(150%) blur(14px);border-bottom:1px solid var(--line)}
  .nav{display:flex;align-items:center;gap:22px;height:82px}
  .logo{display:flex;flex-direction:column;align-items:flex-start;gap:3px;flex:0 0 auto;line-height:1}
  .logo .wmk{font-family:"Archivo Black",sans-serif;font-size:20px;color:var(--navy);letter-spacing:-.01em;word-spacing:-3px;line-height:1;white-space:nowrap}
  .logo .wmk b{color:var(--blue);font-weight:800}
  .logo small{font-size:9.5px;font-weight:700;letter-spacing:.165em;color:var(--ink3);text-transform:uppercase}
  .menu{display:flex;align-items:center;gap:2px;margin-left:8px}
  .menu>a,.menu .drop>a{padding:11px 14px;border-radius:10px;font-size:14.5px;font-weight:700;color:var(--navy);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:color .2s,background .2s;white-space:nowrap}
  .menu>a:hover,.menu .drop:hover>a{color:var(--blue2);background:var(--soft)}
  .menu>a.on{color:var(--blue2)}
  .nav .right{margin-left:auto;display:flex;align-items:center;gap:16px;flex:0 0 auto}
  .nav .tel{font-weight:800;font-size:16px;color:var(--navy);white-space:nowrap;text-align:right;line-height:1.25}
  .nav .tel small{display:block;font-size:11px;font-weight:600;color:var(--ink3)}
  /* mega menu */
  .drop{position:static}
  .mega{position:absolute;left:0;right:0;top:100%;background:var(--white);border-top:1px solid var(--line);box-shadow:0 30px 50px rgba(40,38,44,.12);opacity:0;visibility:hidden;transform:translateY(6px);transition:.2s;z-index:90}
  .drop:hover .mega{opacity:1;visibility:visible;transform:translateY(0)}
  .mega .in{display:grid;grid-template-columns:repeat(6,1fr);gap:18px;padding:26px 0 30px;align-items:start}
  .mega .col h4{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);margin:0 0 12px}
  .mega .col a{display:block;padding:7px 0;font-size:13.5px;font-weight:600;color:var(--ink2);border:0}
  .mega .col a:hover{color:var(--blue2);background:transparent}
  .mega .col h4 a.colh{color:var(--blue);text-decoration:none}
  .mega .col a.moreall{color:var(--blue2);font-weight:700;margin-top:8px}
  @media(max-width:1160px){.mega{display:none!important}}
  .mega .feat{background:linear-gradient(150deg,var(--navy),#36333a);border-radius:var(--r);padding:22px;color:#fff;display:flex;flex-direction:column;gap:10px;align-self:start}
  .mega .feat h4{color:#fff;font-size:19px;margin:0 0 8px}
  .mega .feat p{color:rgba(255,255,255,.82);font-size:13px}
  
  .drop.closing .mega{opacity:0!important;visibility:hidden!important}
  .burger{display:none;width:50px;height:50px;border:1px solid var(--line2);border-radius:12px;background:var(--white);color:var(--navy);cursor:pointer;font-size:20px}
  /* sections */
  section{padding:80px 0}
  .sec-head{max-width:720px;margin:0 0 42px}
  .grid{display:grid;gap:20px}
.grid>*{min-width:0}
  .g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
  .card{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:28px;box-shadow:var(--sh);transition:transform .25s,box-shadow .25s}
  .card:hover{transform:translateY(-4px);box-shadow:var(--sh-h)}
  .crumbs{font-size:13px;color:var(--ink3);margin-bottom:22px;font-weight:600}
  .crumbs a:hover{color:var(--blue2)}
  /* hero */
  .hero{padding:54px 0 30px}
  .hero .row{display:grid;grid-template-columns:1.05fr .95fr;gap:44px;align-items:center}
  .hero h1{margin-bottom:20px}
  .hero .cta{display:flex;gap:13px;flex-wrap:wrap;margin-top:30px}
  .hero .pic{position:relative;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh);aspect-ratio:4/3.2}
  .hero .pic img{width:100%;height:100%;object-fit:cover}
  .hero .badge{position:absolute;left:18px;bottom:18px;background:rgba(255,255,255,.94);backdrop-filter:blur(6px);border-radius:16px;padding:14px 18px;box-shadow:var(--sh)}
  .hero .badge b{display:block;font-size:26px;font-weight:800;color:var(--blue2);line-height:1}
  .hero .badge span{font-size:12.5px;color:var(--ink2);font-weight:600}
  /* trust */
  .trust{padding:18px 0 60px}
  .trust .row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .trust .t{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:24px;text-align:center;box-shadow:var(--sh)}
  .trust .t.hl{background:linear-gradient(150deg,var(--blue),#1f93e6);border:0}
  .trust .t b{display:block;font-size:clamp(28px,3.4vw,40px);font-weight:800;color:var(--navy);line-height:1}
  .trust .t.hl b,.trust .t.hl span{color:#fff}
  .trust .t span{font-size:13px;color:var(--ink2);font-weight:600}
  /* direction cards */
  .gcard{display:block;background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:30px;box-shadow:var(--sh);transition:transform .25s,box-shadow .25s}
  .gcard:hover{transform:translateY(-5px);box-shadow:var(--sh-h)}
  .gcard .ic{width:58px;height:58px;border-radius:15px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;background:color-mix(in srgb,var(--c) 14%,#fff);color:var(--c)}
  .gcard h3{margin-bottom:10px}
  .gcard p{color:var(--ink2);font-size:14.5px;margin-bottom:16px;font-weight:500}
  .gcard .cnt{font-size:13.5px;font-weight:800;color:var(--blue2)}
  /* service card */
  .scard{display:flex;flex-direction:column;background:var(--white);border:1px solid var(--line);border-radius:var(--r-sm);padding:22px;box-shadow:var(--sh);transition:transform .2s,box-shadow .2s;border-top:3px solid var(--c)}
  .scard:hover{transform:translateY(-3px);box-shadow:var(--sh-h)}
  .scard h4{font-size:16px;margin-bottom:7px}
  .scard p{color:var(--ink2);font-size:13.5px;margin:0 0 14px;font-weight:500}
  .scard .more{margin-top:auto;font-size:13px;font-weight:800;color:var(--blue2)}
  .price{color:var(--navy);font-weight:800;font-size:13.5px}
  /* lists */
  .ulist{list-style:none;padding:0;margin:0 0 24px}
  .ulist li{padding:13px 0 13px 30px;border-bottom:1px solid var(--line);position:relative;color:var(--ink2);font-weight:500}
  .ulist li::before{content:"";position:absolute;left:2px;top:20px;width:10px;height:10px;border-radius:50%;background:var(--blue)}
  /* cases */
  .case{background:var(--white);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);transition:transform .25s,box-shadow .25s}
  .case:hover{transform:translateY(-4px);box-shadow:var(--sh-h)}
  .case .ph{aspect-ratio:16/10;overflow:hidden}
  .case .ph img{width:100%;height:100%;object-fit:cover}
  .case .b{padding:24px}
  .case .res{color:var(--blue2);font-weight:800;font-size:16px;margin:6px 0 0}
  .case .meta{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:12.5px;color:var(--ink3);font-weight:600}
  /* form */
  form.lead{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:30px;box-shadow:var(--sh)}
  .fld{margin-bottom:16px}
  .fld label{display:block;font-size:13px;font-weight:700;margin-bottom:7px;color:var(--navy)}
  .fld input,.fld select{width:100%;background:var(--soft);border:1.5px solid var(--line2);border-radius:12px;padding:14px;color:var(--navy);font-size:16px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s}
  .fld input:focus,.fld select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(53,184,252,.18);background:#fff}
  .fld input.bad,.fld select.bad{border-color:#e5484d}
  .err{color:#e5484d;font-size:12.5px;margin-top:6px;display:none}.err.show{display:block}
  .agree{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--ink2);cursor:pointer;font-weight:500}
  .agree input{width:18px;height:18px;margin-top:2px;flex:0 0 auto;accent-color:var(--blue)}
  .agree a{color:var(--blue2);text-decoration:underline}
  .hp{position:absolute;left:-9999px}
  .formnote{font-size:12px;color:var(--ink3);margin-top:13px;font-weight:500}
  .okmsg{background:#eaf9f1;border:1px solid #b6e6cd;color:#1c7a4d;border-radius:12px;padding:16px;font-size:14px;display:none;font-weight:600} .okmsg.show{display:block}
  details.faq{background:var(--white);border:1px solid var(--line);border-radius:var(--r-sm);padding:0 20px;margin-bottom:12px;box-shadow:var(--sh);transition:box-shadow .2s}
  details.faq[open]{box-shadow:var(--sh-h)}
  details.faq summary{list-style:none;cursor:pointer;font-weight:700;color:var(--navy);padding:18px 0;display:flex;justify-content:space-between;align-items:center;gap:12px;font-size:15.5px}
  details.faq summary::-webkit-details-marker{display:none}
  details.faq summary::after{content:"+";color:var(--blue2);font-size:22px;font-weight:700;flex:0 0 auto;transition:transform .2s}
  details.faq[open] summary::after{content:"\2212"}
  details.faq p{color:var(--ink2);margin:0 0 18px;font-size:14.5px;font-weight:500}
  .article h3{font-size:22px;margin:26px 0 10px;color:var(--navy)}
  .article p{font-size:17px;color:var(--ink2);margin:0 0 17px;line-height:1.75}
  .article h2{font-size:clamp(21px,2.6vw,26px);margin:32px 0 12px;color:var(--navy);line-height:1.25}
  .art-ul{margin:0 0 18px;padding:0;list-style:none;display:flex;flex-direction:column;gap:9px}
  .art-ul li{position:relative;padding-left:24px;font-size:16px;line-height:1.6;color:var(--ink2)}
  .art-ul li::before{content:"";position:absolute;left:3px;top:9px;width:7px;height:7px;border-radius:50%;background:var(--blue)}
  .art-tldr{background:var(--soft);border-radius:18px;padding:22px 26px;margin:0 0 32px}
  .art-tldr-h{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--blue2);margin-bottom:14px}
  .art-tldr ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:11px}
  .art-tldr li{position:relative;padding-left:28px;font-size:15px;line-height:1.55;color:var(--navy);font-weight:500}
  .art-tldr li::before{content:"✓";position:absolute;left:2px;top:0;color:var(--green);font-weight:800}
  .art-key{display:flex;gap:20px;align-items:center;background:linear-gradient(135deg,var(--navy),#3d3a42);color:#fff;border-radius:18px;padding:24px 26px;margin:26px 0;box-shadow:var(--sh)}
  .art-key-n{font-size:clamp(24px,4vw,34px);font-weight:800;line-height:1.05;flex:0 0 auto;max-width:40%}
  .art-key-t{font-size:14.5px;line-height:1.5;opacity:.95}
  .art-note{display:flex;gap:13px;border-radius:16px;padding:18px 20px;margin:26px 0;border:1px solid;align-items:flex-start}
  .art-note p{margin:0;font-size:15px;line-height:1.6;color:var(--ink2)}
  .art-note-i{flex:0 0 auto;margin-top:1px}
  .art-note.info{background:#eef7ff;border-color:#cfe6fb}.art-note.info .art-note-i{color:var(--blue2)}
  .art-note.warn{background:#fff6e9;border-color:#ffe0b0}.art-note.warn .art-note-i{color:#e08600}
  .art-steps{counter-reset:st;margin:26px 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:14px}
  .art-steps li{counter-increment:st;position:relative;padding-left:50px;font-size:16px;line-height:1.6;color:var(--ink2);min-height:34px;display:flex;align-items:center}
  .art-steps li::before{content:counter(st);position:absolute;left:0;top:0;width:34px;height:34px;border-radius:10px;background:color-mix(in srgb,var(--blue) 14%,#fff);color:var(--blue2);font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center}
  .art-quote{margin:28px 0;padding:18px 24px;border-left:4px solid var(--blue);background:var(--soft);border-radius:0 14px 14px 0}
  .art-quote p{font-size:16px;font-style:italic;color:var(--navy);margin:0 0 8px;line-height:1.6}
  .art-quote cite{font-style:normal;font-size:13px;font-weight:700;color:var(--ink3)}
  .art-startbox{background:var(--soft);border-radius:18px;padding:24px 26px;margin:36px 0 0;border-top:3px solid var(--blue)}
  .art-startbox h3{margin:0 0 10px;font-size:18px;color:var(--navy)}
  .art-faq{margin-top:42px}.art-faq h2{font-size:24px;margin-bottom:18px;color:var(--navy)}
  .art-sources{margin-top:38px;padding-top:24px;border-top:1px solid var(--line)}
  .art-sources h3{font-size:16px;margin-bottom:14px;color:var(--navy)}
  .art-sources ol{margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px}
  .art-sources li{font-size:13.5px;line-height:1.5;color:var(--ink3)}
  .art-sources a{color:var(--blue2);word-break:break-word}
  @media(max-width:600px){.art-key{flex-direction:column;align-items:flex-start;gap:8px}.art-key-n{max-width:none}}
  .chips{display:flex;flex-wrap:wrap;gap:12px}
  .chip{display:inline-flex;align-items:center;background:var(--white);border:1px solid var(--line);border-radius:999px;padding:11px 20px;font-weight:700;font-size:14.5px;color:var(--navy);box-shadow:var(--sh);white-space:nowrap}
  .clogos{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}
  .clogo{display:flex;align-items:center;justify-content:center;text-align:center;min-height:88px;padding:20px 16px;background:var(--white);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh);font-weight:800;font-size:16px;letter-spacing:.01em;color:#8a90a6;filter:grayscale(1);transition:color .2s,transform .2s}
  .clogo:hover{color:var(--navy);transform:translateY(-3px)}

const TYPO_SHORT={"в":1,"к":1,"с":1,"о":1,"и":1,"а":1,"у":1,"по":1,"на":1,"за":1,"до":1,"от":1,"из":1,"не":1,"но":1,"же":1,"то":1,"во":1,"со":1,"об":1,"да":1,"я":1,"мы":1,"вы":1,"их":1,"им":1};
function typoStr(t){
  if(!t||t.indexOf(' ')<0) return t;
  var NB='\u00A0';
  try{
    t=t.replace(/(^|[\s(«"])([А-Яа-яЁё]{1,3}) /g,function(m,pre,w){return TYPO_SHORT[w.toLowerCase()]? pre+w+NB : m;});
    t=t.replace(/(^|[\s(«"])(м|г|ул|д|стр|корп|оф|пр|пер|вл|пом)\. /g,'$1$2.'+NB);
    t=t.replace(/№ /g,'№'+NB);
    t=t.replace(/(\d) (?=[А-Яа-яЁёA-Za-z%])/g,'$1'+NB);
  }catch(e){}
  return t;
}
function typoNodes(root){
  if(!root||!document.createTreeWalker) return;
  var w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode:function(n){
    var p=n.parentNode; if(!p) return NodeFilter.FILTER_REJECT;
    var tag=p.nodeName; if(tag==='SCRIPT'||tag==='STYLE'||tag==='CODE'||tag==='PRE'||tag==='TEXTAREA') return NodeFilter.FILTER_REJECT;
    if(!n.nodeValue||!n.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
    return NodeFilter.FILTER_ACCEPT;
  }});
  var nodes=[],n; while(n=w.nextNode()) nodes.push(n);
  nodes.forEach(function(n){ var v=typoStr(n.nodeValue); if(v!==n.nodeValue) n.nodeValue=v; });
}

 {cat:"Легализация самостроя",c:"#ef7320",title:"819-ПП и Градостроительно-земельная комиссия",items:[["Что такое реестр 819-ПП","Это московский перечень объектов с признаками самовольного строительства, утверждённый постановлением правительства Москвы 819-ПП. Пока объект в нём, им фактически нельзя свободно распоряжаться: не продать, не сдать, не заложить, плюс висит риск сноса. Попасть в реестр можно из-за пристройки, надстройки этажа или изменения назначения без оформления. Чем дольше объект там стоит, тем выше шанс получить предписание."],["Можно ли узаконить уже построенное","Да, построенное можно ввести в правовое поле, это и есть легализация самостроя по ст. 222 ГК и московскому порядку. Через Градостроительно-земельную комиссию исключаем объект из реестра 819-ПП и признаём право собственности на возведённые площади. Ключевое условие: объект должен быть безопасным и соответствовать нормам, иначе комиссия откажет. Поэтому начинаем с честной оценки шансов, а не с обещаний."],["Что такое ГЗК и зачем она нужна","Градостроительно-земельная комиссия Москвы, коллегиальный городской орган, который принимает решения по спорным объектам и землепользованию. Именно её положительное решение, оформленное протоколом, позволяет сохранить объект и оформить право, без этого протокола легализация не состоится. Комиссия смотрит документы, соответствие нормам и градостроительную ситуацию. Наша задача собрать пакет так, чтобы вопрос вообще дошёл до положительного решения."],["Сколько занимает легализация","Обычно от 5 до 15 месяцев в зависимости от объекта и его истории, это не быстрый процесс. Время уходит на экспертизы, подготовку заключений и согласования между ведомствами, тут многое не в наших руках. Зато в наших руках не терять месяцы на исправлении ошибок и повторных подачах. Точный срок по вашей ситуации назовём на разборе, когда увидим документы."],["Что грозит, если не узаконить","Самый тяжёлый сценарий: снос объекта без компенсации по решению о самовольной постройке. Плюс штрафы, блокировка любых сделок с имуществом и постоянный риск получить предписание в неудобный момент. Объект в реестре 819-ПП фактически заморожен: его не продать и не заложить под кредит. Чем раньше начать, тем больше пространства для манёвра, потом варианты сужаются."],["Какие документы вы готовите для легализации","Готовим полный пакет под ГЗК: заключение о соответствии (ЗОС), архитектурно-градостроительный облик (АГР), паспорт безопасности и сопутствующие документы. Каждый из них отвечает за свой блок: соответствие нормам, внешний вид, безопасность конструкций. Собрать их вразнобой мало, важна связка и правильная последовательность подачи. Эту техническую и бумажную часть берём на себя целиком, от вас нужны исходные данные по объекту."]]},
 {cat:"КРТ",c:"#ef7320",title:"Комплексное развитие территорий",items:[["Что такое КРТ простыми словами","Комплексное развитие территории, механизм из главы 10 Градостроительного кодекса: город реорганизует целый участок под новую застройку. Объекты внутри зоны могут изъять, но с выплатой компенсации, это не безвозмездный снос. Проблема в том, что сумму и условия во многом задаёт инициатор проекта. Поэтому важно действовать на опережение, а не ждать готового соглашения с уже посчитанной за вас цифрой."],["Как узнать, что мой объект попал в КРТ","Проверяем по кадастровому номеру и утверждённому проекту КРТ, сверяем границы зоны с расположением объекта. На разборе скажем точно: объект внутри зоны, на её границе или вне её, от этого зависит вся дальнейшая тактика. Иногда попадание неочевидно, потому что проекты меняются и расширяются. Лучше проверить заранее, чем узнать из уведомления об изъятии."],["Сколько времени есть на решение","Ориентир около 90 дней на подписание соглашения о компенсации с момента, когда вам его направили. Срок жёсткий, тянуть до последнего рискованно. Если соглашение не подписать, спор переходит в суд, и тогда сумму определяет уже судебная экспертиза, а не предложенная оценка. Эти три месяца разумнее потратить не на раздумья, а на подготовку своей позиции по стоимости."],["Почему судебная экспертиза даёт больше госоценки","Государственная оценка системно ориентирована вниз, её задача не завысить бюджет изъятия. Независимый эксперт считает иначе: берёт реальный рынок, упущенную выгоду и сделанные улучшения, поэтому итоговая сумма обычно выходит выше. Разница нередко существенная, особенно по коммерческим объектам с арендным потоком. Гарантировать конкретную цифру нельзя, её утверждает суд, но обоснованная экспертиза заметно усиливает позицию."],["Что входит в компенсацию","В состав компенсации входит рыночная стоимость самого объекта плюс убытки и упущенная выгода, например потерянный арендный доход. В ряде случаев добавляется стоимость оборудования и сделанных улучшений, если они подтверждены. Многие собственники по незнанию заявляют только стоимость стен и теряют остальное. Чтобы получить полную сумму, каждую составляющую нужно отдельно посчитать и обосновать документами."]]},
 {cat:"Росреестр и кадастр",c:"#27c281",title:"Регистрация, ЕГРН, приостановки",items:[["Почему Росреестр приостанавливает регистрацию","Чаще всего причина в ошибках технического плана и неполном пакете документов, по ним и идёт большинство приостановок по ст. 26 218-ФЗ. Регистратор не имеет права закрывать глаза на расхождения, поэтому любая неточность тормозит дело. Без профессиональной подготовки приостановка случается примерно в 7 из 10 случаев, это не редкость, а почти норма при самостоятельной подаче. Дешевле подготовить документы правильно сразу, чем потом исправлять под давлением срока."],["Что делать, если регистрацию приостановили","Без паники, у вас есть около 3 месяцев на устранение причин, этого обычно хватает. Сначала разбираем точное основание приостановки, потому что в уведомлении формулировки бывают размытыми. Дальше исправляем документы и подаём повторно, либо, если приостановка спорная, обжалуем её через апелляционную комиссию в течение 30 дней. Главное не упустить срок, иначе последует отказ, и всё придётся начинать заново."],["Сколько занимает регистрация права","Обычно 3-7 рабочих дней после корректной подготовки документов, сами сроки в законе фиксированные. Но отсчёт идёт только при чистом пакете: одна ошибка в техплане сбрасывает всё в приостановку и растягивает процесс на месяцы. Поэтому реальный срок определяется не регистрацией, а качеством подготовки до неё. Мы и закладываемся именно в эту часть."],["Чем технический план отличается от техзаключения","Это два разных документа под разные цели, их часто путают. Технический план нужен для кадастрового учёта и регистрации, он описывает объект в координатах и характеристиках для ЕГРН. Техническое заключение (ТЗК) про другое: состояние конструкций, их надёжность и возможность тех или иных работ. Для сделки нужен техплан, для оценки безопасности и перепланировок ТЗК, а иногда оба сразу."],["Какая госпошлина за регистрацию для юрлиц","В 2026 году для юридических лиц базовая госпошлина за регистрацию права составляет 44 000 ₽. Но есть нюанс: при кадастровой стоимости объекта свыше 22 млн пошлина считается уже не фиксированной суммой, а как 0,2% от этой стоимости. По дорогим объектам это заметно больше базовой ставки, и сумму лучше посчитать заранее. Мы делаем такой расчёт до подачи, чтобы платёж не стал неожиданностью."],["Можно ли всё оформить удалённо","Да, в большинстве случаев работаем по доверенности и с электронной подписью, без вашего личного похода по инстанциям. Документы подаём в электронном виде, это и быстрее, и удобнее для иногородних собственников. Личное присутствие обычно не требуется, исключения бывают по отдельным процедурам, о них предупредим заранее. От вас по сути нужны исходные документы и оформленная доверенность."]]},
 {cat:"Земля: ВРИ, ПЗЗ, ПМТ",c:"#ef7320",title:"Вид разрешённого использования и межевание",items:[["Зачем менять ВРИ участка","Вид разрешённого использования это то, под что земля разрешена по закону. Если назначение помещения не совпадает с ВРИ участка, Росреестр просто не зарегистрирует договор аренды (ст. 37 ГрК РФ), а без корректного вида нельзя ни строить, ни вводить объект в эксплуатацию. На практике это всплывает в самый неподходящий момент: на сделке или при оформлении стройки. Поэтому ВРИ лучше привести в порядок заранее, до того как вы вложитесь в проект."],["Какой штраф за нецелевое использование","Использование участка не по назначению карается по КоАП: для юрлиц это от 1,5 до 2% кадастровой стоимости участка, но не менее 100 000 ₽. Сумма привязана к кадастру, поэтому на дорогой московской земле она ощутима. Дальше хуже: следом обычно подтягивается перерасчёт земельного налога, а штраф могут выписать повторно, пока нарушение не устранено. Дешевле сменить ВРИ, чем платить."],["В чём разница смены ВРИ с ПЗЗ и без","Всё решает градостроительный регламент той зоны, где стоит участок. Если нужный вид уже входит в регламент как основной или условно разрешённый, достаточно заявления, и процедура короткая. Если же его в зоне нет, придётся менять сами правила землепользования и застройки через Департамент градостроительной политики и Градостроительно-земельную комиссию. Это другой уровень: публичные слушания, согласования, заметно дольше по срокам."],["Что такое ПМТ","ПМТ это проект межевания территории, документ, который юридически определяет границы участков на местности. Он нужен, когда вы присоединяете землю, меняете границы или образуете новые участки из существующих. Без утверждённого ПМТ Росреестр не поставит участок на учёт в новых границах. По сути это фундамент любых операций с конфигурацией земли, и делать его стоит до сделок, а не после."],["Сколько занимает смена ВРИ","Сроки сильно зависят от того, нужно ли трогать ПЗЗ. Если нужный вид уже есть в регламенте зоны, смена ВРИ обычно укладывается в 2-4 месяца. Если идём через изменение правил землепользования и застройки, закладывайте 6-10 месяцев: добавляются слушания и согласования с городом. Точный срок диктуют конкретный участок, его зона и загрузка профильных департаментов, поэтому начинать лучше с запасом."]]},
 {cat:"Некапитальные объекты",c:"#ef7320",title:"Павильоны, склады, навесы (636-ПП, 1255-ПП)",items:[["Что считается некапитальным объектом","Это павильоны, киоски, склады, ангары, навесы и модульные здания, у которых нет заглублённого фундамента и которые можно переместить без несоразмерного ущерба. Ключевой признак именно разборность и отсутствие прочной связи с землёй. Грань тонкая: бетонная плита или капитальные коммуникации легко переводят объект в разряд капитальных со всеми вытекающими. Если статус спорный, его лучше зафиксировать заключением заранее, чтобы потом не доказывать городу обратное."],["В чём разница 636-ПП и 1255-ПП","Разница в том, на чьей земле стоит объект. 636-ПП регулирует размещение некапитальных объектов на городской земле, и идёте вы тогда через ДГИ по схеме размещения. 1255-ПП с 01.09.2024 ввело новую процедуру уже для частной земли. То есть выбор постановления это не формальность, а развилка: от формы собственности участка зависит и пакет документов, и орган согласования, и сама логика легализации."],["До какого срока нужно легализовать","Ориентир по 1255-ПП это 01.09.2027: к этой дате объекты на частной земле нужно привести в соответствие с новой процедурой. Тянуть до последнего рискованно. Согласование требует времени, а ближе к дедлайну поток заявлений и нагрузка на органы вырастут. Разумнее согласовать объект заранее, не дожидаясь проверки Госинспекции по недвижимости, чтобы спокойно успеть и не попасть под санкции."],["Что грозит без согласования","Несогласованный объект уязвим со всех сторон. Его могут снести без всякой компенсации, юрлицу выписать штраф до 1 млн ₽, приостановить работу точки. Параллельно нередко блокируют операции с имуществом, и бизнес фактически встаёт. Важно понимать: снос идёт за счёт владельца, а потери от простоя никто не возмещает. Поэтому согласование почти всегда дешевле последствий."]]},
 {cat:"ДГИ",c:"#ff8a3d",title:"Выкуп, аренда, споры с городом",items:[["Кому положен выкуп помещения по 159-ФЗ","Преимущественное право выкупа по 159-ФЗ даёт малому и среднему бизнесу. Базовые условия: помещение городское, вы арендуете его не менее 2 лет и у вас нет долгов по арендной плате. Компания при этом должна числиться в реестре субъектов МСП. Дальше включается выкуп по рыночной оценке с возможностью рассрочки, поэтому до подачи стоит закрыть все хвосты по аренде, иначе город откажет именно на этом основании."],["Как оспорить завышенную цену выкупа","Цена выкупа строится на отчёте оценщика, и именно отчёт чаще всего и завышен. Спорят так: заказывают независимую оценку, а при расхождении идут в суд, где назначается экспертиза. По нашим делам стоимость выкупа удавалось снижать в разы. Гарантировать конкретную цифру нельзя, её определяет суд, но грамотно собранная доказательная база реально сдвигает оценку в вашу пользу. Главное не подписывать договор по первой названной сумме."],["Что делать со штрафом ДГИ за нецелевое использование","Сначала разбираем основание: что именно вменяют и подтверждено ли это документами и осмотром. Дальше два пути, иногда параллельно: привести назначение помещения в соответствие с фактом или обжаловать само требование. Часто штраф удаётся отменить или снизить, потому что в актах ДГИ хватает процедурных огрехов. Реагировать важно в срок, у обжалования свои дедлайны, и пропускать их нельзя."],["Можно ли продлить и сохранить льготную аренду","Да. Мы оформляем и продлеваем договоры аренды с городом и помогаем удержать льготную ставку, в том числе когда при проверке город пытается её пересмотреть. Слабое место это условия договора и фактическое использование помещения: малейшее расхождение даёт повод снять льготу. Поэтому продление готовим заранее и заранее закрываем спорные моменты, чтобы у ДГИ не было формальных причин поднять ставку."],["Как снизить кадастровую стоимость","Кадастровая стоимость часто оторвана от реальной рыночной, а именно от неё считаются и налог, и многие арендные платежи. Снижают её через независимую оценку, а затем обращение в бюджетное учреждение (ГБУ) или сразу в суд. Эффект двойной: падает налоговая база и уменьшаются платежи, привязанные к кадастру. Результат зависит от качества отчёта и решения органа, но при крепкой оценке пересмотр вполне реален."]]},
 {cat:"Управление недвижимостью",c:"#f2b705",title:"Управляющая компания полного цикла",items:[["Сколько стоит управление объектом","Есть два базовых тарифа и индивидуальный вариант. «Минимум» это от 5% арендного потока, «Оптимальный» 10%, либо собираем набор услуг конкретно под ваш объект. Логика простая: процент от потока означает, что управляющий зарабатывает, когда зарабатываете вы. Что именно входит в каждый тариф, фиксируем в договоре заранее, чтобы потом не было сюрпризов по объёму работ. Под крупный или сложный объект почти всегда выгоднее индивидуальная схема."],["Какие объекты берёте в управление","Берём коммерческую недвижимость: торговую, офисную, складскую и производственную. У каждого типа своя специфика, у ритейла трафик и арендный микс, у склада логистика и техническое состояние, у офиса заполняемость и пул арендаторов. Поэтому под формат объекта подбираем и стратегию управления, а не работаем по единому шаблону. Если объект смешанного назначения, считаем под его реальную структуру."],["Что входит в управление","Это полный цикл, чтобы собственник не вникал в операционку. Берём на себя техническое обслуживание здания, весь арендный процесс (поиск и удержание арендаторов, договоры), финансовое управление, юридическое сопровождение и маркетинг объекта. Смысл в том, чтобы все эти направления вёл один центр ответственности, тогда объект работает как единая система, а доходность не проседает из-за разрозненных подрядчиков."],["Помогаете ли инвесторам","Да, ведём инвестора с самого начала, ещё до покупки. Подбираем объект под задачу, проверяем юридическую чистоту (собственники, обременения, аресты, история сделок) и считаем реальную доходность и окупаемость, а не обещанную продавцом. Это снимает главный риск инвестиций в недвижимость: купить дорого то, что приносит меньше ожидаемого. Решение остаётся за вами, но на руках будут честные цифры и проверенный титул."]]},
];

 "sudebnaya-ekspertiza": [{"type": "p", "text": "Судебная строительно-техническая экспертиза это центр любого спора о недвижимости. Эксперт отвечает суду, капитальный ли объект, соответствует ли нормам и нет ли угрозы жизни и здоровью. Что он зафиксирует, то и ляжет в решение. Поэтому всю работу мы ведём ДО эксперта."}, {"type": "h2", "text": "Что изменилось с 2024 года"}, {"type": "p", "text": "По распоряжению Правительства РФ от 31.10.2023 № 3041-р судебную экспертизу по делам о самовольном строительстве проводят только государственные организации, прежде всего ФБУЗ РФЦСЭ при Минюсте. Госэксперт строже частного и обычно не оценивает устранимость: фиксирует нарушение на дату осмотра. Очередь 6 до 12 месяцев, и это окно для подготовки."}, {"type": "bullets", "items": ["Обследование объекта по ГОСТ 31937-2011", "Устранение нарушений по пожарной и конструктивной части", "Имитация осмотра по чек-листу эксперта до самой экспертизы", "Рецензия на отрицательное заключение и доводы для суда"]}, {"type": "key", "stat": "6 до 12 месяцев", "text": "очередь на экспертизу в РФЦСЭ. Это не повод тянуть, а время привести объект в порядок: после экспертизы исправлять уже поздно."}, {"type": "note", "style": "warn", "text": "Отрицательное заключение госэксперта практически невозможно оспорить, а повторная экспертиза снова идёт в РФЦСЭ. Поэтому ставка на подготовку до экспертизы, а не на спор после."}, {"type": "h2", "text": "С чего начать"}, {"type": "p", "text": "Пришлите адрес, кадастровый номер, документы БТИ и определение суда о назначении экспертизы. Проведём обследование и приведём объект в соответствие нормам до приезда эксперта."}],

 "stroitelno-montazhnye-raboty": [{"type": "p", "text": "Строительно-монтажные работы это сама стройка: то, что превращает проект в готовый объект. Мы ведём их в связке с проектированием и согласованиями, поэтому стройка идёт по уже утверждённой документации, без расхождений между бумагой и фактом."}, {"type": "h2", "text": "Что делаем"}, {"type": "bullets", "items": ["Общестроительные работы: конструкции, перегородки, проёмы, усиление", "Монтаж инженерных систем по разделам ВК, ОВиК, ЭОМ", "Фасадные и кровельные работы по проекту", "Исполнительная документация и акты скрытых работ"]}, {"type": "steps", "items": ["Смета и график: считаем объёмы и сроки по проекту", "Производство работ: бригады и контроль качества на объекте", "Скрытые работы: фиксируем актами по ходу", "Сдача: исполнительная документация и приёмка"]}, {"type": "note", "style": "info", "text": "Стройка в том же едином окне, где шли проект, согласования и регистрация. Один ответственный за объект, не нужно сводить пятерых подрядчиков."}, {"type": "h2", "text": "С чего начать"}, {"type": "p", "text": "Пришлите проект (или то, что есть по объекту) и адрес. Оценим объём, дадим смету и график, состыкуем стройку с согласованиями и вводом, чтобы не терять время на стыках."}],
 "otdelochnye-raboty": [{"type": "p", "text": "Отделочные работы это финальный этап, когда помещение получает готовый вид под конкретное назначение. Мы делаем чистовую отделку под офис, ритейл или общепит, по дизайн-проекту и с учётом норм, чтобы объект сразу можно было запускать."}, {"type": "h2", "text": "Что входит"}, {"type": "bullets", "items": ["Черновая и чистовая отделка: полы, стены, потолки", "Инженерная подготовка под отделку: электрика, вода, вентиляция", "Подбор и закупка материалов под бюджет и стиль", "Финальная уборка и сдача помещения"]}, {"type": "steps", "items": ["Замеры и дизайн-проект: фиксируем решение и материалы", "Подготовка: черновые работы и инженерия", "Чистовая отделка: по проекту, с контролем качества", "Сдача: готовое помещение под ваше назначение"]}, {"type": "note", "style": "info", "text": "Если по объекту шли перепланировка или согласования, отделку стыкуем с ними в одном окне, чтобы фактическая планировка совпала с документами и не всплыла на регистрации."}, {"type": "h2", "text": "С чего начать"}, {"type": "p", "text": "Пришлите план помещения, назначение (офис, магазин, кафе) и пожелания по уровню отделки. Подготовим смету и предложим решение по материалам и срокам."}],

 "order-oati": [{"type": "p", "text": "Ордер ОАТИ это разрешительный документ Объединения административно-технических инспекций города Москвы. Он нужен любому, кто собирается копать грунт, ставить строительные леса, временное ограждение стройплощадки или размещать временный объект на городской территории. Касается это и крупных застройщиков, и собственника, который заводит на участок новый кабель или меняет коммуникации."}, {"type": "p", "text": "Порядок выдачи ордеров закреплён Постановлением Правительства Москвы №284-ПП от 19 мая 2015 года (действует с учётом последних изменений). Подать заявление можно только в электронном виде через портал mos.ru, бумажных ордеров с 2016 года нет."}, {"type": "h2", "text": "Какие бывают ордера"}, {"type": "bullets", "items": ["На земляные работы: вскрытие грунта, прокладка и ремонт коммуникаций, бурение", "На установку временных ограждений и строительных лесов", "На размещение временных объектов и проведение работ на территории города"]}, {"type": "p", "text": "Логика двухступенчатая. Сначала оформляется ордер на подготовительные работы, и только потом на основные. Без проекта производства работ (ППР) ордер не выдадут, поэтому ППР готовится заранее и идёт в пакете документов."}, {"type": "h2", "text": "Этапы работы"}, {"type": "steps", "items": ["Разбор задачи: смотрим, какие работы планируются и какой вид ордера нужен", "Подготовка ППР и документов: проект производства работ, схемы, согласования смежных ведомств", "Подача через mos.ru: формируем заявление и комплект в электронном виде", "Получение ордера: ведём дело, отвечаем на замечания инспекции", "Закрытие ордера: после завершения работ восстанавливаем благоустройство и проходим проверку"]}, {"type": "key", "stat": "13 раб. дней", "text": "регламентный срок оформления ордера на земляные работы, включая межведомственный обмен. По другим видам сроки близкие."}, {"type": "note", "style": "warn", "text": "Если работы затрагивают проезжую часть, тротуары или остановки, дополнительно потребуется согласование Департамента транспорта. Это закладываем в график заранее, чтобы не сорвать сроки."}, {"type": "p", "text": "Самовольные земляные работы без ордера это административное нарушение по статье 8.18 КоАП Москвы. Для юридических лиц штраф доходит до 1 миллиона рублей, а работы могут остановить. Отдельный риск это незакрытый вовремя ордер: пока благоустройство не восстановлено и инспекция не приняла объект, ордер висит на компании."}, {"type": "key", "stat": "с 1 января 2025", "text": "ОАТИ расширило территорию: услуги по ордерам и уведомлениям заработали для городских округов Троицк и Щербинка, раньше там выдавали бумажные ордера местные администрации."}, {"type": "p", "text": "С чего начать. Пришлите адрес объекта, что именно планируете делать (копать, ставить леса, ограждение), границы участка и проект, если он уже есть. По этим данным мы скажем, какой вид ордера нужен, какие документы соберём и за какой срок реально выйти на стройку."}],
 "koloristicheskiy-pasport": [{"type": "p", "text": "Колористический паспорт это документ ДГП, который фиксирует цвет фасада и отделочные материалы. На его основании здание красят и отделывают. Нужен он собственникам и арендаторам зданий, управляющим компаниям, бизнесу, который приводит фасад в порядок или меняет облик после ремонта."}, {"type": "p", "text": "Процедуру задаёт Постановление Правительства Москвы №114-ПП от 28 марта 2012 года (с изменениями, последние правки порядка вступили в силу в 2025 году). Сначала разрабатывается проект колористического решения, затем на его базе оформляется сам паспорт."}, {"type": "h2", "text": "Что входит"}, {"type": "bullets", "items": ["Проект колористического решения фасада с пояснительной запиской", "Подбор цветов строго по международным палитрам NCS и RAL", "Сбор и проверка документов на здание", "Подача заявления через портал и ведение дела до выдачи паспорта"]}, {"type": "h2", "text": "Какие документы понадобятся"}, {"type": "bullets", "items": ["Выписка из ЕГРН на здание или помещение", "Технический паспорт и поэтажные планы (форма 1а, не старше 1 года)", "Проект колористического решения фасада", "Фотографии фасада и окружающей застройки"]}, {"type": "key", "stat": "до 17 раб. дней", "text": "срок рассмотрения и согласования в ДГП. Регистрация в реестре занимает дополнительное время."}, {"type": "note", "style": "warn", "text": "Колористический паспорт это не разрешение на работы. Если для покраски нужны строительные леса и ограждение, ордер ОАТИ на фасадные работы оформляется отдельно."}, {"type": "p", "text": "Срок реализации согласованного решения отсчитывается от даты выдачи паспорта и зависит от вида работ (покраска и ремонт фасада, капитальный ремонт). Точный срок по конкретному объекту мы называем по действующей редакции регламента, чтобы паспорт не оказался просроченным к началу работ."}, {"type": "steps", "items": ["Обследование фасада: выезжаем, фотографируем, фиксируем текущее состояние", "Проект колористики: подбираем цвета и материалы в NCS и RAL, готовим записку", "Сбор документов: выписка ЕГРН, техпаспорт, планы, готовим доверенность", "Подача и согласование: ведём дело в ДГП, отрабатываем замечания", "Выдача паспорта: получаем документ и передаём вам с пояснениями по срокам"]}, {"type": "note", "style": "info", "text": "Чаще всего отказывают из-за ошибок в документах, незаконных пристроек на фасаде и работ без допуска СРО. Поэтому документы и проект мы проверяем до подачи, а проектные работы ведём с действующим допуском СРО."}, {"type": "p", "text": "С чего начать. Пришлите адрес здания, выписку ЕГРН (или хотя бы кадастровый номер), техпаспорт с поэтажными планами и свежие фото фасада. Мы оценим состояние документов, скажем, что нужно дособрать, и предложим колористическое решение под ваш объект и окружение."}],
 "soglasovanie-fasada": [{"type": "p", "text": "Согласование изменений фасада нужно, когда вы пробиваете новый вход, переносите или растёсываете окна, ставите входную группу, меняете остекление, облицовку или вешаете оборудование на стену. Это касается и нежилых помещений в жилых домах, и отдельно стоящих зданий. Сделать это по факту, без согласования, рискованно: предписание и требование вернуть всё назад обходятся дороже самой процедуры."}, {"type": "h2", "text": "Помещение в многоквартирном доме"}, {"type": "p", "text": "Фасад и несущие стены дома это общее имущество собственников. Поэтому для нежилого помещения в жилом доме сначала нужен протокол общего собрания собственников. Кворум по затрагиванию общего имущества не меньше двух третей голосов (статьи 36 и 44-46 Жилищного кодекса). Без протокола согласование не пройдёт."}, {"type": "bullets", "items": ["Протокол общего собрания собственников (кворум от 2/3 голосов)", "Проект изменений фасада и пояснительная записка", "Санитарно-эпидемиологическое заключение Роспотребнадзора, если нужно по назначению", "Ордер ОАТИ, если планируются земляные работы у входной группы"]}, {"type": "note", "style": "warn", "text": "Если затрагиваются несущие конструкции, обязательны раздел КР и техническое заключение о состоянии конструкций и допустимости работ. Без них вход в стене не согласуют и не примут."}, {"type": "p", "text": "Согласует фасадные изменения ДГП. Для помещений в жилом доме в процедуру включается Мосжилинспекция в рамках межведомственного взаимодействия, поэтому проект должен биться и по архитектуре, и по правилам перепланировки."}, {"type": "h2", "text": "Отдельно стоящее нежилое здание"}, {"type": "p", "text": "Здесь процедура проще, собрание собственников не нужно. Логика такая: проект, техническое заключение, согласование ДГП, затем технический план и регистрация изменений в ЕГРН."}, {"type": "steps", "items": ["Проект и обследование: готовим проект изменений и техническое заключение", "Собрание собственников: для помещения в жилом доме собираем протокол от 2/3", "Согласование: проводим проект через ДГП (и Мосжилинспекцию для жилого дома)", "Работы: выполняются по согласованному проекту, при земляных работах с ордером ОАТИ", "Учёт: оформляем техплан и вносим изменения в ЕГРН"]}, {"type": "quote", "text": "Фасадные изменения, зафиксированные «красными линиями» в документах БТИ, согласовать по факту нельзя. Сначала фасад возвращают в проектное состояние и заново инвентаризируют.", "cite": "п. 20 Приложения 1 к 508-ПП"}, {"type": "p", "text": "Это частая и неприятная ситуация. Если в плане БТИ уже стоят красные линии по фасаду, узаконить переделку «как есть» не получится. Нужно либо вернуть стену в проектный вид и снять красные линии повторной инвентаризацией, либо доказывать законность работ документами. Мы разбираем такие случаи отдельно по каждому объекту."}, {"type": "p", "text": "С чего начать. Пришлите адрес, тип помещения (в жилом доме или отдельное здание), что хотите изменить на фасаде и план БТИ, если он есть. Мы скажем, нужен ли протокол собрания, есть ли красные линии и какой маршрут согласования у вашего объекта."}],
 "proekt-prisposobleniya-okn": [{"type": "p", "text": "Проект приспособления нужен, когда здание признано объектом культурного наследия (памятником архитектуры), а вы хотите его перепланировать, отремонтировать, реконструировать или отреставрировать под современное использование. Своими силами и обычным проектом тут не обойтись: работы на ОКН жёстко регулируются."}, {"type": "p", "text": "Основная норма это Федеральный закон №73-ФЗ от 25 июня 2002 года «Об объектах культурного наследия». В Москве за работы на памятниках отвечает Департамент культурного наследия (Мосгорнаследие)."}, {"type": "note", "style": "warn", "text": "Разрабатывать проект и вести работы на ОКН может только организация с лицензией Минкультуры на сохранение объектов культурного наследия и допуском СРО. Без этих документов любые работы на памятнике незаконны, а ответственность здесь высокая, вплоть до уголовной."}, {"type": "h2", "text": "Что входит и через какие этапы идём"}, {"type": "steps", "items": ["Заключение о допустимости работ: проверяем, что вообще можно делать с памятником", "Охранное обязательство и акт технического состояния: фиксируем предмет охраны и состояние", "Проект приспособления: готовим научно-проектную документацию по требованиям Мосгорнаследия", "Историко-культурная экспертиза: проект проходит обязательную ГИКЭ у аттестованных Минкультом экспертов", "Согласование и утверждение: получаем заключение Мосгорнаследия, при работах в жилом доме распоряжение Мосжилинспекции"]}, {"type": "quote", "text": "Историко-культурную экспертизу проводят только эксперты, аттестованные Министерством культуры. Заключение «дружественного» специалиста без аттестации не имеет силы.", "cite": "73-ФЗ от 25.06.2002"}, {"type": "key", "stat": "21 раб. день", "text": "регламентный срок проведения историко-культурной экспертизы. Заключение Мосгорнаследия по проекту выдаётся в срок около 15 рабочих дней."}, {"type": "p", "text": "По срокам стоит быть реалистом. От первого обследования до разрешения на работы на памятнике обычно уходит несколько месяцев: сказываются и экспертиза, и согласования, и сама сложность научно-проектной документации. Зато проект, прошедший ГИКЭ и Мосгорнаследие, защищает вас от остановки работ и требований всё переделать."}, {"type": "note", "style": "info", "text": "Предмет охраны у каждого памятника свой: где-то это фасады и лепнина, где-то планировка или конкретные интерьеры. От него зависит, что можно менять, а что трогать нельзя. Поэтому работу всегда начинаем с предмета охраны и акта технического состояния."}, {"type": "p", "text": "С чего начать. Пришлите адрес здания, документ или статус, по которому оно отнесено к ОКН (региональный, федеральный, выявленный), и что планируете делать (ремонт, реставрация, приспособление под новую функцию). Мы проверим предмет охраны, скажем, какие работы допустимы, и соберём команду с нужными лицензиями и экспертами."}],
 "proekt-vk-ovik": [{"type": "p", "text": "Любая стройка дышит и пьёт. Вода заходит, стоки уходят, воздух греется и обновляется. Раздел ВК отвечает за трубы, раздел ОВиК за тепло и вентиляцию. Без этих двух разделов проект не пройдёт ни экспертизу, ни согласование, а здание потом просто не запустить."}, {"type": "h2", "text": "Что входит в проект"}, {"type": "bullets", "items": ["ВК: схемы холодного и горячего водоснабжения, бытовой и ливневой канализации, гидравлический расчёт, подбор насосов, спецификации труб и арматуры", "ОВиК: отопление, приточная и вытяжная вентиляция, кондиционирование, аэродинамический и тепловой расчёты", "Планы, аксонометрические схемы, узлы, ведомости и спецификации оборудования", "Точки подключения к наружным сетям и расчёт нагрузок на ввод"]}, {"type": "key", "stat": "2 раздела", "text": "ВК и ОВиК часто делают связкой: они делят одни и те же шахты, зашивки и отметки потолка, поэтому проектировать их по отдельности дороже и дольше."}, {"type": "steps", "items": ["Сбор исходных данных: обмеры, технические условия, задание на проектирование", "Расчёты: гидравлика для ВК, аэродинамика и теплопотери для ОВиК", "Чертежи и спецификации по ГОСТ 21.601-2011 и ГОСТ 21.704-2011", "Согласование разделов и корректировка по замечаниям"]}, {"type": "h2", "text": "Согласование и сроки"}, {"type": "p", "text": "Наружные сети водопровода и канализации согласует Мосводоканал, он же выдаёт технические условия на подключение. Санитарную часть (вентиляция, питьевая вода) проверяет Роспотребнадзор, при необходимости оформляется санитарно-эпидемиологическое заключение. Внутренние перекладки в готовом доме согласует управляющая компания. Сроки зависят от объекта: рабочая документация по обоим разделам обычно занимает от 3 до 6 недель, согласования идут параллельно и считаются отдельно."}, {"type": "note", "style": "info", "text": "СП 60.13330 действует в редакции 2020 года с изменениями 2024 и 2025 годов. Старую маркировку «СНиП 41-01-2003» в проекте указываем как актуализированную, чтобы не было вопросов на экспертизе."}, {"type": "p", "text": "С чего начать. Пришлите планы помещений (обмерочные или БТИ), назначение объекта и площадь, имеющиеся технические условия от Мосводоканала и теплосети, а также пожелания по составу систем (нужно ли кондиционирование, приточка, тёплые полы). Этого хватит, чтобы оценить объём и назвать срок и стоимость."}],
 "proekt-eom": [{"type": "p", "text": "ЭОМ это электрика объекта на бумаге: откуда приходит питание, как оно делится по щитам, чем светят и что включают. Сюда же заземление и молниезащита, то, о чём вспоминают в последнюю очередь, а проверяют в первую."}, {"type": "h2", "text": "Что входит в раздел ЭОМ"}, {"type": "bullets", "items": ["Однолинейные и расчётные схемы электроснабжения", "Силовое оборудование, розеточные группы, распределительные щиты", "Рабочее и аварийное (эвакуационное) освещение, расчёт освещённости", "Зануление, заземление, система уравнивания потенциалов, молниезащита", "Расчёт нагрузок, выбор сечения кабелей и аппаратов защиты, спецификации"]}, {"type": "steps", "items": ["Получение технических условий и задания на проектирование", "Расчёт электрических нагрузок и выбор схемы питания", "Чертежи планов сетей, схемы щитов, расчёты освещения и заземления", "Согласование и сдача рабочей документации"]}, {"type": "key", "stat": "Изм. №7", "text": "СП 256.1325800.2016 действует в редакции с изменениями, последнее официальное Изменение №7 утверждено Минстроем, в работе проект Изменения №9 (зарядки электромобилей, учёт энергии). Проект ведём по действующей редакции."}, {"type": "h2", "text": "Технические условия и согласование"}, {"type": "p", "text": "Если мощности хватает и подключение идёт от внутридомовых сетей, технические условия выдаёт управляющая компания. При первичном подключении или увеличении мощности технологическое присоединение оформляет сетевая организация. В Москве и области это ПАО «Россети Московский регион» (прежнее название МОЭСК), заявку подают через их портал или через mos.ru. Стандартные сроки присоединения от 20 до 180 дней в зависимости от мероприятий сетевой компании."}, {"type": "note", "style": "warn", "text": "На крупных и ответственных объектах раздел ЭОМ может попасть под экспертизу и проверку органов энергонадзора. Требования к составу растут вместе с мощностью и площадью, поэтому объём работ оцениваем по конкретному объекту, а не по типовой ставке."}, {"type": "p", "text": "С чего начать. Пришлите планировку с расстановкой оборудования и мебели (или хотя бы назначение помещений), требуемую мощность или перечень потребителей, имеющиеся технические условия и сведения о точке подключения. Если ТУ ещё нет, поможем их получить."}],
 "konstruktivnye-resheniya": [{"type": "p", "text": "КР это скелет здания на чертежах: что держит нагрузку и не даёт конструкции сложиться. Раздел нужен не только новостройкам. Хотите проём в несущей стене, антресоль или второй свет, значит, нужен расчёт и проект усиления."}, {"type": "h2", "text": "Из чего состоит раздел КР"}, {"type": "bullets", "items": ["КЖ: монолитные и сборные железобетонные конструкции, фундаменты, плиты, колонны", "КМ: металлические каркасы, балки, фермы, связи", "КД: деревянные конструкции, стропильные системы", "КМД: рабочие деталировочные чертежи металла для завода-изготовителя", "Сбор нагрузок, статический расчёт, спецификации материалов"]}, {"type": "key", "stat": "ПП №87", "text": "Состав и содержание раздела КР задаёт Постановление Правительства РФ №87 от 16.02.2008. Оно действует, последняя редакция от 21.10.2025, раздел «Конструктивные и объёмно-планировочные решения» там обязательный."}, {"type": "steps", "items": ["Обследование или обмеры, сбор исходных данных по конструкциям", "Сбор нагрузок и статический расчёт (вручную и в расчётном комплексе)", "Разработка чертежей КЖ, КМ, КД и при необходимости КМД", "Согласование решений по усилению при перепланировке"]}, {"type": "h2", "text": "Согласование и сроки"}, {"type": "p", "text": "Для перепланировки с затрагиванием несущих конструкций в Москве проект и техническое заключение проходят через Мосжилинспекцию. Для нового строительства раздел КР идёт в составе проектной документации на экспертизу. Срок разработки зависит от сложности: проект усиления одного проёма делается заметно быстрее, чем каркас здания, ориентир называем после оценки исходных данных."}, {"type": "note", "style": "warn", "text": "Самовольный проём или демонтаж части несущей стены без расчёта это риск для всего дома и повод для предписания. Любое вмешательство в несущие конструкции считаем и проектируем, а не делаем «на глаз»."}, {"type": "p", "text": "С чего начать. Пришлите планы с указанием несущих стен и перекрытий (или поэтажный план БТИ), год и тип постройки (панель, кирпич, монолит), что именно планируете менять, и фото конструкций, если они доступны. По этим данным определим состав раздела и объём расчётов."}],
 "akusticheskiy-raschet": [{"type": "p", "text": "Шум не видно, а проблемы от него вполне реальные: жалобы соседей, предписания, отказ в согласовании. Акустический расчёт показывает заранее, во что превратится работа вентиляции или клубного звука у соседа за стеной, и какие меры нужны, чтобы остаться в норме."}, {"type": "h2", "text": "Когда нужен расчёт"}, {"type": "bullets", "items": ["Системы вентиляции и кондиционирования: шум вентиляторов и воздуховодов", "Рестораны, кафе, бары, клубы с музыкальным оборудованием", "Встроенные помещения в жилых домах (магазины, общепит на первых этажах)", "Любой объект, где Роспотребнадзор требует подтвердить нормы шума"]}, {"type": "key", "stat": "40/30 дБА", "text": "Для жилых комнат допустимый уровень постоянного шума 40 дБА днём (с 7:00 до 23:00) и 30 дБА ночью (с 23:00 до 7:00). Значения закреплены СанПиН 1.2.3685-21 (таблица 5.35), на них и опираемся."}, {"type": "steps", "items": ["Сбор данных: характеристики оборудования, планировка, конструкции стен и перекрытий", "Расчёт уровней звукового давления в октавных полосах от 63 до 8000 Гц", "Сравнение с нормами СП 51.13330.2011 и СанПиН 1.2.3685-21", "Подбор мер: шумоглушители, виброизоляторы, шумоизоляция ограждений"]}, {"type": "h2", "text": "Согласование и сроки"}, {"type": "p", "text": "Акустический расчёт обычно идёт в составе проекта вентиляции или раздела по защите от шума и предъявляется при согласовании с Роспотребнадзором. СП 51.13330.2011 действует, последнее Изменение №4 введено с 13 января 2024 года, расчёт ведём по актуальной редакции. Отдельный расчёт по одному объекту делается быстро, в связке с проектом вентиляции считается в общем сроке раздела."}, {"type": "note", "style": "info", "text": "Расчёт честно показывает и хорошее, и плохое: если по исходным данным норма не проходит, мы предложим конкретные меры шумоглушения, а не подгоним цифры. Подтверждаем то, что реально достижимо на объекте."}, {"type": "p", "text": "С чего начать. Пришлите тип объекта и его расположение (особенно если рядом или сверху жильё), характеристики шумного оборудования (вентиляторы, акустические системы, их мощность и паспорта), планировку и сведения о конструкциях стен и перекрытий. По ним соберём расчёт и список мер."}],
 "soglasovanie-pereplanirovki": [{"type": "p", "text": "Перепланировка нежилого помещения это перенос или снос перегородок, новые проёмы, изменение состава комнат, объединение или разделение площадей. Если помещение находится в жилом доме, согласует Мосжилинспекция. Услуга нужна тем, кто открывает магазин, офис, клинику или кафе и хочет привести помещение под себя по закону, а не на свой страх и риск."}, {"type": "h2", "text": "Что регулирует процедуру"}, {"type": "p", "text": "Базовый документ это Постановление Правительства Москвы №508-ПП. С 23 апреля 2025 года действует редакция, внесённая Постановлением №841-ПП от 18.04.2025. Главное изменение: перепланировка считается завершённой только после внесения изменений в ЕГРН. Раньше многие получали акт приёмочной комиссии и на этом успокаивались, теперь без новой выписки помещение юридически не приведено в порядок, и сделка с ним может сорваться. Процедура переведена в электронный формат."}, {"type": "h2", "text": "Что входит в работу"}, {"type": "bullets", "items": ["Обмеры и проверка помещения, оценка, что согласуют, а что нет", "Проект перепланировки, при затрагивании несущих конструкций техническое заключение", "Санитарно-эпидемиологическое заключение Роспотребнадзора, когда оно требуется по профилю", "Подача в Мосжилинспекцию, ведение переписки, ответы на замечания", "Приёмка работ, технический план у кадастрового инженера, внесение в ЕГРН"]}, {"type": "steps", "items": ["Аудит: смотрим помещение и документы, говорим, реально ли согласовать задуманное", "Проект и заключения: готовим проектную документацию и техническое заключение", "Согласование: подаём в Мосжилинспекцию, отрабатываем замечания", "Завершение: приёмка, технический план, запись в ЕГРН и свежая выписка"]}, {"type": "key", "stat": "2-8 месяцев", "text": "По практике внутренняя перепланировка без несущих конструкций в нежилом здании занимает 2-3 месяца, в помещении внутри жилого дома 4-8 месяцев. При работах с несущими добавляется примерно месяц на техническое заключение."}, {"type": "note", "style": "warn", "text": "Мораторий на штрафы за самовольную перепланировку действовал до 31 декабря 2023 года и не продлён. Сейчас штрафы снова применяются: по статье 7.21 КоАП РФ для юридических лиц это 40 000-50 000 рублей, а в Москве по статье 9.12 КоАП города Москвы суммы выше. Кроме штрафа грозит предписание вернуть помещение в проектное состояние, иск Мосжилинспекции и сложности с продажей или залогом."}, {"type": "p", "text": "Если работы затрагивают несущие конструкции, техническое заключение готовит автор проекта дома (часто это МНИИТЭП, Моспроект или ЦНИИЭП жилища) либо ГБУ «Экспертный центр», когда автора уже нет. Это требование редакции 508-ПП, обойти его нельзя."}, {"type": "note", "style": "info", "text": "С чего начать: пришлите нам план БТИ (поэтажный план и экспликацию), свидетельство или выписку ЕГРН на помещение и фото или эскиз того, что хотите изменить или уже сделали. По этим документам мы за один-два дня скажем, согласуется ли перепланировка, в какие сроки и что войдёт в смету."}],
 "soglasovanie-otdelnogo-vhoda": [{"type": "p", "text": "Отдельный вход это самостоятельная дверь с улицы и входная группа: крыльцо, навес, иногда пандус. Чаще всего его делают из окна, разбирая подоконный блок. Услуга нужна арендаторам и собственникам коммерческих помещений на первых этажах жилых домов, ведь без своего входа торговую точку, аптеку или клинику просто не открыть."}, {"type": "h2", "text": "Почему без собрания собственников не обойтись"}, {"type": "p", "text": "Фасад дома и несущие стены это общее имущество всех собственников (статья 36 ЖК РФ). Когда вы пробиваете проём в фасаде, вы затрагиваете чужое имущество, поэтому нужно согласие собрания. По работам, которые меняют режим использования общего имущества, протокол ОСС готовится с кворумом не менее двух третей голосов (статьи 44 и 46 ЖК РФ). Собрание собственников это самый частый камень преткновения, и мы помогаем провести его правильно."}, {"type": "h2", "text": "Что входит в работу"}, {"type": "bullets", "items": ["Проект перепланировки с разделом КР по усилению проёма в несущей стене", "Техническое заключение о состоянии конструкций", "Подготовка и проведение общего собрания собственников, протокол ОСС", "СЭЗ Роспотребнадзора по профилю помещения", "Распоряжение Мосжилинспекции, приёмка, новый технический план и запись в ЕГРН"]}, {"type": "steps", "items": ["Оценка: проверяем фасад, несущую стену и реальность входа в этом месте", "Проект: разрабатываем входную группу и узел усиления проёма", "Собрание: собираем общее собрание собственников и оформляем протокол", "Согласование: подаём в Мосжилинспекцию, отрабатываем замечания", "Завершение: приёмка, технический план, внесение в ЕГРН"]}, {"type": "note", "style": "info", "text": "Для нежилого помещения в жилом доме отдельный (второй) вход часто обязателен как эвакуационный по пожарным нормам. Это аргумент в вашу пользу, но он не отменяет ни проект, ни собрание собственников."}, {"type": "key", "stat": "Подвал и цоколь", "text": "Вход в подвал или цокольный этаж почти всегда означает земляные работы под приямок и лестницу. Тогда дополнительно нужен ордер ОАТИ на производство работ и заключение по подземным сооружениям (Мосгоргеотрест). Это удлиняет сроки, такие случаи мы ведём отдельно."}, {"type": "note", "style": "warn", "text": "Самовольно прорубленный вход это не только штраф, но и предписание восстановить фасад за свой счёт. Восстановление обычно дороже грамотного согласования, а помещение всё это время простаивает. Поэтому вход лучше узаконить до начала торговли, а не после визита инспекции."}, {"type": "p", "text": "С чего начать: пришлите план БТИ на помещение, выписку ЕГРН, фото фасада с улицы и места, где планируете вход. Если вход уже сделан, добавьте фото готовой входной группы. Мы оценим, согласуется ли он, какой кворум собрания понадобится и сколько займёт процедура."}],
 "soglasovanie-antresoli": [{"type": "p", "text": "Антресоль это дополнительный ярус внутри помещения с высоким потолком: второй уровень для склада, кабинетов или зоны отдыха. Услуга нужна владельцам магазинов, шоурумов, кафе и складов, которые хотят выжать из площади больше, не пристраивая ничего снаружи."}, {"type": "h2", "text": "Главное правило: площадь и высота"}, {"type": "p", "text": "Чтобы конструкция считалась именно антресолью, а не новым этажом, её площадь не должна превышать 40 процентов площади помещения. Перешагнули порог, это уже антресольный этаж и совсем другая, более тяжёлая процедура. Высота от пола до низа антресоли и от антресоли до чистого потолка должна быть не менее 2,1 метра. Эти требования закреплены в 508-ПП и СП 54.13330. С 2021 года сняли прежний запрет на мокрые зоны на антресоли, так что санузел или мойку наверху теперь можно предусмотреть."}, {"type": "h2", "text": "Что входит в работу"}, {"type": "bullets", "items": ["Проверка помещения на соответствие правилу 40 процентов и высотам", "Техническое заключение о состоянии несущих конструкций", "Проект антресоли, раздел КР (железобетон) или КМ (металл)", "СЭЗ Роспотребнадзора, когда требуется по профилю", "Согласование, приёмка, технический план и запись в ЕГРН"]}, {"type": "steps", "items": ["Замер: проверяем площадь, высоты и несущую способность перекрытий", "Заключение: готовим техническое заключение по конструкциям", "Проект: разрабатываем конструктив антресоли", "Согласование: подаём документы и отрабатываем замечания", "Завершение: приёмка, технический план, внесение в ЕГРН"]}, {"type": "note", "style": "warn", "text": "Отдельно стоящее нежилое здание это особый случай. Возведение антресоли в нём Росреестр нередко трактует как реконструкцию, а не перепланировку, ведь меняется внутренний объём и площадь. Тогда вместо согласования нужно разрешение на реконструкцию, и порядок совсем другой. Мы определяем это на старте, чтобы вы не пошли по неверному пути и не потеряли время."}, {"type": "key", "stat": "40% и 2,1 м", "text": "Два числа решают судьбу проекта: площадь антресоли до 40 процентов площади помещения и высота ярусов не меньше 2,1 метра. Если по факту построено с нарушением этих параметров, узаконить будет трудно, иногда придётся уменьшать или разбирать конструкцию."}, {"type": "p", "text": "С чего начать: пришлите план БТИ с указанием высоты потолков, выписку ЕГРН и эскиз или фото антресоли, которую планируете или уже построили. Мы прикинем площадь и высоты, скажем, проходит ли это как перепланировка, и составим понятный план действий."}],
 "prisoedinenie-cherdaka": [{"type": "p", "text": "Речь о присоединении чердака над верхним этажом к помещению или квартире и об оформлении мансарды как полноценной площади. Это привлекательная идея для собственников верхних этажей и инвесторов, но одна из самых тяжёлых в согласовании. Поэтому мы начинаем с трезвой оценки, а не с обещаний."}, {"type": "h2", "text": "Почему это так сложно"}, {"type": "p", "text": "Чердак это общее имущество всех собственников дома (статья 36 ЖК РФ). Когда вы забираете его себе, общее имущество уменьшается. По закону для уменьшения общего имущества и реконструкции, которая его затрагивает, нужно согласие 100 процентов собственников. Собрать все подписи без единого отказа удаётся редко, и именно на этом чаще всего проекты и останавливаются."}, {"type": "h2", "text": "Перепланировка или реконструкция"}, {"type": "p", "text": "Если присоединяете уже существующий чердак без изменения габаритов здания, это ближе к перепланировке. Если поднимаете крышу, меняете высоту и площадь, надстраиваете мансарду, это реконструкция. Реконструкция требует разрешения Мосгосстройнадзора, нередко изменения правил землепользования и застройки (ПЗЗ), нового градостроительного плана участка (ГПЗУ) и согласований с Департаментом городского имущества. Применяются СП 54.13330 для жилых и СП 118.13330 для общественных зданий."}, {"type": "steps", "items": ["Анализ: проверяем статус чердака, ГПЗУ, ПЗЗ и расклад по собственникам", "Согласие: помогаем организовать собрание и собрать нужные подписи", "Проект: готовим проектную документацию по нормам СП", "Разрешение: при реконструкции ведём получение разрешения Мосгосстройнадзора", "Оформление: ввод, технический план, регистрация прав в ЕГРН"]}, {"type": "key", "stat": "100% собственников", "text": "Для отчуждения чердака и реконструкции с уменьшением общего имущества нужно согласие всех собственников дома. Для отдельных решений по общему имуществу хватает кворума в две трети, но именно присоединение и реконструкция поднимают планку до полного согласия."}, {"type": "note", "style": "warn", "text": "Процедура долгая и затратная, а исход зависит от собственников, ГПЗУ и позиции города. Мы не обещаем результат там, где он от нас не зависит. Сначала оцениваем экономическую целесообразность: сколько стоит весь путь и стоит ли полученная площадь этих вложений. Если шансов мало, скажем об этом прямо."}, {"type": "note", "style": "info", "text": "С чего начать: пришлите выписку ЕГРН на ваше верхнее помещение, поэтажный план с чердаком, адрес дома и в двух словах задачу (жильё, офис, апартаменты). Мы поднимем ГПЗУ и ПЗЗ по адресу, оценим реальность и вернёмся с честным разбором: идти этим путём или искать другой."}],
 "sez-rospotrebnadzor": [{"type": "p", "text": "СЭЗ (санитарно-эпидемиологическое заключение) нужно, когда перепланировка задевает санитарные нормы. Оно подтверждает, что новые решения по проекту соответствуют СанПиН. Эту бумагу спрашивают и при согласовании перепланировки квартиры, и при переводе помещения в нежилой фонд. Заключение выдаёт ФБУЗ «Центр гигиены и эпидемиологии в городе Москве», то есть структура Роспотребнадзора, а не сам Роспотребнадзор напрямую."}, {"type": "h2", "text": "Когда заключение обязательно"}, {"type": "bullets", "items": ["Появляются новые мокрые точки или санузлы", "Меняется или переносится система вентиляции", "Переносится либо меняется мусоропровод в жилом доме", "Переоборудуется кухня", "Помещение переводится в нежилой фонд"]}, {"type": "p", "text": "Если ничего из этого нет и перепланировка простая (например, перенос ненесущей перегородки без воды и вентиляции), СЭЗ обычно не требуется. Точный список зависит от конкретного проекта, поэтому его сверяют до подачи."}, {"type": "steps", "items": ["Сбор документов: правоустанавливающие бумаги, проект перепланировки, эскиз изменений", "Подача в ФБУЗ: заявка и оплата счёта (часто работа идёт после полной предоплаты)", "Санитарная экспертиза: специалисты проверяют проект на соответствие СанПиН", "Выдача заключения: положительное СЭЗ либо мотивированный отказ"]}, {"type": "key", "stat": "до 30 рабочих дней", "text": "стандартный срок рассмотрения документов в ФБУЗ. Готовое заключение, как правило, действует один год, если в самом документе не указано иначе."}, {"type": "note", "style": "warn", "text": "Если проект нарушает санитарные нормы (например, мокрая зона оказывается над жилой комнатой соседей снизу), ФБУЗ выдаст отказ. Поэтому проект сверяют с нормами до подачи, а не после. Мы не обещаем заведомо невозможного и сразу говорим, если по нормам решение не проходит."}, {"type": "p", "text": "Правовая основа в Москве, это постановление Правительства Москвы 508-ПП от 25.10.2011 в действующей редакции, оно регулирует переустройство и перепланировку помещений в многоквартирных домах. Редакцию и перечень случаев мы проверяем на дату обращения, потому что состав требований периодически уточняют."}, {"type": "h2", "text": "С чего начать"}, {"type": "p", "text": "Пришлите проект перепланировки (или эскиз изменений, если проекта ещё нет), правоустанавливающие документы на помещение и технический паспорт БТИ. По этим материалам инженер скажет, нужно ли СЭЗ в вашем случае, и соберёт пакет под подачу в ФБУЗ. Спорные узлы поправим в проекте заранее, чтобы снизить риск отказа."}],
 "tehplan-arenda": [{"type": "p", "text": "Технический план для аренды нужен, когда в аренду идёт не всё помещение целиком, а его часть. Чтобы такую часть можно было зарегистрировать, её сначала ставят на кадастровый учёт, и для этого готовят технический план. Делает его кадастровый инженер, состоящий в государственном реестре, иначе Росреестр документ не примет."}, {"type": "h2", "text": "Когда техплан обязателен"}, {"type": "bullets", "items": ["В аренду передаётся часть помещения или здания, а не объект целиком", "Помещение ещё не стоит на кадастровом учёте", "Под арендатора меняется планировка, и контур площади сдвигается"]}, {"type": "p", "text": "По статье 44 (пункт 5) Федерального закона 218-ФЗ от 13.07.2015 кадастровый учёт части идёт одновременно с регистрацией договора аренды. Части присваивается временный кадастровый номер. Если техплан не приложить, часть на учёт не поставят, и аренда оформится только как обременение всего объекта, без выделения конкретной площади."}, {"type": "note", "style": "info", "text": "Долгосрочный, это договор на срок от 12 месяцев. Такой договор обязательно регистрируют в Росреестре. Без регистрации он не имеет юридической силы: на него нельзя опереться в суде и он не защищает арендатора от продажи объекта."}, {"type": "key", "stat": "44 000 руб / 4 000 руб", "text": "госпошлина за регистрацию договора аренды с 1 января 2025 года: 44 000 руб для организаций и 4 000 руб для физлиц (раньше было 22 000 и 2 000). Для дорогих объектов, где кадастровая стоимость выше порога около 22 млн руб, пошлина считается как 0,2% от кадастровой стоимости, но не более 1 млн руб. За соглашение об изменении или расторжении аренды: 2 000 руб для организаций и 700 руб для физлиц."}, {"type": "note", "style": "warn", "text": "С 1 марта 2025 года юридические лица подают заявления и документы на кадастровый учёт и регистрацию только в электронном виде, по 487-ФЗ. Подпись, УКЭП (усиленная квалифицированная электронная подпись). Бумажные заявления от юрлиц возвращают без рассмотрения (отдельные категории, вроде ТСЖ и кооперативов, могли подавать на бумаге до 1 января 2026 года). Многие до сих пор называют старые суммы и старый порядок, поэтому сверяйте цифры и способ подачи на дату сделки."}, {"type": "steps", "items": ["Сбор документов: договор аренды, поэтажный план БТИ с экспликацией, выписка ЕГРН, эскиз контура арендуемой части", "Обмеры и подготовка: кадастровый инженер фиксирует границы части и готовит технический план", "Подача в Росреестр: техплан вместе с заявлением о регистрации аренды (для юрлиц электронно, через УКЭП)", "Результат: части присваивают временный кадастровый номер, аренду регистрируют, выписку ЕГРН выдают на руки"]}, {"type": "h2", "text": "С чего начать"}, {"type": "p", "text": "Пришлите договор аренды (или его проект), поэтажный план БТИ с экспликацией, свежую выписку ЕГРН на помещение и эскиз контура той части, которая идёт в аренду. По этим документам инженер оценит объём работ, а юрист проверит, всё ли готово для регистрации, и подскажет, какой будет пошлина именно по вашему объекту."}],
