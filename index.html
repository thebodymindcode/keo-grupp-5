 с учёта Росреестр проводит бесплатно"], ["5 дней", "рабочих: срок снятия с учёта при электронной подаче"], ["25+ лет", "совокупного опыта команды, часть специалистов раньше работали в Росреестре и БТИ"]],tariffs:[["Акт обследования", "от 12 000 ₽", "срок назовём после разбора", "Выезд кадастрового инженера, осмотр объекта, электронный акт с УКЭП по форме приказа № П/0217, комплект документов-оснований", false], ["Снятие с учёта под ключ", "по запросу", "до записи в ЕГРН", "Акт обследования, заявление в Росреестр по доверенности, одновременное прекращение права, работа с приостановкой, итоговая выписка из ЕГРН", true], ["Документальное сопровождение сноса", "по запросу", "весь цикл сноса", "Уведомления о планируемом и завершённом сносе по ст. 55.31 ГрК, акт обследования после демонтажа, снятие с учёта, основание для прекращения налога", false]],micro:"Пришлите кадастровый номер или выписку из ЕГРН, за 10 минут скажем, что нужно для снятия объекта с учёта и когда запись уйдёт из реестра. Бесплатно.",faq:[["Что такое акт обследования и зачем он нужен?", "Это документ кадастрового инженера, который подтверждает, что здание, сооружение или объект незавершённого строительства прекратил существование: снесён, сгорел, разрушился. Только на его основании Росреестр снимает объект с кадастрового учёта (ст. 23 закона № 218-ФЗ). Пока акта нет, объект юридически жив, даже если на участке пустырь."], ["Сколько стоит акт обследования в Москве?", "У нас от 12 000 ₽, итоговая цена зависит от типа объекта и комплекта документов о сносе. Само снятие с учёта в Росреестре бесплатно, госпошлина не предусмотрена (актуально на июль 2026). Разбор ситуации до начала работ делаем бесплатно за 1 день."], ["Какие документы нужны для снятия здания с кадастрового учёта?", "Выписка из ЕГРН, документ о праве, уведомление о завершении сноса, решение собственника о сносе, справки об отключении коммуникаций. По приказу Росреестра № П/0217 документы-основания прикладываются при наличии: если какого-то нет, инженер указывает причину прямо в акте, и это не блокирует снятие с учёта."], ["Сколько времени занимает снятие объекта с кадастрового учёта?", "Росреестр рассматривает заявление 5 рабочих дней при электронной подаче и 7 при подаче через МФЦ (актуально на июль 2026). Если на объект зарегистрировано право, его прекращают одновременно со снятием с учёта, отдельной процедуры не нужно. Плюс время на выезд инженера и подготовку акта."], ["Надо ли платить налог за снесённое здание?", "По Налоговому кодексу налог прекращается с 1-го числа месяца гибели или сноса объекта, для этого подаётся заявление в ФНС (п. 4.1 ст. 382 и п. 2.1 ст. 408 НК). Но налоговая требует подтверждений, и без акта споры затягиваются: в апреле 2026 компании пришлось дойти до Верховного суда, чтобы оспорить налог за снесённый объект, который продолжал числиться в ЕГРН. Акт обследования и погашенная запись дают ФНС бесспорное основание."], ["Можно ли снять объект с учёта, если он разрушился сам, без сноса?", "Да. Гибель объекта из-за пожара, аварии или ветхости тоже основание для акта обследования. Инженер фиксирует состояние на месте, к акту прикладываем справку МЧС или другие подтверждения, дальше стандартная процедура снятия с учёта."], ["Кто вправе подать заявление о снятии с кадастрового учёта?", "Собственник объекта. Если объект ранее учтённый и права на него в ЕГРН не зарегистрированы, заявление вправе подать собственник земельного участка, на котором он стоял (ст. 15 закона № 218-ФЗ). Мы подаём по доверенности, личное присутствие не нужно."], ["Нужно ли уведомлять о сносе, и что делать, если снесли без уведомлений?", "По ст. 55.31 ГрК уведомление о планируемом сносе подаётся не позднее чем за 7 рабочих дней до начала работ, о завершении сноса в течение 7 рабочих дней после. В Москве обе подачи идут через mos.ru. Снесли без уведомлений: ситуация решаемая, акт обследования готовится и без них, причину отсутствия инженер укажет в акте."], ["Росреестр приостановил снятие с учёта, что делать?", "Приостановка это не отказ: закон даёт 3 месяца на устранение причин. Чаще всего дело в акте, который не соответствует форме № П/0217, или в нехватке оснований. Разбираем уведомление регистратора, исправляем акт и подаём заново, а при спорной позиции Росреестра идём в апелляционную комиссию, там рассмотрение занимает 30 дней."]],seo:{"title": "Акт обследования и снятие с кадастрового учёта в Москве", "desc": "Акт обследования от 12 000 ₽: выезд кадастрового инженера, снятие объекта с учёта в Росреестре за 5 дней, прекращение налога. Москва и МО, по доверенности."}},

 "izmeneniya-egrn":{group:"kadastr",title:"Внесение изменений в ЕГРН в Москве",lede:"Вносим изменения в ЕГРН после перепланировки, реконструкции и смены назначения помещения, исправляем ошибки реестра. Сам учёт изменений в Росреестре занимает 5-7 рабочих дней, вместе с техпланом весь путь обычно укладывается в 2-3 недели. Работаем по Москве и МО по доверенности, ваше присутствие не нужно. Сопровождение от 20 000 ₽, разбор документов бесплатно за 1 день.",badge:["400+", "объектов зарегистрировано в Росреестре с 2010 года"],img:"izmeneniya-egrn",updated:"июль 2026",scenarios:[["Сделали перепланировку офиса или квартиры, а в выписке ЕГРН всё по-старому. Банк и покупатель смотрят именно на выписку", "Проверим, узаконена ли перепланировка, закажем техплан у кадастрового инженера, подадим заявление и доведём до новой выписки с актуальным планом"], ["Реконструировали здание: выросла площадь, добавился этаж. Реестр этого не видит, продать или заложить объект не выходит", "Соберём основания (разрешительные документы, техплан), проведём учёт изменений, а при изменении площади и регистрацию права одной заявкой"], ["Хотите перевести квартиру в нежилой фонд под офис или магазин, или вернуть помещению статус жилого", "Сопроводим перевод назначения через ДГИ Москвы (до 34 рабочих дней), включая протокол общего собрания собственников, и внесём новое назначение в ЕГРН"], ["В выписке ошибка: не та площадь, этаж, адрес или конфигурация. Из-за неё налог считают неверно, сделка буксует", "Определим, техническая это ошибка или реестровая, подготовим документы и добьёмся исправления. Техническую Росреестр правит за 3 рабочих дня, спорную ведём через суд"], ["Подали документы сами, и Росреестр приостановил учёт изменений", "Разберём уведомление о приостановке, устраним причину (чаще всего это ошибки в техплане), при необходимости обжалуем в апелляционной комиссии, её срок рассмотрения 30 дней"]],pains:["Штраф за самовольную перепланировку: организации 40 000-50 000 ₽, гражданам 2 000-2 500 ₽ по ч. 2 ст. 7.21 КоАП РФ, плюс предписание вернуть всё как было (актуально на июль 2026)", "С 1 апреля 2024 года перепланировка юридически не завершена, пока изменения не внесены в ЕГРН (закон 608-ФЗ). Ремонт сделан, а формально нарушение продолжается", "Договор аренды на год и дольше Росреестр не зарегистрирует, пока планировка и назначение в ЕГРН не совпадут с фактом: арендатор ждёт или уходит", "Банк не берёт в залог объект, у которого выписка расходится с реальностью: кредит и сделка встают до приведения реестра в порядок", "Самостоятельная подача без подготовки заканчивается приостановкой, по нашей практике, примерно в 7 случаях из 10, а это ещё до 3 месяцев на устранение причин"],steps:[["01", "Разбор документов", "Присылаете выписку из ЕГРН и описание того, что изменилось. За 1 день бесплатно скажем, какая процедура нужна: учёт изменений, узаконивание перепланировки, перевод назначения или исправление ошибки"], ["02", "Подготовка оснований", "Кадастровый инженер выезжает на объект (до 50 км от МКАД выезд включён), делает обмеры и технический план за 3-5 дней, срочно за 1-2 дня. Параллельно собираем согласования и акты, если они нужны"], ["03", "Узаконивание, если требуется", "Самовольную перепланировку сначала легализуем: техническое заключение, согласование в МЖИ, приёмочный акт. Без этого регистратор изменения не пропустит"], ["04", "Подача в Росреестр", "Готовим заявление, оплачиваем госпошлину (1 000 ₽ для граждан, 2 000 ₽ для организаций за учёт изменений), подаём в электронном виде по доверенности"], ["05", "Сопровождение учёта", "Учёт изменений идёт 5 рабочих дней при прямой подаче, 7 через МФЦ. Отвечаем на запросы регистратора и снимаем замечания до результата"], ["06", "Новая выписка", "Передаём вам выписку из ЕГРН с актуальными характеристиками и закрывающие документы для бухгалтерии"]],stats:[["400+", "объектов зарегистрировали в Росреестре с 2010 года"], ["5-7", "рабочих дней занимает учёт изменений после подачи"], ["7 из 10", "подач без подготовки уходят в приостановку, по нашей практике"], ["2 000 ₽", "госпошлина за учёт изменений для организаций"]],tariffs:[["Учёт изменений в ЕГРН", "от 20 000 ₽", "5-7 рабочих дней в Росреестре", "Разбор документов, заявление, подача по доверенности, ответы на запросы регистратора, новая выписка", true], ["Технический план", "от 15 000 ₽", "3-5 дней, срочно 1-2 дня", "Выезд кадастрового инженера, обмеры, техплан в формате Росреестра", false], ["Исправление ошибки ЕГРН", "по запросу", "от 3 рабочих дней", "Определяем тип ошибки, готовим документы, добиваемся исправления, при споре ведём дело в суде", false]],micro:"Пришлите выписку из ЕГРН и опишите, что изменилось: за 1 день бесплатно скажем, какая процедура нужна, какие документы собрать и сколько это займёт.",faq:[["Сколько стоит внести изменения в ЕГРН?", "Сопровождение от 20 000 ₽. Отдельно оплачиваются госпошлина (1 000 ₽ для граждан и 2 000 ₽ для организаций за учёт изменений, актуально на июль 2026) и технический план от 15 000 ₽, если менялись характеристики объекта. Точную стоимость называем после бесплатного разбора документов за 1 день."], ["Какой срок внесения изменений в ЕГРН?", "Сам учёт изменений Росреестр проводит за 5 рабочих дней при прямой подаче и за 7 через МФЦ (ст. 16 закона 218-ФЗ). Вместе с подготовкой техплана весь путь обычно занимает 2-3 недели. Если перепланировку сначала нужно узаконить, добавьте время на согласование в МЖИ."], ["Нужен ли технический план после перепланировки?", "Да. Если поменялись площадь, конфигурация, назначение или этажность, регистратору нужен новый техплан от кадастрового инженера. Качество техплана решает исход: ошибки в нём это главная причина приостановок, по нашей статистике 35% случаев."], ["Что будет, если не вносить изменения в ЕГРН после перепланировки?", "С 1 апреля 2024 года перепланировка считается завершённой только после внесения сведений в ЕГРН (закон 608-ФЗ), до этого момента формально она не оформлена. Организации грозит штраф 40 000-50 000 ₽, гражданам 2 000-2 500 ₽ по ч. 2 ст. 7.21 КоАП РФ и предписание вернуть исходную планировку. Плюс объект не продать, не заложить и не сдать в долгую аренду."], ["Как изменить назначение помещения в ЕГРН?", "Перевод из жилого в нежилое и обратно в Москве идёт через ДГИ, услуга электронная, срок до 34 рабочих дней. Для перевода квартиры понадобится протокол общего собрания собственников дома и согласие владельцев примыкающих помещений. После решения о переводе вносим новое назначение в ЕГРН."], ["Как исправить ошибку в ЕГРН?", "Сначала определяем её тип по ст. 61 закона 218-ФЗ. Техническую ошибку (опечатка регистратора) Росреестр исправляет за 3 рабочих дня, реестровую (ошибка в техплане или межевом плане) за 5 рабочих дней после подачи верных документов. Если исправление задевает права третьих лиц или Росреестр отказал, добиваемся исправления через суд."], ["Правда ли, что после перепланировки квартиры МЖИ сама передаёт документы в Росреестр?", "Да, для квартир в многоквартирных домах Москвы после подписания акта приёмочной комиссии МЖИ направляет документы на учёт изменений сама, техплан прикладывается к заявлению о выдаче акта. Для нежилых помещений и зданий заявление в Росреестр подаёт собственник, эту часть мы берём на себя."], ["Росреестр приостановил учёт изменений. Что делать?", "Приостановка это не отказ: закон даёт 3 месяца на устранение причин. Разбираем уведомление, исправляем техплан или досылаем документы, как правило, снимаем приостановку без суда. Решение регистратора можно обжаловать в апелляционной комиссии Росреестра, срок рассмотрения 30 дней."], ["Можно ли внести изменения в ЕГРН без личного присутствия?", "Да. Работаем по нотариальной доверенности и подаём документы в электронном виде, приезжать никуда не нужно. Если по нашей вине регистрация не пройдёт, вернём деньги или исправим за свой счёт, гарантия прописана в договоре."]],seo:{"title": "Внесение изменений в ЕГРН в Москве от 20 000 ₽ | KEO GROUP", "desc": "Внесение изменений в ЕГРН после перепланировки, реконструкции, смены назначения. Техплан, подача, снятие приостановок. Москва и МО, учёт за 5-7 рабочих дней."}},

 "kadastrovyy-uchet":{group:"kadastr",title:"Кадастровый учёт недвижимости в Москве",lede:"Ставим здания, помещения и сооружения на кадастровый учёт, вносим изменения после реконструкции и перепланировки, снимаем с учёта снесённые объекты. Технический план готовим за 3-5 дней, сам учёт в Росреестре идёт 5-7 рабочих дней. Работаем по Москве и области по доверенности, ваше присутствие не нужно. Стоимость от 15 000 ₽ плюс госпошлина.",badge:["400+", "объектов поставили на учёт и зарегистрировали с 2010 года"],img:"kadastrovyy-uchet",updated:"июль 2026",scenarios:[["Построили здание, получили разрешение на ввод, а в ЕГРН объекта нет. Продать или заложить его невозможно", "Готовим технический план и подаём на постановку одновременно с регистрацией права. Одна процедура вместо двух, 10-12 рабочих дней в Росреестре"], ["После реконструкции или перепланировки площадь изменилась, а в выписке ЕГРН старые цифры", "Делаем обмеры, готовим техплан на изменения и вносим новые характеристики в реестр. Документы и факт снова совпадают"], ["Здание давно снесли, а налог на него продолжает приходить", "Кадастровый инженер выезжает на участок, готовит акт обследования, снимаем объект с учёта. Госпошлины за снятие нет, начисления прекращаются"], ["Сдаёте часть здания или помещения, а Росреестр не регистрирует договор аренды без учёта этой части", "Готовим техплан на часть и ставим её на учёт одновременно с регистрацией договора. Арендатор спокойно заезжает"], ["Подали документы сами и получили приостановку", "Разбираем уведомление, исправляем техплан или досылаем недостающее и доводим учёт до записи в ЕГРН. Как правило, без суда"]],pains:["Неучтённый объект юридически не существует: его нельзя продать, сдать в аренду, заложить в банк. Любая сделка встаёт до постановки на учёт, это минус 2-4 недели в лучшем случае", "Без подготовки Росреестр приостанавливает учёт, по нашей практике, примерно в 7 из 10 случаев. На устранение даётся 3 месяца, дальше отказ и весь круг заново", "Снесённое здание в ЕГРН продолжает облагаться налогом на имущество. Каждый месяц без акта обследования это лишние начисления за несуществующий объект", "Ошибки в техплане дают, по нашей статистике, 35% всех приостановок. Чужой шаблонный план вместо настоящих обмеров оборачивается 1-3 месяцами ожидания", "Требования к документам обновляются: с февраля 2026 в техпланах обязателен идентификатор адреса ФИАС. Старые заготовки Росреестр возвращает"],steps:[["01", "Разбор объекта", "Присылаете выписку ЕГРН и документы. За 1 день бесплатно объясняем порядок: какой документ нужен, техплан или акт обследования, сколько это стоит и какой срок"], ["02", "Обмеры и документ", "Кадастровый инженер выезжает на объект (Москва и МО, до 50 км от МКАД выезд включён), делает обмеры и готовит техплан или акт обследования. 3-5 дней, срочно 1-2 дня с доплатой"], ["03", "Подача в Росреестр", "Собираем пакет, считаем госпошлину и подаём по доверенности в электронном виде. Вам никуда ехать не нужно"], ["04", "Контроль учёта", "Учёт идёт 5-7 рабочих дней. Отслеживаем статус, на вопросы регистратора отвечаем сами. Пришла приостановка, устраняем причину и доводим до результата"], ["05", "Результат", "Выписка из ЕГРН с новыми данными плюс закрывающие документы для бухгалтерии. Если по нашей вине учёт не пройдёт, вернём деньги или исправим за свой счёт, гарантия в договоре"]],stats:[["400+", "объектов на учёте и в ЕГРН, практика с 2010 года"], ["3-5 дней", "готовим технический план с выездом инженера"], ["5-7", "рабочих дней идёт кадастровый учёт в Росреестре"], ["7 из 10", "самостоятельных подач уходят в приостановку, по нашей практике"]],tariffs:[["Постановка на учёт", "от 15 000 ₽", "около 2 недель", "Обмеры, технический план, подача в Росреестр по доверенности, контроль до записи в ЕГРН, выписка", true], ["Учёт изменений", "от 15 000 ₽", "около 2 недель", "Обмеры после реконструкции или перепланировки, техплан на изменения, подача, новые характеристики в ЕГРН", false], ["Снятие с учёта", "от 12 000 ₽", "около 2 недель", "Выезд инженера, акт обследования, снятие снесённого объекта с учёта. Госпошлины за снятие нет", false]],micro:"Пришлите выписку из ЕГРН или просто адрес объекта. За 1 день бесплатно скажем, какой документ нужен (техплан или акт обследования), сколько это стоит и когда данные появятся в реестре.",faq:[["Сколько стоит поставить объект на кадастровый учёт?", "Наши работы от 15 000 ₽: обмеры, технический план и подача под ключ. Плюс госпошлина: 2 000 ₽ для физлиц, 22 000 ₽ для юрлиц (актуально на июль 2026). Если одновременно регистрируется право, юрлица платят ещё пошлину за регистрацию, 44 000 ₽ при кадастровой стоимости до 22 млн ₽."], ["Какая госпошлина за кадастровый учёт в 2026 году?", "Постановка на учёт: 2 000 ₽ физлицам, 22 000 ₽ юрлицам. Учёт изменений: 1 000 ₽ и 2 000 ₽ соответственно. Снятие с учёта бесплатно. Пошлины введены с января 2025, до этого учёт был бесплатным. Считаем сумму заранее, чтобы подача не сорвалась из-за недоплаты."], ["Сколько длится кадастровый учёт?", "По статье 16 закона 218-ФЗ: 5 рабочих дней при подаче в Росреестр, 7 через МФЦ. Одновременный учёт и регистрация права: 10 и 12 рабочих дней. Мы подаём электронно, это самый быстрый канал. Вместе с подготовкой техплана весь путь занимает около 2 недель."], ["Какие документы нужны для постановки на учёт?", "Правоустанавливающие документы на землю или объект, разрешение на ввод для нового здания, технический план от кадастрового инженера и доверенность на нас. Техплан делаем сами, остальной пакет проверяем и собираем на разборе за 1 день."], ["Росреестр приостановил кадастровый учёт. Что делать?", "Приостановка это не отказ: закон даёт 3 месяца на устранение причины. По нашей статистике 35% приостановок это ошибки в техплане, 25% неполный пакет. Читаем уведомление, исправляем документ, досылаем недостающее. Как правило, снимаем без суда. Есть и апелляционная комиссия Росреестра, она рассматривает жалобу 30 дней."], ["Можно ли сдать в аренду часть здания без кадастрового учёта?", "Договор аренды части здания или помещения на срок от года Росреестр регистрирует только с учётом этой части. Готовим техплан на часть, и она встаёт на учёт одновременно с регистрацией договора, это 10-12 рабочих дней. Отдельно ходить в Росреестр дважды не нужно."], ["Здание снесли, а налог продолжают начислять. Как это остановить?", "Пока запись живёт в ЕГРН, для налоговой объект существует. Кадастровый инженер выезжает, фиксирует, что строения нет, и готовит акт обследования. По нему Росреестр снимает объект с учёта, госпошлина за это не взимается. После снятия начисления прекращаются."], ["Чем грозит неучтённый объект?", "Продать, подарить, заложить или официально сдать его нельзя: права без учёта не регистрируются. Налоговая при выявлении объекта всё равно доначислит налог, аэрофотосъёмку и обходы никто не отменял. Дешевле поставить на учёт по своей инициативе и распоряжаться объектом свободно."], ["Нужно ли моё присутствие?", "Нет. Работаем по нотариальной доверенности: подаём документы, отвечаем на запросы регистратора, получаем выписку. Вам остаётся дать доступ инженеру для обмеров и получить результат с закрывающими документами."]],seo:{"title": "Кадастровый учёт недвижимости в Москве от 15 000 ₽ | KEO GROUP", "desc": "Постановка на кадастровый учёт, учёт изменений и снятие с учёта в Москве и МО. Техплан за 3-5 дней, учёт 5-7 рабочих дней. По доверенности, гарантия в договоре."}},

 "mezhevanie-granicy":{group:"kadastr",title:"Межевание и уточнение границ земельного участка в Москве и Подмосковье",lede:"Устанавливаем границы участков и вносим их в ЕГРН: межевание, уточнение границ, вынос точек в натуру, перераспределение. С 1 марта 2025 года Росреестр не регистрирует сделки с участками без установленных границ, поэтому межевание перестало быть формальностью. Работы от 20 000 ₽, кадастровый учёт 5-7 рабочих дней, выезд инженера до 50 км от МКАД включён.",badge:["400+", "объектов в нашей практике Росреестра с 2010 года"],img:"mezhevanie-granicy",updated:"июль 2026",scenarios:[["Продаёте или покупаете участок, а в выписке ЕГРН написано «границы не установлены». Сделку в таком виде Росреестр приостановит.", "Проведём межевание, согласуем границы с соседями и внесём координаты в ЕГРН. После этого сделка регистрируется в обычном порядке."], ["Сосед поставил забор и, похоже, занял часть вашей земли. Спорите на словах, доказательств нет.", "Вынесем точки границ в натуру: инженер закрепит их межевыми знаками по координатам из ЕГРН и составит акт. С этим актом разговор с соседом становится предметным, а при необходимости он ложится в основу иска."], ["По факту пользуетесь большей площадью, чем записано в документах: участок огорожен так уже много лет.", "Уточним границы с законной прирезкой: до 10% площади по ЕГРН или в пределах минимального размера участка. Оформим межевой план с обоснованием и проведём учёт."], ["Рядом с участком пустует полоска городской земли, хотите присоединить её официально.", "Оформим перераспределение по ст. 39.28 ЗК РФ: схема расположения, соглашение с городом, плата за прирост площади, учёт нового участка. С 10 февраля 2026 года порядок обновлён законом 12-ФЗ, работаем уже по новым правилам."], ["В ЕГРН границы вашего участка пересекаются с соседним, из-за этого встали раздел, продажа или стройка.", "Разберёмся, где реестровая ошибка: подготовим межевой план с обоснованием исправления, согласуем с соседями и снимем пересечение через Росреестр."]],pains:["Сделка встала: с 1 марта 2025 года Росреестр приостанавливает регистрацию перехода права, если у участка нет границ в ЕГРН (закон 487-ФЗ, актуально на июль 2026)", "Пользуетесь землёй за границей своего участка: штраф юрлицу 2-3% кадастровой стоимости, минимум 100 000 ₽ (ст. 7.1 КоАП РФ)", "Ошибка в межевом плане: приостановка учёта и до 3 месяцев на устранение. Без профподготовки так заканчивается примерно 7 из 10 заявлений", "Прирезка сверх лимита (больше 10% площади или предельного минимума) заканчивается отказом в учёте: работы и деньги впустую", "Пересечение границ в ЕГРН блокирует раздел, продажу и получение разрешений, пока ошибку не исправят"],steps:[["01", "Проверка исходных данных", "Смотрим выписку ЕГРН, старые свидетельства и планы, границы соседних участков. Честно говорим, что нужно именно вам: уточнение, вынос точек или перераспределение. Бесплатно, 1 день."], ["02", "Геодезическая съёмка", "Инженер выезжает на участок, выезд до 50 км от МКАД включён в стоимость. Координаты точек определяем с точностью, которую требует приказ Росреестра П/0393: для земель населённых пунктов это 0,10 м."], ["03", "Согласование границ", "Собираем подписи соседей в акте согласования. Если сосед недоступен, действуем по закону о кадастровой деятельности: извещение о собрании направляется минимум за 30 дней, молчание считается согласием."], ["04", "Межевой план", "Кадастровый инженер готовит межевой план в электронном виде с обоснованием местоположения границ. Документ сразу делаем так, чтобы он прошёл проверку Росреестра с первого раза."], ["05", "Кадастровый учёт", "Подаём документы по доверенности, ваше присутствие не нужно. Учёт изменений занимает 5 рабочих дней при подаче напрямую и 7 через МФЦ. Госпошлина: 1 000 ₽ для физлиц, 2 000 ₽ для юрлиц."], ["06", "Результат", "Вы получаете выписку ЕГРН с установленными границами или акт выноса точек. Если по нашей вине регистрация не пройдёт, вернём деньги или исправим за свой счёт, гарантия в договоре."]],stats:[["400+", "объектов зарегистрировано с 2010 года"], ["7 из 10", "заявлений без профподготовки получают приостановку"], ["0,10 м", "точность координат для земель населённых пунктов"], ["5-7", "рабочих дней занимает кадастровый учёт в Росреестре"]],tariffs:[["Межевание и уточнение границ", "от 20 000 ₽", "съёмка + учёт 5-7 раб. дней", "Геодезическая съёмка, согласование с соседями, межевой план, подача в Росреестр по доверенности", true], ["Вынос точек в натуру", "по запросу", "один выезд инженера", "Выезд до 50 км от МКАД включён, закрепление точек межевыми знаками, акт выноса границ", false], ["Перераспределение участков", "по запросу", "срок зависит от решения города", "Схема расположения участка, соглашение с городом по ст. 39.28 ЗК РФ, межевой план, учёт нового участка", false]],micro:"Пришлите кадастровый номер участка, за 10 минут проверим по ЕГРН, установлены ли границы и что мешает вашей сделке.",faq:[["Можно ли продать участок без межевания в 2026 году?", "Нет. С 1 марта 2025 года действует закон 487-ФЗ: если в ЕГРН нет координат границ участка, Росреестр приостанавливает регистрацию купли-продажи, дарения и мены. Запрет касается и дома на таком участке. Сначала межевание, потом сделка."], ["Сколько стоит межевание участка в Москве и области?", "У нас от 20 000 ₽. Итоговая цена зависит от площади и конфигурации участка, удалённости и того, есть ли споры с соседями. Выезд инженера до 50 км от МКАД уже включён. Пришлите кадастровый номер, посчитаем точно."], ["Сколько времени занимает межевание?", "Съёмка на участке занимает один выезд, кадастровый учёт 5 рабочих дней напрямую и 7 через МФЦ. Главная переменная это согласование с соседями: если все подписывают акт сразу, процедура проходит быстро, если кого-то приходится извещать через собрание, добавьте минимум 30 дней на извещение."], ["Можно ли увеличить площадь участка при уточнении границ?", "Да, в пределах лимита: не больше предельного минимального размера участка для вашей зоны, а если он не установлен, не больше 10% площади по ЕГРН. Прирост нужно обосновать в межевом плане, например фактическим забором, который стоит 15 и более лет. Сверх лимита Росреестр откажет."], ["Что такое вынос точек в натуру и когда он нужен?", "Это перенос границ из ЕГРН на местность: инженер по координатам закрепляет поворотные точки межевыми знаками и составляет акт. Нужен перед установкой забора, началом стройки и в спорах с соседями. Ошибка в заборе на чужой земле грозит юрлицу штрафом от 100 000 ₽ по ст. 7.1 КоАП, вынос точек стоит на порядок дешевле."], ["Как оформить прирезку городской земли к своему участку?", "Через перераспределение по ст. 39.28 ЗК РФ: заявление, схема расположения участка, соглашение с городом и плата за прирост площади, которую считают от кадастровой стоимости пропорционально прибавке. С 10 февраля 2026 года порядок обновлён законом 12-ФЗ от 30.01.2026: появилось отдельное основание для устранения нарушений требований к участкам, но и перечень причин для отказа стал шире. Готовим документы так, чтобы под отказ не попасть."], ["Забор соседа стоит на моей земле. Что делать?", "Сначала факты: выносим точки границ в натуру и фиксируем актом, где проходит граница по ЕГРН. Дальше два пути: если у соседа реестровая ошибка, исправляем её через межевой план и Росреестр, если это самозахват, требуем перенести забор, а при отказе обращаемся в суд, опираясь на акт выноса."], ["Какая госпошлина за внесение границ в ЕГРН?", "С 1 января 2025 года учёт изменений платный: 1 000 ₽ для физлиц и 2 000 ₽ для юрлиц (ст. 333.33 НК РФ, актуально на июль 2026). Пошлину считаем и оплачиваем в процессе подачи, отдельно ходить никуда не нужно."], ["Нужно ли согласие соседей на межевание?", "Нужно согласование: соседи подписывают акт согласования границ. Если сосед не выходит на связь, закон разрешает известить его через собрание с публикацией: извещение минимум за 30 дней, отсутствие возражений считается согласием. Возражения соседа не блокируют работу навсегда, но переводят вопрос в спор, который мы тоже сопровождаем."], ["У меня в ЕГРН пересечение границ с соседним участком. Кто виноват и как исправить?", "Чаще всего это реестровая ошибка: кто-то из кадастровых инженеров когда-то определил координаты неверно. Исправляется межевым планом с обоснованием и заключением инженера, через учёт изменений в Росреестре за 5-7 рабочих дней. Пока пересечение не исправлено, участок фактически закрыт для сделок, поэтому откладывать невыгодно."]],seo:{"title": "Межевание и уточнение границ участка в Москве | KEO GROUP", "desc": "Межевание, уточнение границ, вынос точек в натуру, перераспределение участков в Москве и МО. От 20 000 ₽, учёт в Росреестре 5-7 дней, работаем по доверенности."}},

 "prisoedinenie-cherdaka":{group:"kadastr",title:"Присоединение чердака и оформление мансарды в Москве",lede:"Ведём присоединение чердака и оформление мансарды под ключ: проверяем статус чердака, помогаем собрать согласия собственников, готовим проект, проходим согласования вплоть до разрешения Мосгосстройнадзора и регистрируем новые метры в ЕГРН. Это один из самых тяжёлых случаев в согласовании, поэтому начинаем с бесплатной оценки за 1 день: есть ли у проекта реальные шансы и окупятся ли вложения. С Росреестром работаем с 2010 года, в практике 400+ объектов.",badge:["100%", "согласие собственников для чердака в МКД"],img:"prisoedinenie-cherdaka",updated:"июль 2026",scenarios:[["У вас нежилое помещение или офис на верхнем этаже дома, а над ним пустует чердак. Хочется забрать эти метры себе", "Проверим статус чердака, инженерные сети на нём и расклад по собственникам дома. Честно скажем, реально ли собрать 100% согласий именно в вашем доме, и посчитаем экономику до первых трат"], ["Вы собственник отдельного нежилого здания, особняка или административного корпуса. Чердак хотите превратить в полноценный мансардный этаж", "Здесь не нужны согласия соседей, но надстройка мансарды это реконструкция. Определим объём работ, проверим ГПЗУ и ПЗЗ по высоте и плотности, проведём проект через экспертизу и Мосгосстройнадзор"], ["Мансарда уже построена, а в ЕГРН её нет. Банк не берёт здание в залог, покупатель требует чистые документы", "Обследуем конструкцию, оценим, проходит ли она по нормам, и узакониваем по факту: проект, согласование, техплан, регистрация. Если нарушения критичные, скажем сразу, до договора"], ["Только присматриваете верхний этаж или здание с прицелом на чердак и хотите понять перспективу до сделки", "Сделаем правовой аудит до покупки: статус чердака, ограничения ПЗЗ, позиция города, ориентировочный бюджет и срок. Вы принимаете решение до сделки, понимая бюджет, сроки и риски"], ["Начали собирать подписи собственников сами и застряли: часть жильцов против или до них не достучаться", "Возьмём организацию собрания на себя: повестка, форма протокола, юридически чистая процедура. Если видно, что 100% не собрать, честно скажем это раньше, чем вы потратите год"]],pains:["Надстройка мансарды без разрешения на реконструкцию: штраф юрлицу от 500 000 до 1 000 000 ₽ или приостановка деятельности до 90 суток (ст. 9.5 КоАП РФ)", "Самовольная мансарда попадает под ст. 222 ГК РФ: суд вправе признать её самовольной постройкой и обязать снести за счёт собственника", "Самовольное присоединение чердака в многоквартирном доме: штраф юрлицу 40 000-50 000 ₽ по ч. 2 ст. 7.21 КоАП РФ плюс предписание вернуть всё как было", "Один несогласный собственник останавливает проект: для присоединения чердака в МКД нужно согласие 100%, без грамотной подготовки собрания подписи собирают годами", "Мансарда есть, а в ЕГРН её нет: метры нельзя продать, заложить или сдать в долгосрочную аренду, банк и покупатель их просто не видят"],steps:[["01", "Оценка шансов", "За 1 день бесплатно разбираем исходные данные: статус чердака, выписки ЕГРН, ГПЗУ и ПЗЗ, расклад по собственникам, экономику проекта. Если шансов мало, говорим прямо"], ["02", "Согласия собственников", "Для чердака в МКД организуем общее собрание и помогаем собрать 100% подписей: повестка, протокол, юридическая чистота процедуры. Самый непредсказуемый этап, закладывайте от месяца"], ["03", "Обследование и проект", "Техническое заключение о состоянии несущих конструкций за 5-7 рабочих дней, затем проект присоединения или проектная документация на реконструкцию по СП 54.13330 и СП 118.13330"], ["04", "Согласование", "Присоединение существующего чердака ведём как перепланировку: МЖИ рассматривает до 20 рабочих дней. Надстройку мансарды как реконструкцию: экспертиза проекта до 42 рабочих дней, разрешение Мосгосстройнадзора 5 рабочих дней"], ["05", "Работы и приёмка", "Сопровождаем строительные работы, следим за фиксацией скрытых работ, доводим объект до акта приёмки или ввода в эксплуатацию"], ["06", "Техплан и ЕГРН", "Кадастровый инженер готовит технический план за 3-5 дней, подаём в Росреестр по доверенности. Электронная регистрация от 3 рабочих дней, новые метры появляются в выписке ЕГРН"]],stats:[["100%", "собственников дают согласие на чердак в МКД"], ["400+", "объектов провели через Росреестр с 2010 года"], ["5", "рабочих дней рассматривает Мосгосстройнадзор"], ["1 день", "бесплатная оценка шансов проекта"]],tariffs:[["Оценка реальности проекта", "бесплатно", "1 день", "Статус чердака, ГПЗУ и ПЗЗ, расклад по собственникам, ориентировочный бюджет и честный вердикт: идти в проект или не тратить деньги", false], ["Заключение и проект", "от 20 000 ₽", "2-4 недели", "Обследование несущих конструкций, техническое заключение, проект присоединения чердака с расчётом нагрузок и инженерными разделами", false], ["Присоединение под ключ", "по запросу", "от 6 месяцев", "Всё от собрания собственников до новой выписки ЕГРН: согласия, проект, согласования, сопровождение работ, техплан и регистрация. Цену считаем после бесплатного разбора", true]],micro:"Пришлите выписку ЕГРН и поэтажный план с чердаком: за 1 день бесплатно оценим статус чердака, ограничения ПЗЗ и шансы проекта и честно скажем, стоит ли вообще начинать.",faq:[["Кому принадлежит чердак в доме?", "По умолчанию никому в отдельности: чердак это общее имущество всех собственников помещений дома (ст. 36 ЖК РФ). Доля в нём есть и у владельцев нежилых помещений, и у города, если у него есть площади в доме. Поэтому просто «занять» чердак нельзя, сначала нужно правовое основание."], ["Сколько согласий собственников нужно для присоединения чердака?", "100%, актуально на июль 2026. Присоединение уменьшает общее имущество дома, а для этого ч. 3 ст. 36 и ч. 2 ст. 40 ЖК РФ требуют согласия всех собственников без исключения. Голоса считаются по площади, но хватает одного «против», чтобы проект стал невозможным. Именно на этом этапе останавливается большинство попыток."], ["Присоединение чердака это перепланировка или реконструкция?", "Зависит от объёма работ. Присоединяете существующий чердак без изменения габаритов здания: это ближе к перепланировке, в Москве её согласует МЖИ по 508-ПП, для нежилых зданий действует 432-ПП. Поднимаете крышу, меняете высоту и площадь, надстраиваете этаж: это реконструкция с разрешением Мосгосстройнадзора, экспертизой проекта и вводом в эксплуатацию. Определяем маршрут на старте, до трат на проект."], ["Можно ли сделать мансарду в собственном нежилом здании?", "Можно, и это проще, чем в жилом доме: согласия соседей не нужны, решение принимает собственник здания. Но устройство мансарды из перечня работ «без разрешения» в Москве исключено, поэтому готовьтесь к полному циклу реконструкции: ГПЗУ (14 рабочих дней), проект, экспертиза до 42 рабочих дней, разрешение Мосгосстройнадзора за 5 рабочих дней, затем ввод и регистрация."], ["Что по нормам считается мансардным этажом?", "Этаж в чердачном пространстве, фасад которого полностью или частично образован крышей, причём линия пересечения крыши и фасада проходит не выше 1,5 м от пола (СП 54.13330.2022). Важное следствие: мансарда включается в этажность здания. Если ПЗЗ ограничивают высоту или этажность на участке, проект упрётся в них, это проверяем в первый же день."], ["Можно ли узаконить уже построенную мансарду?", "Иногда да: обследуем конструкцию, готовим проект и заключение по факту, проходим согласование, вносим метры в ЕГРН. Но если работы тянут на реконструкцию без разрешения, объект рискует попасть под ст. 222 ГК РФ как самовольная постройка, вплоть до сноса за счёт собственника. Поэтому сначала аудит, потом решение: узаконивать, переделывать или не трогать."], ["Какие штрафы за самовольное присоединение чердака?", "За самовольную перепланировку нежилого помещения в МКД юрлицу грозит 40 000-50 000 ₽ по ч. 2 ст. 7.21 КоАП РФ и предписание вернуть всё как было. Если работы квалифицируют как реконструкцию без разрешения, штраф юрлицу от 500 000 до 1 000 000 ₽ или приостановка деятельности до 90 суток по ст. 9.5 КоАП РФ (актуально на июль 2026)."], ["Сколько времени занимает присоединение чердака целиком?", "Быстрых сценариев здесь нет. Присоединение существующего чердака с собранием собственников обычно занимает от 6 месяцев, надстройка мансарды с реконструкцией от года: ГПЗУ, экспертиза, разрешение, стройка, ввод, регистрация. Точный срок зависит от дома, собственников и позиции города, поэтому называем его после бесплатного разбора вашего дома."], ["Какая госпошлина за регистрацию новых площадей?", "Кадастровый учёт изменений характеристик помещения обходится юрлицу в 2 000 ₽. Если по итогам реконструкции регистрируется право на новый объект, госпошлина для юрлица 44 000 ₽ при кадастровой стоимости до 22 млн ₽, выше считается 0,2% от кадастровой стоимости, максимум 1 000 000 ₽ (актуально на июль 2026)."], ["Какие документы нужны, чтобы начать?", "Для старта хватит трёх вещей: выписка ЕГРН на ваше помещение или здание, поэтажный план БТИ с чердаком и пара слов о задаче: офис, апартаменты, склад, жильё. Дальше мы сами запросим ГПЗУ, ПЗЗ и данные по дому и вернёмся с разбором за 1 день."]],seo:{"title": "Присоединение чердака и оформление мансарды в Москве | КЕО", "desc": "Присоединяем чердак и оформляем мансарду: согласия собственников, проект, Мосгосстройнадзор, техплан и новые метры в ЕГРН. Бесплатная оценка шансов за 1 день."}},

 "proekt-pereplanirovki":{group:"kadastr",title:"Проект перепланировки и согласование в МЖИ в Москве",lede:"Готовим проект перепланировки и ведём согласование в Мосжилинспекции: квартиры и нежилые помещения в жилых домах Москвы. Проект от 25 000 ₽ за 5-10 дней, у компании допуск СРО на проектную документацию. Согласуем задуманное или узаконим уже сделанное, доведём дело до акта и записи в ЕГРН.",badge:["400+", "объектов оформлено с 2010 года"],img:"proekt-pereplanirovki",updated:"июль 2026",scenarios:[["Купили квартиру и хотите объединить кухню с гостиной, перенести перегородки или расширить санузел", "Проверим по плану БТИ, что из задуманного допустимо, сделаем проект и согласуем его в МЖИ до начала ремонта"], ["Ремонт уже сделан без согласования, а теперь продажа или ипотека, и планировка не совпадает с документами", "Узаконим по факту: техзаключение о допустимости и безопасности выполненных работ, согласование через МЖИ, при отказе через суд"], ["У вас офис или магазин в жилом доме, нужны перенос перегородок, входная группа, новая планировка зала", "Подготовим проект и согласуем перепланировку нежилого помещения, чтобы не получить штраф до 50 000 ₽ и предписание"], ["Соседи пожаловались, пришёл инспектор МЖИ и выдал предписание", "Разберём, какие работы можно сохранить, подготовим техзаключение и документы, снимем предписание согласованием"], ["Банк или покупатель требует, чтобы фактическая планировка совпадала с ЕГРН", "Приведём документы в соответствие: акт, технический план, внесение изменений в реестр"]],pains:["Штраф за самовольную перепланировку: гражданам 2 000-2 500 ₽, юрлицам 40 000-50 000 ₽ по ст. 7.21 КоАП РФ (актуально на июль 2026)", "Предписание МЖИ вернуть всё как было за свой счёт. При отказе суд вправе выставить помещение на публичные торги (ст. 29 ЖК РФ)", "Сделка встаёт: банк сверяет квартиру с планом ЕГРН, и несовпадение означает отказ в ипотеке или требование узаконить до продажи", "Проект без допуска СРО или без техзаключения от автора проекта дома означает отказ МЖИ: потерянные 20 рабочих дней и подача заново", "С 1 апреля 2024 перепланировка юридически не завершена, пока изменения не внесены в ЕГРН. Одного акта МЖИ уже недостаточно"],steps:[["01", "Бесплатный разбор", "Пришлите выписку из ЕГРН и план БТИ, расскажите, что планируете. За 1 день скажем, можно ли это согласовать, какие документы понадобятся и сколько займёт процесс."], ["02", "Обмер и проект", "Инженер выезжает на объект, выезд по Москве и МО до 50 км от МКАД включён. Проект готовим за 5-10 дней. Если затронуты несущие конструкции, организуем техзаключение от автора проекта дома."], ["03", "Подача в МЖИ", "Подаём пакет через mos.ru по доверенности, ваше присутствие не нужно. Мосжилинспекция рассматривает заявление до 20 рабочих дней, на запросы инспекции отвечаем сами."], ["04", "Ремонт и акт", "Решение о согласовании действует 12 месяцев, при необходимости продлевается. После работ комиссия МЖИ проверяет соответствие проекту и оформляет акт о завершённой перепланировке."], ["05", "Внесение в ЕГРН", "Готовим технический план, изменения вносятся в реестр. Именно запись в ЕГРН с 2024 года завершает перепланировку юридически. Отдаём полный комплект и закрывающие документы для бухгалтерии."]],stats:[["от 25 000 ₽", "проект перепланировки, готовим за 5-10 дней"], ["до 20", "рабочих дней рассматривает заявление МЖИ"], ["12 мес.", "действует решение о согласовании перепланировки"], ["до 50 000 ₽", "штраф юрлицу за самовольную перепланировку по ст. 7.21 КоАП РФ"]],tariffs:[["Проект перепланировки", "от 25 000 ₽", "5-10 дней", "Планы «до» и «после», экспликация, решения по инженерным сетям. Комплект под требования МЖИ, допуск СРО", true], ["Техническое заключение", "от 20 000 ₽", "5-7 рабочих дней", "ТЗК о допустимости и безопасности работ, в том числе для узаконивания уже сделанной перепланировки", false], ["Согласование под ключ", "по запросу", "индивидуально", "Проект, подача через mos.ru, ответы на запросы МЖИ, акт о завершённой перепланировке, технический план и внесение изменений в ЕГРН", false]],micro:"Пришлите план БТИ и опишите, что хотите изменить. За 1 день бесплатно скажем, согласует ли это МЖИ и что потребуется.",faq:[["Сколько стоит проект перепланировки в Москве?", "У нас от 25 000 ₽, срок подготовки 5-10 дней. Итоговая цена зависит от площади помещения и от того, затронуты ли несущие конструкции: тогда к проекту добавляется техзаключение от автора проекта дома. Точную стоимость назовём после бесплатного разбора документов за 1 день."], ["Какую перепланировку нельзя согласовать?", "Снос или ослабление несущих стен без проекта, объединение кухни с газовой плитой и жилой комнаты, перенос санузла или кухни в зону над жилыми комнатами соседей, демонтаж вентиляционных каналов. Такие работы МЖИ не согласует ни при каких условиях, и мы честно скажем об этом на старте, до того как вы потратите деньги на проект."], ["Можно ли узаконить уже сделанную перепланировку?", "Да, если работы не нарушают строительные и санитарные нормы. Готовится техзаключение о допустимости и безопасности выполненных работ, затем согласование по факту через МЖИ, а при отказе через суд, это ещё 2-6 месяцев. Штраф за самовольные работы заплатить придётся: гражданам 2 000-2 500 ₽, юрлицам от 40 000 ₽."], ["Сколько времени занимает согласование перепланировки?", "Проект готовим за 5-10 дней, МЖИ рассматривает заявление до 20 рабочих дней (актуально на июль 2026). Дальше срок зависит от ремонта: решение о согласовании действует 12 месяцев, после завершения работ комиссия оформляет акт, и изменения вносятся в ЕГРН."], ["Чем грозит несогласованная перепланировка?", "Штраф, предписание вернуть помещение в прежнее состояние за свой счёт, а при отказе суд вправе продать помещение с публичных торгов по ст. 29 ЖК РФ. Плюс практические проблемы: квартиру с несовпадающей планировкой сложно продать, банк не даст под неё ипотеку."], ["Нужно ли согласовывать перепланировку нежилого помещения в жилом доме?", "Да. Офисы, магазины и другие нежилые помещения в многоквартирных домах Москвы согласуют в той же Мосжилинспекции по 508-ПП. Штраф для юрлиц за работы без согласования 40 000-50 000 ₽ по ст. 7.21 КоАП РФ (повышенные московские штрафы до 350 000 ₽ отменили ещё в 2023 году), плюс предписание вернуть помещение в прежнее состояние за свой счёт, поэтому экономить на согласовании всё равно рискованно."], ["Что изменилось в правилах перепланировки с 2024 года?", "С 1 апреля 2024 перепланировка считается завершённой только после внесения изменений в ЕГРН, а не после акта приёмочной комиссии. МЖИ утверждает акт в течение 30 дней и сама направляет сведения в Росреестр. Мы доводим каждый объект именно до записи в реестре, иначе работа юридически не закончена."], ["Кто имеет право делать проект перепланировки?", "Только проектная организация с допуском СРО, самодельный эскиз МЖИ не примет. Если затрагиваются несущие конструкции, дополнительно нужно техзаключение от автора проекта дома или ГБУ «Экспертный центр». У КЕО ГРУПП допуск СРО на проектную документацию есть, техзаключения организуем сами."]],seo:{"title": "Проект перепланировки в Москве: согласование в МЖИ | КЕО", "desc": "Проект перепланировки от 25 000 ₽ за 5-10 дней. Согласование в Мосжилинспекции через mos.ru, акт, внесение в ЕГРН. Узаконим уже сделанную. Допуск СРО, с 2010 года."}},

 "razdel-obedinenie":{group:"kadastr",title:"Раздел, объединение и выдел доли объектов недвижимости в Москве",lede:"Делим одно помещение на несколько, объединяем смежные в один объект, выделяем долю в натуре: схема образования объектов, техпланы, снятие старых объектов с учёта и регистрация новых. Для собственников зданий, помещений и участков в Москве и МО. Учёт и регистрация идут одним заявлением, по закону 10-12 рабочих дней. Работы от 25 000 ₽, разбор объекта бесплатно за 1 день.",badge:["400+", "объектов поставлено на учёт и зарегистрировано с 2010 года"],img:"razdel-obedinenie",updated:"июль 2026",scenarios:[["Купили этаж целиком, а продавать или сдавать хотите по частям", "Разделим помещение на несколько самостоятельных объектов: схема раздела, техпланы, новые кадастровые номера и записи о праве на каждый"], ["Два смежных помещения, а банк или якорный арендатор требует один объект", "Объединим их в одно: проверим смежность и контур, подготовим техплан, зарегистрируем новый объект вместо двух старых"], ["Владеете зданием или помещением в долях с партнёром и хотите разойтись", "Оформим выдел доли в натуре: соглашение сособственников, а если договориться не выходит, сопровождаем выдел через суд по ст. 252 ГК РФ"], ["Здание числится в ЕГРН одним объектом, и сдавать его по частям не выходит", "Разделим здание на помещения: каждый блок получит свой кадастровый номер, его можно будет продать, заложить или сдать отдельно"], ["Росреестр приостановил учёт раздела, а сделка уже назначена", "Разберём причину приостановки, исправим техплан или комплект документов и доведём заявление до регистрации, как правило, без суда"]],pains:["Без профессиональной подготовки примерно 7 из 10 заявлений уходят в приостановку: это плюс 1-3 месяца к сроку и повторная работа с документами", "Новый объект без обособленности и изолированности не зарегистрируют: приостановка по п. 34 ч. 1 ст. 26 218-ФЗ, на исправление 3 месяца, дальше отказ", "При отказе госпошлина не возвращается: для организации это до 66 000 ₽ за каждый образуемый объект, актуально на июль 2026", "Площади новых объектов не сходятся с исходными: регистратор видит расхождение и останавливает всё заявление, сразу по всем объектам", "Пока объект не разделён, сделка стоит: покупатель части этажа не может выйти на регистрацию, а сроки договора и задаток под угрозой"],steps:[["01", "Разбор объекта", "Смотрим выписки ЕГРН, планы БТИ и вашу задачу. Честно говорим, делится ли объект и каким путём идти: раздел, объединение или выдел. Бесплатно, 1 день"], ["02", "Схема образования объектов", "Проектируем деление так, чтобы каждый новый объект был обособлен, изолирован и прошёл учёт с первого раза. Если нужна перепланировка, готовим проект и согласуем в МЖИ"], ["03", "Согласия и соглашения", "Собираем согласия сособственников и залогодержателя, готовим соглашение о разделе, объединении или выделе доли. Идёт параллельно со схемой"], ["04", "Техпланы", "Кадастровый инженер делает обмеры и готовит техплан на каждый образуемый объект. 3-5 дней, выезд до 50 км от МКАД включён"], ["05", "Подача в Росреестр", "Одно заявление на все объекты: кадастровый учёт и регистрация прав одновременно, по ст. 16 218-ФЗ это 10-12 рабочих дней. Работаем по доверенности, ваше присутствие не нужно"], ["06", "Результат", "Старые объекты сняты с учёта, у вас выписки ЕГРН с новыми кадастровыми номерами и записями о праве. Закрывающие документы для бухгалтерии отдаём сразу"]],stats:[["400+", "объектов зарегистрировано с 2010 года"], ["25+", "лет совокупного опыта команды"], ["3-5", "дней готовим техплан на объект"], ["10-12", "рабочих дней занимает учёт и регистрация по закону"]],tariffs:[["Техплан на образуемый объект", "от 15 000 ₽", "3-5 дней", "Обмеры с выездом инженера, техплан на каждый новый объект в формате для Росреестра", false], ["Раздел или объединение под ключ", "от 25 000 ₽", "от 3 недель", "Схема образования объектов, техпланы, подача одним заявлением, сопровождение до новых записей в ЕГРН", true], ["Выдел доли и сложные случаи", "по запросу", "от 1 месяца", "Соглашение сособственников или выдел через суд, работа с залогом, снятие приостановок", false]],micro:"Пришлите выписку из ЕГРН и план этажа, за 1 день бесплатно скажем, делится ли ваш объект и какие документы понадобятся.",faq:[["Как разделить нежилое помещение на два и оформить это в Росреестре?", "Кадастровый инженер готовит техпланы на каждое новое помещение, затем подаётся одно заявление: учёт и регистрация прав на все образуемые объекты идут одновременно (ст. 41 218-ФЗ), по закону 10-12 рабочих дней. Главное условие: каждое новое помещение должно быть обособленным и изолированным, иначе приостановка."], ["Что будет со старым кадастровым номером после раздела или объединения?", "Исходный объект перестаёт существовать: его снимают с учёта одновременно с постановкой новых объектов, отдельное заявление не нужно. Новые помещения получают свои кадастровые номера, и право регистрируется уже на них."], ["Можно ли объединить два помещения с разными кадастровыми номерами?", "Да, если они смежные и вместе образуют единый контур. Если помещения принадлежат разным лицам, заключается соглашение об общей собственности на новый объект. Когда объединение затрагивает стены и проёмы в многоквартирном доме, сначала согласуется перепланировка в МЖИ, регламент до 20 рабочих дней."], ["Нужно ли согласие остальных собственников на раздел или выдел доли?", "Если объект в общей собственности, нужно: раздел и выдел оформляются соглашением всех сособственников. Не договорились, значит выдел доли в натуре идёт через суд по ст. 252 ГК РФ. Суд проверит, что выделяемая часть изолирована и способна существовать как самостоятельный объект."], ["Какая госпошлина при разделе или объединении недвижимости?", "За кадастровый учёт с одновременной регистрацией права: 6 000 ₽ для физлиц и 66 000 ₽ для организаций за каждый образуемый объект при кадастровой стоимости до 20 и 22 млн ₽ соответственно (ст. 333.33 НК РФ, актуально на июль 2026). Если стоимость выше, пошлина считается в процентах. При отказе пошлина не возвращается."], ["Почему Росреестр приостанавливает раздел и что с этим делать?", "Частые причины: новое помещение не обособлено или не изолировано (п. 34 ч. 1 ст. 26 218-ФЗ), площади не сходятся с исходными, ошибки в техплане. На устранение даётся 3 месяца, это не отказ. Мы снимаем приостановки, как правило, без суда, а спорные решения обжалуем в апелляционной комиссии Росреестра: рассмотрение 30 дней."], ["Можно ли выделить долю в натуре в жилом доме на участке ИЖС?", "Нет. Закон прямо запрещает ставить на учёт и регистрировать помещения в индивидуальном жилом и садовом доме (ч. 7 ст. 41 218-ФЗ). Рабочие варианты: признать дом домом блокированной застройки, если он подходит по признакам, или разделить сам участок. Разберём вашу ситуацию бесплатно."], ["Объект в ипотеке, получится ли его разделить?", "Да, но понадобится согласие залогодержателя. Залог при этом не исчезает: запись об ипотеке переносится на образованные объекты одновременно с регистрацией права. С банком можно заранее согласовать, на каких из новых объектов останется обременение, это ускоряет сделку."]],seo:{"title": "Раздел и объединение объектов, выдел доли в Москве", "desc": "Раздел и объединение помещений, выдел доли в натуре: техпланы, учёт и регистрация в Росреестре одним заявлением. От 25 000 ₽, разбор объекта бесплатно."}},

 "registraciya-dogovorov":{group:"kadastr",title:"Регистрация договоров аренды, ипотеки и допсоглашений в Росреестре в Москве",lede:"Регистрируем в Росреестре договоры аренды и субаренды, залога и ипотеки, дополнительные соглашения и расторжения. Москва и Московская область. Готовим пакет, подаём электронно и ведём дело до записи в ЕГРН: электронная регистрация от 3 рабочих дней, стоимость от 15 000 ₽. Работаем по доверенности, ваше присутствие не нужно.",badge:["400+", "объектов зарегистрировано"],img:"registraciya-dogovorov",updated:"июль 2026",scenarios:[["Подписали аренду на срок от года, а банк или контрагент требует зарегистрированный договор", "Проверим договор перед подачей, подготовим пакет, подадим электронно и доведём до записи в ЕГРН"], ["Сдаёте или берёте в аренду часть помещения: этаж, зал, несколько комнат", "Сделаем технический план части и зарегистрируем аренду с одновременным кадастровым учётом этой части"], ["Поменяли ставку или срок допсоглашением, а в ЕГРН оно не отражено", "Зарегистрируем допсоглашение, чтобы новые условия действовали и для третьих лиц, а не только между вами"], ["Росреестр приостановил регистрацию договора", "Разберём уведомление, устраним причину и доведём регистрацию до конца. Как правило, снимаем приостановку без суда"], ["Аренда расторгнута, а запись об обременении так и висит в ЕГРН и мешает продаже", "Подготовим документы и погасим запись об аренде, объект станет юридически чистым"]],pains:["Налоговая снимает расходы по незарегистрированному договору аренды (ст. 252 НК РФ): доначисления по налогу на прибыль плюс пени за все годы аренды", "Незарегистрированный договор не действует для третьих лиц (п. 3 ст. 433 ГК РФ): при продаже здания новый собственник вправе не считаться с арендатором", "Штраф за несоблюдение порядка регистрации: юрлицам 30 000-40 000 ₽ по ст. 19.21 КоАП РФ (актуально на июль 2026)", "Без подготовки, по нашей практике, примерно 7 из 10 подач уходят в приостановку, а это плюс недели и месяцы к сроку и риск отказа", "С 1 марта 2025 года юрлица подают документы в Росреестр электронно: бумажный пакет, кроме редких исключений, вернут без рассмотрения, и сделка встанет"],steps:[["01", "Разбор документов", "Бесплатно за 1 день. Смотрим договор, выписку ЕГРН, полномочия сторон и сразу говорим, пройдёт ли регистрация и что поправить"], ["02", "Подготовка пакета", "1-3 дня. Правим формулировки под требования Росреестра, считаем госпошлину. Если сдаётся часть помещения, готовим техплан части: 3-5 дней"], ["03", "Подача", "1 день. Подаём электронно с ЭЦП, поможем выпустить подпись, если её нет. Личный визит не нужен, работаем по доверенности"], ["04", "Сопровождение регистрации", "От 3 до 7 рабочих дней. Отслеживаем статус, снимаем вопросы регистратора до того, как они превратятся в приостановку"], ["05", "Результат", "Выписка из ЕГРН с записью о договоре плюс закрывающие документы для бухгалтерии. Если регистрация не пройдёт по нашей вине, вернём деньги или исправим за свой счёт, гарантия в договоре"]],stats:[["400+", "объектов зарегистрировали с 2010 года"], ["от 3", "рабочих дней занимает электронная регистрация"], ["7 из 10", "подач без подготовки уходят в приостановку, по нашей практике"], ["44 000 ₽", "госпошлина юрлиц за регистрацию договора аренды в 2026 году"]],tariffs:[["Договор аренды, залога или ипотеки", "от 15 000 ₽", "3-7 рабочих дней", "Проверка договора, подготовка пакета, электронная подача, сопровождение до записи в ЕГРН", true], ["Допсоглашение или расторжение", "от 15 000 ₽", "3-7 рабочих дней", "Регистрация изменений условий или погашение записи об аренде в ЕГРН", false], ["Аренда части здания или помещения", "по запросу", "7-12 рабочих дней", "Техплан части (от 15 000 ₽) плюс регистрация договора с одновременным кадастровым учётом части", false]],micro:"Пришлите договор и выписку из ЕГРН, за 1 день бесплатно скажем, пройдёт ли он регистрацию и что поправить до подачи.",faq:[["Какой договор аренды нужно регистрировать в Росреестре?", "Договор аренды здания или помещения на срок от 1 года (п. 2 ст. 651 ГК РФ), для земельного участка от года это п. 2 ст. 26 ЗК РФ. Договор на 11 месяцев регистрировать не нужно, но и защиты от смены собственника он не даёт. Субаренда на срок от года регистрируется по тем же правилам."], ["Сколько стоит госпошлина за регистрацию договора аренды в 2026 году?", "Для юрлиц 44 000 ₽, для физлиц 4 000 ₽ (актуально на июль 2026). Если с заявлением обращаются обе стороны, пошлина делится между ними: два юрлица платят по 22 000 ₽. Допсоглашение или расторжение дешевле: 2 000 ₽ юрлицам и 700 ₽ физлицам."], ["Сколько дней регистрируют договор?", "По 218-ФЗ стандартный срок 7 рабочих дней, через МФЦ 9. Электронная подача с ЭЦП быстрее: от 3 рабочих дней. Если вместе с договором ставится на учёт часть помещения, срок вырастает до 10-12 рабочих дней."], ["Что будет, если договор аренды не зарегистрировать?", "Три последствия. Договор не действует для третьих лиц: новый собственник здания вправе не считаться с арендатором. Налоговая может снять арендные платежи из расходов по ст. 252 НК РФ. И штраф юрлицам 30 000-40 000 ₽ по ст. 19.21 КоАП РФ."], ["Можно ли юрлицу подать документы на бумаге?", "С 1 марта 2025 года по общему правилу нет: юрлица подают заявления в Росреестр в электронном виде, бумага осталась для редких исключений вроде подтверждённого технического сбоя. Нужна ЭЦП. Мы подаём за вас по доверенности и помогаем выпустить подпись, если её ещё нет."], ["Арендуем часть помещения. Нужен ли технический план?", "Да. Если предмет аренды это часть здания или помещения без своего кадастрового номера, к договору нужен техплан этой части, и она ставится на учёт одновременно с регистрацией. Отсутствие техплана части одна из самых частых причин приостановки."], ["Росреестр приостановил регистрацию договора. Что делать?", "Приостановка это не отказ: закон даёт 3 месяца на устранение причины. Разбираем уведомление, исправляем документы и подаём заново, как правило без суда. Если регистратор неправ, обжалуем в апелляционной комиссии Росреестра: рассмотрение 30 дней."], ["Как убрать из ЕГРН запись об аренде после расторжения договора?", "Подаётся заявление с соглашением о расторжении или иным документом о прекращении аренды, и запись гасится. Госпошлина за регистрацию расторжения 2 000 ₽ для юрлиц и 700 ₽ для физлиц. Пока запись висит, объект сложнее продать или заложить."], ["Кто платит госпошлину за регистрацию ипотеки?", "За регистрацию ипотеки по договору пошлина 4 000 ₽ для юрлиц и 1 000 ₽ для физлиц. Если договор об ипотеке заключён между физлицом и юрлицом, пошлина считается по ставке для физлиц (актуально на июль 2026)."]],seo:{"title": "Регистрация договора аренды в Росреестре | Москва", "desc": "Регистрация договоров аренды, ипотеки, допсоглашений и расторжений в Росреестре. Электронная подача, от 3 рабочих дней, от 15 000 ₽. Москва и МО."}},

 "registraciya-prava":{group:"kadastr",title:"Регистрация права собственности в Москве под ключ",lede:"Регистрируем право собственности на здания и помещения в Москве и области: переход права по сделке, новый объект, регистрация по решению суда. Работаем по доверенности, ваше присутствие не нужно. Услуги от 20 000 ₽, электронная регистрация проходит от 3 рабочих дней. Если по нашей вине регистрация не пройдёт, вернём деньги или исправим за свой счёт: гарантия в договоре.",badge:["400+", "объектов зарегистрировано с 2010 года"],img:"registraciya-prava",updated:"июль 2026",scenarios:[["Купили здание или помещение, нужно оформить переход права", "Проверим документы и полномочия сторон, подготовим пакет, подадим в Росреестр и доведём до записи в ЕГРН. Электронно с ЭЦП, от 3 рабочих дней."], ["Построили или реконструировали объект, права в ЕГРН ещё нет", "Подготовим технический план, поставим объект на кадастровый учёт и зарегистрируем право одним пакетом: для юрлиц это одна процедура и одна пошлина 66 000 ₽ вместо двух подач."], ["Суд признал право собственности, теперь его надо внести в ЕГРН", "Оформим регистрацию по решению суда (статья 58 закона 218-ФЗ): проверим формулировки судебного акта, при нехватке характеристик объекта подготовим техплан, подадим и доведём до выписки."], ["Росреестр приостановил регистрацию, срок идёт", "Разберём уведомление регистратора, устраним причину и подадим документы заново. Закон даёт 3 месяца на устранение, дальше отказ, поэтому действуем сразу."], ["Вторая сторона сделки уклоняется от регистрации перехода права", "Добиваемся регистрации через суд: готовим иск, сопровождаем дело и регистрируем переход права по судебному акту, заявление уклоняющейся стороны при этом не требуется."]],pains:["Без записи в ЕГРН объект нельзя продать, заложить или сдать в аренду на срок от года: актив есть, а распоряжаться им нельзя", "Без профессиональной подготовки, по нашей практике, примерно 7 из 10 подач уходят в приостановку, а это плюс месяцы к сроку сделки", "При отказе госпошлина не возвращается (статья 333.40 НК): для юрлица это минимум 44 000 ₽, по дорогим объектам до 1 млн ₽", "Пошлина юрлиц считается от кадастровой стоимости (0,2% свыше 22 млн ₽): ошибка в расчёте или недоплата это гарантированная приостановка", "Больше половины приостановок это ошибки в техплане и неполный пакет: по нашей статистике 35% и 25% случаев"],steps:[["01", "Заявка и разбор", "Перезвоним в течение 2 часов. Бесплатный разбор объекта за 1 день: скажем, что мешает регистрации и какой путь короче."], ["02", "Аудит документов", "Проверяем правоустанавливающие документы, кадастровые данные и полномочия сторон, считаем госпошлину. 24-72 часа."], ["03", "Подготовка пакета", "Собираем заявление и приложения, при необходимости готовим технический план (от 15 000 ₽, 3-5 дней). Работаем по доверенности, личное присутствие не нужно."], ["04", "Подача и сопровождение", "Подаём электронно с ЭЦП или через МФЦ, отслеживаем статус и отвечаем на запросы регистратора. Электронная регистрация от 3 рабочих дней, стандарт 3-7."], ["05", "Результат", "Передаём выписку из ЕГРН с новой записью и закрывающие документы для бухгалтерии."]],stats:[["400+", "объектов зарегистрировано, практика с 2010 года"], ["от 3", "рабочих дней занимает электронная регистрация с ЭЦП"], ["7 из 10", "подач без юриста уходят в приостановку, по нашей практике"], ["25+", "лет совокупного опыта команды, часть специалистов раньше работали в Росреестре и БТИ"]],tariffs:[["Переход права по сделке", "от 20 000 ₽", "3-7 рабочих дней", "Аудит сделки и полномочий сторон, пакет документов, расчёт пошлины, подача с ЭЦП, сопровождение до записи в ЕГРН", true], ["Новый объект: учёт и регистрация", "по запросу", "зависит от объекта", "Технический план (от 15 000 ₽, 3-5 дней), одновременная постановка на кадастровый учёт и регистрация права одним пакетом", false], ["Регистрация по решению суда", "по запросу", "3-7 рабочих дней после подготовки пакета", "Анализ судебного акта и его исполнимости для Росреестра, техплан при необходимости, подача и сопровождение до выписки", false]],micro:"Пришлите выписку из ЕГРН и документы по объекту: за 1 день бесплатно скажем, что мешает регистрации, какая будет пошлина и сколько займёт оформление.",faq:[["Сколько стоит зарегистрировать право собственности на недвижимость в Москве", "Наши услуги от 20 000 ₽. Плюс госпошлина: для юрлиц 44 000 ₽ при кадастровой стоимости объекта до 22 млн ₽, выше 0,2% от кадастровой стоимости, но не более 1 млн ₽; для физлиц 4 000 ₽ при кадастровой стоимости до 20 млн ₽, выше 0,02%, но не более 500 000 ₽. Актуально на июль 2026."], ["Сколько дней Росреестр регистрирует право собственности", "Электронная подача с ЭЦП от 3 рабочих дней, стандартный срок 3-7 рабочих дней, через МФЦ до 9. С 2025 года есть ускоренная регистрация за 1 рабочий день, но госпошлина при этом удваивается."], ["Как зарегистрировать право собственности по решению суда", "Основание: статья 58 закона 218-ФЗ. Заявление подаёт тот, за кем суд признал право, согласие проигравшей стороны не требуется. Нужно решение с отметкой о вступлении в законную силу; если в нём нет полных характеристик объекта, дополнительно готовится технический план. Мы проверяем формулировки заранее, чтобы регистратор не приостановил дело."], ["Какие документы нужны для регистрации права на здание или помещение", "Правоустанавливающий документ (договор, передаточный акт, решение суда), документы на землю для здания, технический план для нового объекта, доверенность и подтверждение оплаты пошлины. Точный состав зависит от ситуации: пришлите документы, за 1 день бесплатно скажем, чего не хватает."], ["Что будет, если не регистрировать право собственности", "Объект нельзя продать, заложить или сдать в аренду на срок от года: без записи в ЕГРН распоряжение недвижимостью не работает. Добавьте риск споров о правах и вопросов от города к «ничейному» зданию. Чем дольше тянуть, тем дороже исправление."], ["Росреестр приостановил регистрацию, что делать", "Приостановка это не отказ. Закон даёт 3 месяца на устранение причины (в статье 26 закона 218-ФЗ таких оснований больше шести десятков). Разбираем уведомление, исправляем пакет и подаём снова; решение регистратора можно обжаловать в апелляционной комиссии Росреестра, рассмотрение 30 дней. Как правило, снимаем приостановки без суда."], ["Можно ли оформить право собственности без личного присутствия", "Да. Работаем по нотариальной доверенности и подаём документы электронно с ЭЦП, приезжать никуда не нужно. Москва и область, выезд инженера до 50 км от МКАД включён."], ["Вернут ли госпошлину, если Росреестр откажет в регистрации", "Нет. При отказе пошлина не возвращается (статья 333.40 НК), для юрлица это минимум 44 000 ₽. Её можно зачесть при новой подаче, но проще не доводить до отказа: по договору мы отвечаем за результат, если регистрация не пройдёт по нашей вине, вернём деньги или исправим за свой счёт."]],seo:{"title": "Регистрация права собственности в Москве | KEO GROUP", "desc": "Регистрация права на здания и помещения в Москве: переход права, новый объект, по решению суда. От 20 000 ₽, электронно от 3 рабочих дней. Гарантия в договоре."}},

 "sez-rospotrebnadzor":{group:"kadastr",title:"СЭЗ Роспотребнадзора для перепланировки в Москве",lede:"Санитарно-эпидемиологическое заключение подтверждает, что перепланировка не нарушает СанПиН. Без него жилинспекция не согласует перенос кухни, новые мокрые точки и изменение вентиляции, а перевод помещения в нежилой фонд остановится. Берём процедуру на себя: бесплатный аудит проекта за 1 день, экспертиза в ФБУЗ до 30 рабочих дней, стоимость посчитаем после аудита.",badge:["до 30", "рабочих дней экспертиза в ФБУЗ"],img:"sez-rospotrebnadzor",updated:"июль 2026",scenarios:[["Делаете перепланировку с новым санузлом или душевой, и жилинспекция требует санитарное заключение", "Проверим проект по СанПиН до подачи, соберём пакет и получим заключение в ФБУЗ"], ["Переносите кухню или меняете вентиляцию и боитесь отказа", "Сверим спорные узлы с санитарными нормами заранее, поправим проект и снизим риск отказа"], ["Переводите квартиру в нежилой фонд под офис, салон или студию", "Подготовим санитарную часть пакета по ст. 23 ЖК РФ и проведём экспертизу проекта"], ["ФБУЗ уже выдал заключение о несоответствии", "Разберём мотивировку, исправим решения в проекте и организуем повторную экспертизу"], ["Нежилое помещение в жилом доме: медкабинет, общепит, детская студия", "Организуем санитарную экспертизу проекта, чтобы согласование перепланировки не остановилось"]],pains:["Самовольная перепланировка в многоквартирном доме: штраф гражданам 2 000-2 500 ₽, юрлицам 40 000-50 000 ₽ по ст. 7.21 КоАП РФ, плюс предписание вернуть всё как было (актуально на июль 2026)", "Для нежилых помещений в жилых домах порядок тот же: ИП отвечает как юрлицо, а неисполнение предписания МЖИ ведёт к повторным штрафам и иску в суд", "Проект с узлом, который нарушает СанПиН, получит отказ: до 30 рабочих дней экспертизы потеряны, счёт оплачен, подача заново", "Санузел или кухню над жилой комнатой соседей не узаконить вообще: деньги на ремонт потрачены, а узел придётся демонтировать", "Экспертное заключение действует, как правило, год: затянули подачу в жилинспекцию, платите за экспертизу второй раз"],steps:[["01", "Бесплатный аудит", "Инженер сверяет проект с СанПиН 2.1.3684-21 и честно говорит, нужен ли вам СЭЗ вообще и пройдёт ли решение по нормам. Ответ за 24-72 часа"], ["02", "Пакет документов", "Собираем правоустанавливающие документы, проект или эскиз изменений, техпаспорт БТИ, готовим заявку. Работаем по доверенности, личное присутствие не нужно"], ["03", "Экспертиза в ФБУЗ", "Подаём документы в ФБУЗ «Центр гигиены и эпидемиологии в городе Москве», сопровождаем экспертизу и отвечаем на запросы экспертов. До 30 рабочих дней"], ["04", "Готовое заключение", "Получаем положительное заключение и передаём вам вместе с закрывающими документами для бухгалтерии. Действует оно, как правило, год"], ["05", "Согласование в МЖИ", "По желанию ведём перепланировку дальше: пакет в жилинспекцию по 508-ПП, рассмотрение 20 рабочих дней"]],stats:[["400+", "объектов оформили в Москве и МО с 2010 года"], ["25+ лет", "совокупного опыта команды"], ["24-72 часа", "бесплатный аудит документов"], ["1 год", "действует экспертное заключение ФБУЗ"]],tariffs:[["Аудит проекта на санитарные нормы", "бесплатно", "24-72 часа", "Проверяем проект по СанПиН 2.1.3684-21, отвечаем, нужен ли СЭЗ, показываем рисковые узлы", false], ["СЭЗ под ключ", "по запросу", "до 30 рабочих дней экспертиза", "Пакет документов, подача в ФБУЗ, сопровождение экспертизы, получение заключения", true], ["Проект перепланировки под СЭЗ", "от 25 000 ₽", "5-10 дней", "Проект сразу с учётом санитарных норм и согласование в МЖИ; счёт ФБУЗ за экспертизу оплачивается отдельно", false]],micro:"Пришлите план БТИ и эскиз изменений: инженер бесплатно за 1 день скажет, нужен ли вам СЭЗ и пройдёт ли проект по санитарным нормам.",faq:[["Нужно ли СЭЗ для перепланировки квартиры", "Для простой перепланировки без воды и вентиляции обычно нет. Заключение требуется, когда появляются новые мокрые точки или санузлы, переносится кухня, меняется вентиляция или мусоропровод. Для нежилых помещений в жилых домах и при переводе в нежилой фонд оно нужно почти всегда. Пришлите проект, за 24-72 часа бесплатно скажем точно."], ["Кто выдаёт СЭЗ: Роспотребнадзор или ФБУЗ", "Санитарную экспертизу проекта проводит ФБУЗ «Центр гигиены и эпидемиологии в городе Москве», подведомственная структура Роспотребнадзора. Именно её заключение подтверждает соответствие проекта СанПиН и идёт в пакет для согласования. Подавать напрямую в Роспотребнадзор не нужно."], ["Сколько делается санитарное заключение", "Стандартный срок экспертизы в ФБУЗ до 30 рабочих дней после оплаты счёта. Точный срок фиксируется в договоре с учреждением. Мы сокращаем общее время за счёт того, что проект уходит на экспертизу уже выверенным по нормам."], ["Сколько действует заключение", "Как правило, один год, если в самом документе не указано иное. Поэтому подачу в жилинспекцию не стоит откладывать: просроченное заключение означает повторную экспертизу и повторную оплату."], ["Что будет, если сделать перепланировку без СЭЗ", "Жилинспекция не согласует изменения с мокрыми точками и вентиляцией без санитарного подтверждения. За самовольную перепланировку по ч. 2 ст. 7.21 КоАП РФ штраф гражданам 2 000-2 500 ₽, должностным лицам 4 000-5 000 ₽, юрлицам и ИП 40 000-50 000 ₽. Норма действует и для нежилых помещений в жилых домах. Плюс предписание вернуть планировку в исходное состояние (актуально на июль 2026)."], ["Можно ли узаконить санузел над жилой комнатой", "Нет. СанПиН 2.1.3684-21 запрещает размещать уборную, ванную и кухню над жилыми комнатами соседей снизу. Исключение только для двухуровневых квартир, где санузел оказывается над собственной кухней. Такой узел мы находим на аудите, до того как вы оплатите экспертизу."], ["Какие документы нужны для подачи в ФБУЗ", "Правоустанавливающие документы на помещение, проект перепланировки или эскиз изменений, технический паспорт БТИ и доверенность на наших специалистов. Если проекта ещё нет, подготовим его сами, от 25 000 ₽ за 5-10 дней."], ["ФБУЗ выдал отказ, что делать", "Отказ приходит, когда проект нарушает санитарные нормы: чаще всего мокрая зона над жилой комнатой или ошибки по вентиляции. Решения исправляют в проекте и проходят экспертизу повторно. Мы разбираем мотивировку, правим узлы и сопровождаем повторную подачу. Если по нормам решение не проходит вообще, скажем честно и предложим рабочий вариант."], ["Нужно ли СЭЗ при переводе квартиры в нежилой фонд", "Да, санитарное подтверждение входит в пакет при переводе по ст. 23 ЖК РФ, вместе с протоколом общего собрания собственников. Ведём и санитарную часть, и процедуру перевода целиком."]],seo:{"title": "СЭЗ для перепланировки в Москве: получение под ключ", "desc": "Санитарно-эпидемиологическое заключение для перепланировки и перевода в нежилой фонд. Экспертиза в ФБУЗ до 30 рабочих дней. Бесплатный аудит проекта за 1 день."}},

 "soglasovanie-antresoli":{group:"kadastr",title:"Согласование антресоли в нежилом помещении в Москве",lede:"Оформляем антресоль под ключ: проверяем помещение по правилу 40% и высотам, готовим техническое заключение и проект, согласуем в Мосжилинспекции и вносим новую площадь в ЕГРН. С Росреестром работаем с 2010 года, в практике 400+ объектов. Полный цикл обычно занимает 3-6 месяцев, техническое заключение от 20 000 ₽. Разбор вашего объекта бесплатно, ответ за 1 день.",badge:["40%", "предел площади антресоли"],img:"soglasovanie-antresoli",updated:"июль 2026",scenarios:[["Потолки под 5 метров в магазине, шоуруме или на складе, а верх простаивает. Хотите второй ярус под кабинеты, хранение или зону отдыха", "Проверим по плану БТИ правило 40% и высоты, скажем, что реально согласовать, и проведём весь путь от проекта до новой выписки ЕГРН"], ["Антресоль уже построили, а в документах её нет. Банк, арендатор или покупатель просят навести порядок в документах", "Узакониваем по факту: обследуем конструкцию, готовим заключение и проект, согласуем и вносим площадь в ЕГРН. Если параметры нарушены, честно скажем сразу"], ["Помещение в отдельно стоящем нежилом здании, и непонятно, перепланировка это или реконструкция", "Определим на старте, по какому пути идти. Если Росреестр трактует работы как реконструкцию, вы узнаете об этом до трат на проект, а не после отказа"], ["На плане БТИ антресоль в красных линиях, из-за этого зависла сделка или кредит под залог помещения", "Разберём, можно ли узаконить конструкцию как есть, снимем красные линии и приведём ЕГРН в соответствие с фактом"], ["Нужно больше полезной площади, но пристраивать снаружи негде и дорого", "Посчитаем, сколько метров даст антресоль именно в вашем помещении, и оформим прибавку официально: она войдёт в площадь по ЕГРН"]],pains:["Самовольная перепланировка нежилого помещения в МКД: штраф юрлицу 40 000-50 000 ₽ по ч. 2 ст. 7.21 КоАП РФ плюс предписание вернуть всё как было", "Если работы квалифицируют как реконструкцию без разрешения, штраф юрлицу от 500 000 до 1 000 000 ₽ или приостановка деятельности до 90 суток (ст. 9.5 КоАП РФ)", "Антресоль больше 40% площади или ярусы ниже 2,1 м узаконить нельзя: конструкцию придётся урезать или демонтировать за свой счёт", "Площадь в ЕГРН меньше фактической: банк не берёт помещение в залог, покупатель уходит или сбивает цену", "Подача без профподготовки уходит в приостановку в 7 случаях из 10: Росреестр даёт до 3 месяцев на исправление, и весь срок сдвигается"],steps:[["01", "Бесплатный разбор", "Смотрим план БТИ и выписку ЕГРН, проверяем правило 40% и высоты 2,1 м. Честный вердикт: перепланировка, реконструкция или проект не проходит. Ответ за 1 день"], ["02", "Техническое заключение", "Обследуем несущие конструкции и перекрытия, готовим ТЗК с расчётом допустимых нагрузок. 5-7 рабочих дней"], ["03", "Проект антресоли", "Разрабатываем проект перепланировки с конструктивным разделом КР (железобетон) или КМ (металл). 5-10 дней"], ["04", "Согласование в МЖИ", "Подаём документы через mos.ru и отрабатываем замечания. Решение инспекция выносит до 20 рабочих дней, по домам-памятникам до 30"], ["05", "Приёмка работ", "После монтажа сдаём антресоль комиссии и получаем акт о завершённой перепланировке"], ["06", "Техплан и ЕГРН", "Кадастровый инженер готовит технический план за 3-5 дней, подаём в Росреестр, новая площадь появляется в выписке ЕГРН. Электронная подача от 3 рабочих дней"]],stats:[["400+", "объектов провели через Росреестр с 2010 года"], ["20", "рабочих дней рассматривает МЖИ"], ["2,1 м", "минимальная высота каждого яруса"], ["1 день", "бесплатный разбор вашего объекта"]],tariffs:[["Проверка и заключение", "от 20 000 ₽", "5-7 рабочих дней", "Проверка по правилу 40% и высотам, обследование несущих конструкций, техническое заключение с выводом, можно ли согласовать конструкцию", false], ["Проект антресоли", "от 25 000 ₽", "5-10 дней", "Проект перепланировки с разделом КР или КМ, расчёт нагрузок, подготовка пакета для подачи в МЖИ", false], ["Антресоль под ключ", "по запросу", "3-6 месяцев", "Всё от замера до новой выписки ЕГРН: заключение, проект, согласование в МЖИ, приёмка, техплан и внесение изменений. Цену считаем после бесплатного разбора", true]],micro:"Пришлите план БТИ с высотой потолков и выписку ЕГРН: за 1 день бесплатно скажем, проходит ли антресоль по правилу 40%, и что это в вашем случае, перепланировка или реконструкция.",faq:[["Какой площади можно сделать антресоль в нежилом помещении?", "Не больше 40% площади помещения: лимит закреплён в пункте 10.23 приложения 1 к постановлению Москвы 508-ПП (актуально на июль 2026). Считается сумма всех антресолей в помещении. Перешагнули порог, и это уже антресольный этаж с другой, заметно более тяжёлой процедурой."], ["Какая высота потолка нужна для антресоли?", "От пола до низа антресоли должно оставаться не меньше 2,1 метра, и столько же от пола антресоли до потолка. Вместе с толщиной конструкции (около 20 см) реальный минимум потолка примерно 4,4 метра. Высоты не хватает, значит узаконить ярус не получится."], ["Антресоль это перепланировка или реконструкция?", "Зависит от объекта. В нежилом помещении внутри жилого дома это перепланировка, её согласует Мосжилинспекция. В отдельно стоящем нежилом здании Росреестр нередко трактует антресоль как реконструкцию, потому что растёт площадь здания: тогда нужно разрешение на реконструкцию и совсем другой порядок. Мы определяем это на старте, до трат на проект."], ["Можно ли узаконить уже построенную антресоль?", "Да, если конструкция вписывается в правило 40% и высоты 2,1 метра, а перекрытия держат нагрузку. Готовим техническое заключение и проект, согласуем по факту, вносим площадь в ЕГРН. Если параметры нарушены, скажем прямо после бесплатного разбора: иногда дешевле переделать конструкцию, чем годами жить с красными линиями БТИ."], ["Увеличится ли площадь помещения в ЕГРН?", "Да, площадь антресоли добавляется к площади помещения после подготовки техплана и кадастрового учёта изменений. Госпошлина за
